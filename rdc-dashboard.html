<!-- RDC运营数据看板 v0.4.3 (date-picker-fix) -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDC运营数据看板</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://unpkg.com/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg-primary: #F8FAFC; --bg-card: #FFFFFF; --bg-sidebar: #1E293B;
  --text-primary: #1E293B; --text-secondary: #64748B; --text-sidebar: #CBD5E1;
  --border-card: #E2E8F0; --border-light: #F1F5F9;
  --color-blue: #2563EB; --color-green: #10B981; --color-red: #EF4444;
  --color-orange: #F59E0B; --color-teal: #14B8A6; --color-purple: #8B5CF6;
  --card-radius: 12px; --font-size-base: 13px; --font-size-lg: 15px;
  --font-size-xl: 20px; --font-size-2xl: 28px;
  --sidebar-width: 220px; --topbar-height: 56px;
  --transition-speed: 0.2s;
}
body.mode-advanced {
  --bg-primary: #0F172A; --bg-card: #1E293B; --bg-sidebar: #0A0F1A;
  --text-primary: #E2E8F0; --text-secondary: #94A3B8; --text-sidebar: #94A3B8;
  --border-card: #334155; --border-light: #1E293B;
  --color-blue: #60A5FA;
}
body.mode-meeting {
  --font-size-base: 16px; --font-size-lg: 20px;
  --font-size-xl: 28px; --font-size-2xl: 40px;
  --card-radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); font-size: var(--font-size-base); line-height: 1.5; transition: background var(--transition-speed), color var(--transition-speed); }
a { color: var(--color-blue); text-decoration: none; }

.page { display: none; }
.page.active { display: block; }

/* Login */
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a3a5c 0%, #2563EB 40%, #7C3AED 100%); }
.login-card { background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.login-card h1 { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 8px; color: #1E293B; }
.login-card .subtitle { text-align: center; color: #64748B; font-size: 14px; margin-bottom: 32px; }
.login-card .form-group { margin-bottom: 20px; }
.login-card label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; font-weight: 500; }
.login-card input { width: 100%; padding: 10px 14px; border: 1px solid #CBD5E1; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s; }
.login-card input:focus { border-color: var(--color-blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.login-card .btn { width: 100%; padding: 12px; background: var(--color-blue); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
.login-card .btn:hover { opacity: .9; }
.login-card .error { color: #EF4444; font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }

/* App layout */
.app-layout { display: none; min-height: 100vh; }
.app-layout.active { display: flex; }

/* Sidebar */
.sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); color: var(--text-sidebar); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; transition: transform var(--transition-speed); overflow-y: auto; }
.sidebar-logo { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
.sidebar-logo h2 { font-size: 15px; font-weight: 600; color: #fff; }
.sidebar-logo span { font-size: 11px; opacity: .6; display: block; margin-top: 2px; }
.sidebar-menu { flex: 1; padding: 8px 0; }
.sidebar-menu .menu-item { display: flex; align-items: center; padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--text-sidebar); transition: all .15s; border-left: 3px solid transparent; gap: 10px; }
.sidebar-menu .menu-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.sidebar-menu .menu-item.active { background: rgba(37,99,235,.2); color: #fff; border-left-color: var(--color-blue); }
.sidebar-menu .menu-item .icon { width: 20px; text-align: center; font-size: 15px; }
.sidebar-menu .menu-section-title { padding: 14px 20px 8px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing: 1px; }
/* 可折叠分组标题（订单及缺货分析 / 库存分析） */
.sidebar-menu .menu-group-header { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; user-select: none; font-size: 15px; font-weight: 700; color: #fff; gap: 8px; transition: background .15s; }
.sidebar-menu .menu-group-header:hover { background: rgba(255,255,255,.06); }
.sidebar-menu .menu-group-header .arrow { font-size: 10px; transition: transform .2s; flex-shrink: 0; width: 16px; }
.sidebar-menu .menu-group-header.collapsed .arrow { transform: rotate(-90deg); }
.sidebar-menu .menu-group-body { overflow: hidden; transition: max-height .25s ease-out; max-height: 2000px; }
.sidebar-menu .menu-group-body.collapsed { max-height: 0; }
.sidebar-footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,.1); font-size: 11px; opacity: .5; }

/* Main */
.main-area { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; min-height: 100vh; transition: margin-left var(--transition-speed); }

/* Top bar */
.topbar { height: var(--topbar-height); background: var(--bg-card); border-bottom: 1px solid var(--border-card); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 50; }
.topbar .page-title { font-size: var(--font-size-lg); font-weight: 600; flex: 1; }
.topbar .mode-btns { display: flex; gap: 4px; }
.topbar .mode-btns button { padding: 6px 12px; border: 1px solid var(--border-card); background: var(--bg-card); color: var(--text-secondary); border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .15s; }
.topbar .mode-btns button.active { background: var(--color-blue); color: #fff; border-color: var(--color-blue); }
.topbar .mode-btns button:hover:not(.active) { background: var(--border-light); }
.topbar .topbar-actions { display: flex; align-items: center; gap: 12px; }
.topbar .btn-export { padding: 6px 16px; background: var(--color-green); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
.topbar .btn-import { padding: 6px 16px; background: var(--color-blue); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
.topbar .user-info { font-size: 13px; color: var(--text-secondary); cursor: pointer; }
.topbar .user-info:hover { color: var(--text-primary); }

/* Content */
.content { flex: 1; padding: 20px 24px; overflow-y: auto; }

/* Cards */
.card { background: var(--bg-card); border-radius: var(--card-radius); border: 1px solid var(--border-card); padding: 20px; margin-bottom: 16px; transition: background var(--transition-speed), border-color var(--transition-speed); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-title { font-size: var(--font-size-lg); font-weight: 600; }
.card-subtitle { font-size: 12px; color: var(--text-secondary); }

/* KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi-card { background: var(--bg-card); border-radius: var(--card-radius); border: 1px solid var(--border-card); padding: 16px 20px; transition: all var(--transition-speed); }
.kpi-card .kpi-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.kpi-card .kpi-value { font-size: var(--font-size-2xl); font-weight: 700; }
.kpi-card .kpi-unit { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }
.kpi-card.blue .kpi-value { color: var(--color-blue); }
.kpi-card.green .kpi-value { color: var(--color-green); }
.kpi-card.red .kpi-value { color: var(--color-red); }
.kpi-card.orange .kpi-value { color: var(--color-orange); }
.kpi-card.teal .kpi-value { color: var(--color-teal); }
.kpi-card.purple .kpi-value { color: var(--color-purple); }

/* Chart container */
.chart-container { width: 100%; height: 350px; }
.chart-container-lg { width: 100%; height: 420px; }
.chart-container-sm { width: 100%; height: 280px; }

/* Two column layout */
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.row-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

/* Table */
.data-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
.data-table th { background: var(--bg-card); padding: 10px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border-card); color: var(--text-secondary); white-space: nowrap; position: sticky; top: 0; z-index: 2; }
.data-table th:first-child, .data-table td:first-child { position: sticky; left: 0; z-index: 1; background: var(--bg-card); }
.data-table th:first-child { z-index: 3; }
.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); }
.data-table tr:hover td { background: var(--border-light); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .rate-good { color: var(--color-green); font-weight: 600; }
.data-table .rate-warn { color: var(--color-orange); font-weight: 600; }
.data-table .rate-bad { color: var(--color-red); font-weight: 600; }

.table-wrap { max-height: 420px; overflow: auto; }
.table-search { padding: 8px 12px; border: 1px solid var(--border-card); border-radius: 6px; font-size: 12px; width: 200px; outline: none; background: var(--bg-card); color: var(--text-primary); }

/* Filters */
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-bar select, .filter-bar input { padding: 6px 12px; border: 1px solid var(--border-card); border-radius: 6px; font-size: 12px; background: var(--bg-card); color: var(--text-primary); outline: none; }
.filter-bar label { font-size: 12px; color: var(--text-secondary); }

/* RDC checkbox chips */
.rdc-checkboxes { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; padding-top: 4px; }
.rdc-checkbox-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border-card); font-size: 11px; cursor: pointer; user-select: none; transition: all 0.15s; background: var(--bg-card); color: var(--text-secondary); }
.rdc-checkbox-chip:hover { border-color: var(--color-blue); }
.rdc-checkbox-chip input[type=checkbox] { width: 13px; height: 13px; margin: 0; cursor: pointer; accent-color: var(--color-blue); }
.rdc-checkbox-chip.checked { border-width: 1.5px; font-weight: 500; }
.rdc-checkbox-chip.checked-huanan { border-color: #2563EB; color: #1D4ED8; background: #EFF6FF; }
.rdc-checkbox-chip.checked-huabei { border-color: #10B981; color: #065F46; background: #ECFDF5; }
.rdc-checkbox-chip.checked-dongbei { border-color: #F59E0B; color: #92400E; background: #FFFBEB; }
.rdc-checkbox-chip.checked-xibei { border-color: #EF4444; color: #991B1B; background: #FEF2F2; }
.rdc-checkbox-chip.checked-huazhong { border-color: #8B5CF6; color: #5B21B6; background: #F5F3FF; }
.rdc-checkbox-chip.checked-xinan { border-color: #14B8A6; color: #0F766E; background: #F0FDFA; }
.rdc-checkboxes .btn-toggle-all { font-size: 11px; cursor: pointer; color: var(--color-blue); padding: 4px 8px; border: none; background: none; text-decoration: underline; }
.rdc-checkboxes .btn-toggle-all:hover { color: var(--text-primary); }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-green { background: #D1FAE5; color: #065F46; }
.badge-red { background: #FEE2E2; color: #991B1B; }
.badge-orange { background: #FEF3C7; color: #92400E; }
.badge-blue { background: #DBEAFE; color: #1E40AF; }

/* Upload zone */
.upload-zone { border: 2px dashed var(--border-card); border-radius: var(--card-radius); padding: 48px; text-align: center; cursor: pointer; transition: all .2s; background: var(--bg-card); }
.upload-zone:hover { border-color: var(--color-blue); background: rgba(37,99,235,.03); }
.upload-zone .upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-zone .upload-text { font-size: var(--font-size-lg); color: var(--text-secondary); }
.upload-zone .upload-hint { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

/* Responsive */
@media (max-width: 1200px) {
  .kpi-row { grid-template-columns: repeat(3, 1fr); }
  .row-2 { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-area { margin-left: 0; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}

/* Meeting mode overrides */
body.mode-meeting .sidebar { display: none; }
body.mode-meeting .main-area { margin-left: 0; }
body.mode-meeting .chart-container { height: 500px; }
body.mode-meeting .chart-container-sm { height: 400px; }
body.mode-meeting .kpi-value { font-size: 48px; }

/* Heatmap table */
.heatmap-cell { text-align: center; padding: 4px 8px; font-size: 12px; font-weight: 500; border-radius: 4px; }

/* Toast */
.toast { position: fixed; top: 20px; right: 20px; background: var(--color-green); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 13px; z-index: 9999; box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toastIn .3s ease; }
.toast.error { background: var(--color-red); }
@keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* Pagination */
.pagination { display: flex; gap: 6px; justify-content: center; align-items: center; margin-top: 12px; }
.pagination button { padding: 4px 10px; border: 1px solid var(--border-card); background: var(--bg-card); color: var(--text-primary); border-radius: 4px; cursor: pointer; font-size: 12px; }
.pagination button.active { background: var(--color-blue); color: #fff; border-color: var(--color-blue); }
.pagination button:disabled { opacity: .4; cursor: default; }
.pagination span { font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>

<div id="app"></div>

<!-- v3 -->
<script>
const DEFAULT_USER = 'admin';
const DEFAULT_PASS = 'admin123';

const MODE_KEY = 'rdc_dashboard_mode';
const AUTH_KEY = 'rdc_dashboard_auth';

const RDC_LIST = ['华南RDC','华北RDC','东北RDC','西北RDC','华中RDC','西南RDC'];
const BRAND_LIST = ['六神','美加净','家安','启初','传统','高夫','片仔癀','上海'];
const CHANNEL_LIST = ['经销商','KA'];

let currentMode = localStorage.getItem(MODE_KEY) || 'default';
let isAuthenticated = localStorage.getItem(AUTH_KEY) === 'true';
let currentPage = 'overview';

const dataStore = {
  shortage: [],
  overall: { kaDealer: [], dailyFulfill: [], brandFulfill: [] },
  dailyDetail: [],
  bizDemand: [],
  orderDetail: [],
  customerFulfill: [],
  transship: [],
  loaded: false,
  // Inventory structure data (from 库存分析模版.xlsx)
  inventory: null
};

const filters = {
  rdc: 'all', brand: 'all', channel: 'all', dateRange: 'all', search: '', shortageDate: 'all',
  overviewDate: 'all', overviewRDC: 'all',
  fulfillRDC: 'all', fulfillChannel: 'all', fulfillRateType: 'day', fulfillDate: 'all',
  brandChannelRDC: 'all',
  dataMonth: 'all'
};
window._availableMonths = [];
window._latestMonth = null;
window._overviewRdcChecked = { '华南RDC': false, '华北RDC': false, '东北RDC': false, '西北RDC': false, '华中RDC': false, '西南RDC': false };
window._fulfillRdcChecked = { '华南RDC': false, '华北RDC': false, '东北RDC': false, '西北RDC': false, '华中RDC': false, '西南RDC': false };
window._fulfillChannelChecked = { 'KA': true, '经销商': true };
function getLatestShortageDate() {
  if (!dataStore.shortage || dataStore.shortage.length === 0) return null;
  return [...new Set(dataStore.shortage.map(d => d.dateStr))].sort().pop();
}

// 检测所有数据源中的月份
function detectAllMonths() {
  const monthSet = new Set();
  dataStore.shortage.forEach(d => { if (d.dateStr && d.dateStr.length >= 7) monthSet.add(d.dateStr.slice(0, 7)); });
  dataStore.orderDetail.forEach(d => { if (d.dateStr && d.dateStr.length >= 7) monthSet.add(d.dateStr.slice(0, 7)); });
  dataStore.transship.forEach(d => { if (d.dateStr && d.dateStr.length >= 7) monthSet.add(d.dateStr.slice(0, 7)); });
  dataStore.overall.dailyFulfill.forEach(d => { if (d.dateStr && d.dateStr.length >= 7) monthSet.add(d.dateStr.slice(0, 7)); });
  // 只保留有效月份格式 (YYYY-MM) 且 >= 2026-05
  window._availableMonths = [...monthSet].filter(m => /^\d{4}-\d{2}$/.test(m) && m >= '2026-05').sort();
  window._latestMonth = window._availableMonths.length > 0 ? window._availableMonths[window._availableMonths.length - 1] : null;
}

// 获取某数据数组中包含的月份（用于诊断显示）
function getDataMonths(dataArray) {
  if (!dataArray || dataArray.length === 0) return '<span style="color:#9CA3AF">无数据</span>';
  const monthSet = new Set();
  dataArray.forEach(d => { if (d.dateStr && d.dateStr.length >= 7) monthSet.add(d.dateStr.slice(0, 7)); });
  const months = [...monthSet].filter(m => /^\d{4}-\d{2}$/.test(m)).sort();
  if (months.length === 0) return '<span style="color:#9CA3AF">无有效月份</span>';
  return months.map(m => '<span class="badge badge-green" style="margin-right:4px">' + m + '</span>').join('');
}

// 全局月份筛选辅助：返回shortage过滤后的数据
function getShortageByMonth() {
  const m = filters.dataMonth;
  if (!m || m === 'all') return dataStore.shortage;
  return dataStore.shortage.filter(d => d.dateStr && d.dateStr.startsWith(m));
}

function ensureOverviewDate() {
  // 如果已经有overviewDate且该日期在选中的月份内，保持不变
  if (filters.overviewDate && filters.overviewDate !== 'all') {
    const m = filters.dataMonth;
    if (m && m !== 'all' && filters.overviewDate.startsWith(m)) return;
    if (!m || m === 'all') return; // 无月份过滤时沿用已有日期
  }
  // 根据全局月份筛选设置最新日期
  if (filters.dataMonth && filters.dataMonth !== 'all') {
    const monthData = dataStore.shortage.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth));
    const latest = [...new Set(monthData.map(d => d.dateStr))].sort().pop();
    if (latest) filters.overviewDate = latest;
  } else {
    const latest = getLatestShortageDate();
    if (latest) filters.overviewDate = latest;
  }
}

function getShortageByDate(dateStr) {
  if (!dateStr || dateStr === 'all') {
    const latest = getLatestShortageDate();
    if (latest) return dataStore.shortage.filter(d => d.dateStr === latest);
    return dataStore.shortage;
  }
  return dataStore.shortage.filter(d => d.dateStr === dateStr);
}

function getRDCShortageKey(rdcName) {
  const map = {
    '华南RDC': 'huananShort', '华北RDC': 'huabeiShort', '东北RDC': 'dongbeiShort',
    '西北RDC': 'xibeiShort', '华中RDC': 'huazhongShort', '西南RDC': 'xinanShort'
  };
  return map[rdcName] || null;
}

function getTopShortageSKUs(brand, rdc, dateStr, limit) {
  limit = limit || 5;
  let data = dataStore.shortage;
  if (!dateStr || dateStr === 'all') {
    const latest = getLatestShortageDate();
    if (latest) data = data.filter(d => d.dateStr === latest);
  } else {
    data = data.filter(d => d.dateStr === dateStr);
  }
  if (brand && brand !== 'all') data = data.filter(d => d.brand === brand);
  let rdcKey = null;
  if (rdc && rdc !== 'all') {
    rdcKey = getRDCShortageKey(rdc);
    if (rdcKey) data = data.filter(d => d[rdcKey] > 0);
  }
  // 按materialCode聚合去重
  const dedup = {};
  data.forEach(d => {
    const gap = rdcKey ? d[rdcKey] : d.rdcShortBoxes;
    if (!dedup[d.materialCode]) dedup[d.materialCode] = { code: d.materialCode, name: d.materialName, gap: 0 };
    dedup[d.materialCode].gap += gap;
  });
  return Object.values(dedup).sort((a,b) => b.gap - a.gap).slice(0, limit);
}

function getRDCColor(rdcName) {
  const map = { '华南RDC': '#2563EB', '华北RDC': '#10B981', '东北RDC': '#F59E0B', '西北RDC': '#EF4444', '华中RDC': '#8B5CF6', '西南RDC': '#14B8A6' };
  return map[rdcName] || '#64748B';
}

// 国定假日列表（格式：MM-DD）
const CN_PUBLIC_HOLIDAYS = new Set([
  '06-19' // 端午节
]);

function isWorkday(dateStr) {
  if (!dateStr) return false;
  const dt = new Date(dateStr + 'T00:00:00');
  const day = dt.getDay();
  if (day === 0 || day === 6) return false; // 跳过周末
  const mmdd = dateStr.slice(5); // "MM-DD"
  if (CN_PUBLIC_HOLIDAYS.has(mmdd)) return false; // 跳过国定假日
  return true;
}

function getTopFirstDayShortSKUs(dateStr, rdc, limit) {
  limit = limit || 5;
  if (!dateStr || !rdc) return [];
  // 先按skuCode聚合去重
  const dedup = {};
  dataStore.orderDetail.filter(d => d.dateStr === dateStr && d.warehouse === rdc && d.firstDayShort > 0).forEach(d => {
    if (!dedup[d.skuCode]) dedup[d.skuCode] = { code: d.skuCode, name: d.skuName, gap: 0 };
    dedup[d.skuCode].gap += d.firstDayShort;
  });
  return Object.values(dedup).sort((a,b) => b.gap - a.gap).slice(0, limit);
}

// 按品牌×RDC×时间范围聚合首日缺货TOP（用于品牌矩阵弹框）
// timeRange: { type: 'day'|'month'|'all', dateStr: 'YYYY-MM-DD', month: 'YYYY-MM' }
function getTopFirstDayShortSKUsByBrand(brand, rdc, timeRange, limit) {
  limit = limit || 5;
  if (!brand || !rdc) return [];
  const tr = timeRange || { type: 'all' };
  const dedup = {};
  dataStore.orderDetail.filter(d => {
    if (d.brand !== brand || d.warehouse !== rdc || d.firstDayShort <= 0) return false;
    if (tr.type === 'day' && d.dateStr !== tr.dateStr) return false;
    if (tr.type === 'month' && (!d.dateStr || !d.dateStr.startsWith(tr.month))) return false;
    return true;
  }).forEach(d => {
    if (!dedup[d.skuCode]) dedup[d.skuCode] = { code: d.skuCode, name: d.skuName, gap: 0 };
    dedup[d.skuCode].gap += d.firstDayShort;
  });
  return Object.values(dedup).sort((a,b) => b.gap - a.gap).slice(0, limit);
}

function getTopShortageAmountSKUsByRDC(dateStr, rdcKey, limit) {
  limit = limit || 5;
  if (!dateStr || !rdcKey) return [];
  // 先按materialCode聚合去重
  const dedup = {};
  dataStore.shortage.filter(d => d.dateStr === dateStr && d[rdcKey] > 0).forEach(d => {
    if (!dedup[d.materialCode]) dedup[d.materialCode] = { code: d.materialCode, name: d.materialName, amount: 0, boxes: 0 };
    const ratio = d.rdcShortBoxes > 0 ? d[rdcKey] / d.rdcShortBoxes : 0;
    dedup[d.materialCode].amount += Math.round(d.rdcShortAmount * ratio);
    dedup[d.materialCode].boxes += Math.round(d.rdcShortBoxes * ratio);
  });
  return Object.values(dedup).sort((a,b) => b.amount - a.amount).slice(0, limit);
}

// ============ IndexedDB 持久化 ============
const DB_NAME = 'RDC_Dashboard';
const DB_VERSION = 3;
const STORE_NAME = 'datasets';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      const db = e.target.result;
      if (db.objectStoreNames.contains(STORE_NAME)) {
        db.deleteObjectStore(STORE_NAME); // 版本升级时清空旧缓存，强制用新解析逻辑（含 cov12）重新生成
      }
      db.createObjectStore(STORE_NAME, { keyPath: 'key' });
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(db); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

async function saveToIDB() {
  if (!dataStore.loaded) return;
  try {
    if (!db) await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    // 序列化dataStore（排除loaded标志，单独存）
    const payload = {
      key: 'current_data',
      shortage: dataStore.shortage,
      overall: dataStore.overall,
      dailyDetail: dataStore.dailyDetail,
      bizDemand: dataStore.bizDemand,
      orderDetail: dataStore.orderDetail,
      customerFulfill: dataStore.customerFulfill,
      transship: dataStore.transship,
      inventoryTurnover: dataStore.inventoryTurnover || null,
      inventory: dataStore.inventory || null,
      history: dataStore.history || null,
      shortageReasons: window._shortageReasons || {},
      replStatus: window._replStatus || {},
      boxSpecMap: window._boxSpec || {},
      updatedAt: new Date().toISOString()
    };
    store.put(payload);
    return new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch(e) { console.warn('IndexedDB save failed:', e); }
}

async function loadFromIDB() {
  try {
    if (!db) await openDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req = store.get('current_data');
    return new Promise((resolve, reject) => {
      req.onsuccess = function() {
        if (req.result) {
          dataStore.shortage = req.result.shortage || [];
          dataStore.overall = req.result.overall || { kaDealer: [], dailyFulfill: [], brandFulfill: [] };
          dataStore.dailyDetail = req.result.dailyDetail || [];
          dataStore.bizDemand = req.result.bizDemand || [];
          dataStore.orderDetail = req.result.orderDetail || [];
          dataStore.customerFulfill = req.result.customerFulfill || [];
          dataStore.transship = req.result.transship || [];
          dataStore.inventoryTurnover = req.result.inventoryTurnover || null;
          dataStore.inventory = req.result.inventory || null;
          dataStore.history = req.result.history || null;
          window._shortageReasons = req.result.shortageReasons || {};
          // 尝试从localStorage恢复缺货原因（作为IndexedDB的补充备份）
          if (Object.keys(window._shortageReasons).length === 0) {
            try {
              const ls = localStorage.getItem('rdc_shortage_reasons');
              if (ls) window._shortageReasons = JSON.parse(ls);
            } catch(e) {}
          }
          window._replStatus = req.result.replStatus || {};
          window._boxSpec = req.result.boxSpecMap || {};
          dataStore.loaded = true;
          dataStore.lastUpdated = req.result.updatedAt || null;
          detectAllMonths();
          resolve(true);
        } else { resolve(false); }
      };
      req.onerror = () => reject(req.error);
    });
  } catch(e) { console.warn('IndexedDB load failed:', e); return false; }
}

async function clearIDB() {
  try {
    if (!db) await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.delete('current_data');
    return new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch(e) { console.warn('IndexedDB clear failed:', e); }
}

async function autoLoadData() {
  try {
    let loadedCount = 0;
    let hasTransship = false;

    // 1. 加载最新月份文件 data.xlsx（含转储数据，使用replace模式确保新文件覆盖旧缓存）
    const resp = await fetch('./data.xlsx');
    if (resp.ok) {
      const buf = await resp.arrayBuffer();
      if (parseExcel(buf, 'replace')) {
        loadedCount++;
        hasTransship = true;
      }
    }

    // 2. 加载历史月份文件 data-YYYY-MM.xlsx（不含转储数据）
    const monthFiles = [];
    // 尝试从 2026-01 到当前年月，按逆序加载
    const now = new Date();
    for (let y = now.getFullYear(); y >= 2026; y--) {
      const endM = (y === now.getFullYear()) ? now.getMonth() + 1 : 12;
      const startM = 1;
      for (let m = endM; m >= startM; m--) {
        const ym = y + '-' + String(m).padStart(2, '0');
        try {
          const r = await fetch('./data-' + ym + '.xlsx');
          if (r.ok) {
            const b = await r.arrayBuffer();
            if (parseExcel(b, 'append', { skipTransship: true })) {
              loadedCount++;
              monthFiles.push(ym);
            }
          }
        } catch(e) { /* 文件不存在，跳过 */ }
      }
    }

    // 3. 加载库存分析文件 inventory.xlsx
    try {
      const invResp = await fetch('./inventory.xlsx');
      if (invResp.ok) {
        const invBuf = await invResp.arrayBuffer();
        parseInventoryExcel(invBuf);
        saveToIDB().catch(() => {});
      }
    } catch(e) { /* 库存文件不存在，跳过 */ }

    if (loadedCount > 0) {
      const toastMsg = '📦 已自动加载 ' + loadedCount + ' 个月份数据' + (hasTransship ? '（含转储）' : '') + (dataStore.inventory ? ' | 库存: ✓' : '');
      showToast(toastMsg);
      return true;
    }
    if (dataStore.inventory) {
      showToast('📋 已加载库存数据' + (loadedCount > 0 ? '' : '（订单数据未加载）'));
      return true;
    }

    throw new Error('数据文件不存在');
  } catch(e) {
    console.warn('自动加载数据失败:', e.message);
    if (!dataStore.loaded) {
      showToast('未检测到服务端数据，请手动导入Excel文件', true);
    }
    return false;
  }
}

function formatNum(n) {
  if (n == null || isNaN(n)) return '-';
  return Number(n).toLocaleString('zh-CN');
}

function formatPct(n) {
  if (n == null || isNaN(n)) return '-';
  return (Number(n) * 100).toFixed(1) + '%';
}

function formatMoney(n) {
  if (n == null || isNaN(n)) return '-';
  const abs = Math.abs(Number(n));
  if (abs >= 10000) return '¥' + (abs / 10000).toFixed(1) + '万';
  return '¥' + abs.toFixed(0);
}

function fmtK(v) { return (Math.round(v || 0)).toLocaleString('zh-CN'); }

function parseExcelDate(v) {
  if (v instanceof Date) return v;
  if (typeof v === 'number') return new Date((v - 25569) * 86400 * 1000);
  if (typeof v === 'string') {
    const d = new Date(v);
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = d instanceof Date ? d : new Date(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

function getSafeNum(row, idx) {
  const v = row[idx];
  if (v == null || v === '' || isNaN(Number(v))) return 0;
  return Number(v);
}

function getSafeStr(row, idx) {
  const v = row[idx];
  return v == null ? '' : String(v).trim();
}

// 解析"库存周转"Sheet（data.xlsx 或 inventory.xlsx 中）
function parseInventoryTurnoverSheet(shI) {
  if (!shI || shI.length < 24) return null;
  const invData = { allLocation: {}, sharedLocation: {}, subLocation: {}, inventoryByRdc: {}, shipmentCost: {}, rdcOrder: ['东北','华北','华南','华中','西南','西北'], months: ['1月','2月','3月','4月','5月','6月'], formula: '' };
  const rdcLabels = ['东北RDC','华北RDC','华南RDC','华中RDC','西南RDC','西北RDC'];

  // R10-R15: 各RDC分仓 turnover days (cols 1-6)
  for (let ri = 9; ri <= 14; ri++) {
    const r = shI[ri];
    if (r && r[0] && String(r[0]).length > 0) {
      const rdcName = rdcLabels[ri - 9];
      invData.allLocation[rdcName] = [];
      for (let ci = 1; ci <= 6; ci++) invData.allLocation[rdcName].push(getSafeNum(r, ci));
    }
  }

  // R19-R24: 各RDC各分库位 turnover days (cols 1-6)
  for (let ri = 18; ri <= 23; ri++) {
    const r = shI[ri];
    if (r && r[0] && String(r[0]).length > 0) {
      const rdcName = rdcLabels[ri - 18];
      invData.subLocation[rdcName] = [];
      for (let ci = 1; ci <= 6; ci++) invData.subLocation[rdcName].push(getSafeNum(r, ci));
    }
  }

  // R3: RDC全库位 turnover, R4: 共享库位, R5: 总仓
  if (shI[2]) { invData.totalAllLocation = []; for (let ci = 1; ci <= 6; ci++) invData.totalAllLocation.push(getSafeNum(shI[2], ci)); }
  if (shI[3]) { invData.totalSharedLocation = []; for (let ci = 1; ci <= 6; ci++) invData.totalSharedLocation.push(getSafeNum(shI[3], ci)); }
  if (shI[4]) { invData.headquarters = []; for (let ci = 1; ci <= 6; ci++) invData.headquarters.push(getSafeNum(shI[4], ci)); }

  // R3-R9 (cols 8-14): Inventory by RDC
  for (let ri = 2; ri <= 8; ri++) {
    const r = shI[ri];
    if (r && r[8] && String(r[8]).length > 0) {
      const label = String(r[8]).trim();
      invData.inventoryByRdc[label] = [];
      for (let ci = 9; ci <= 14; ci++) invData.inventoryByRdc[label].push(getSafeNum(r, ci));
    }
  }
  if (shI[9]) { invData.inventoryByRdc['总部'] = []; for (let ci = 9; ci <= 14; ci++) invData.inventoryByRdc['总部'].push(getSafeNum(shI[9], ci)); }

  // R14-R21 (cols 8-14): Shipment cost by RDC（含总仓）
  // 跳过 row13 表头("仓库")；row21 为总仓，同时映射到渲染层使用的'总部'键
  for (let ri = 14; ri <= 21; ri++) {
    const r = shI[ri];
    if (r && r[8] && String(r[8]).length > 0) {
      const label = String(r[8]).trim();
      if (label === '仓库') continue;
      const arr = [];
      for (let ci = 9; ci <= 14; ci++) {
        const v = r[ci];
        if (v != null) {
          const sv = String(v).replace(/,/g,'').replace(/[^\d.-]/g,'');
          arr.push(parseFloat(sv)||0);
        } else {
          arr.push(0);
        }
      }
      invData.shipmentCost[label] = arr;
      if (label === '总仓') invData.shipmentCost['总部'] = arr;
    }
  }

  // Formula from R25
  if (shI[24] && shI[24][8]) invData.formula = String(shI[24][8]);
  return invData;
}

// 库存覆盖月数分类 → 标准周期类别
function mapCovLevel(label) {
  if (!label) return null;
  if (label === '≤1个月' || label === '0~1个月') return '1个月';
  if (label === '1~2个月') return '2个月';
  if (label === '2~3个月') return '3个月';
  if (label === '3~4个月' || label === '4~5个月' || label === '5~6个月') return '4-6个月';
  if (label === '大于6个月') return '6个月以上';
  return null; // 无需求/零库存/非卖品/促销装/新品期 等不纳入标准覆盖周期
}

function parseExcel(rawData, mode, options) {
  mode = mode || 'replace';
  options = options || {};
  try {
    let wb;
    if (rawData && rawData.__preparsed) wb = rawData;          // 预解析 JSON 伪 workbook（Sheets 直接为行数组）
    else wb = XLSX.read(rawData, { type: 'array' });
    const sheetNames = wb.SheetNames;

    function sheetToArray(sheet) {
      if (Array.isArray(sheet)) return sheet;                 // 已行化，直接返回
      return XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true, dateNF: 'yyyy-mm-dd' });
    }

    function normalizeDate(val) {
      if (!val) return null;
      if (val instanceof Date) return val;
      if (typeof val === 'number') {
        const d = new Date((val - 25569) * 86400 * 1000);
        if (!isNaN(d.getTime())) return d;
      }
      if (typeof val === 'string') {
        const d = new Date(val);
        if (!isNaN(d.getTime())) return d;
        const m = val.match(/(\d{4})[/-](\d{1,2})[/-](\d{1,2})/);
        if (m) return new Date(+m[1], +m[2]-1, +m[3]);
      }
      return null;
    }

    // Mode handling: clear all data if replace mode
    if (mode === 'replace') {
      dataStore.shortage = [];
      dataStore.overall = { kaDealer: [], dailyFulfill: [], brandFulfill: [] };
      dataStore.bizDemand = [];
      dataStore.orderDetail = [];
      dataStore.customerFulfill = [];
      dataStore.transship = [];
    }

    // Create dedup key Sets from existing data (append mode) or empty (replace mode)
    const existingShortageKeys = new Set(dataStore.shortage.map(d => d.dateStr + '|' + d.materialCode));
    const existingKaDealerKeys = new Set(dataStore.overall.kaDealer.map(d => d.label + '|' + d.rdc));
    const existingDailyKeys = new Set(dataStore.overall.dailyFulfill.map(d => d.dateStr));
    const existingBrandKeys = new Set(dataStore.overall.brandFulfill.map(d => d.brand));
    const existingOrderKeys = new Set(dataStore.orderDetail.map(d => d.dateStr + '|' + d.orderNo + '|' + d.skuCode));
    const existingTransKeys = new Set(dataStore.transship.map(d => d.dateStr + '|' + d.material + '|' + d.location));

    // Sheet1: 缺货汇总 (2 header rows)
    const sh1 = sheetToArray(wb.Sheets[sheetNames[0]]);
    for (let i = 2; i < sh1.length; i++) {
      const r = sh1[i];
      if (!r || r.length < 14) continue;
      const d = normalizeDate(r[0]);
      if (!d) continue;
      const shortKey = fmtDate(d) + '|' + getSafeStr(r,1);
      if (existingShortageKeys.has(shortKey)) continue;
      existingShortageKeys.add(shortKey);
      dataStore.shortage.push({
        date: d, dateStr: fmtDate(d),
        materialCode: getSafeStr(r,1), materialName: getSafeStr(r,2),
        brand: normalizeBrandName(getSafeStr(r,3)), productType: getSafeStr(r,4),
        abcClass: getSafeStr(r,5), dcStock: getSafeNum(r,6),
        dcSupply: getSafeStr(r,7), rdcShortTotal: getSafeNum(r,8),
        rdcShortAmount: getSafeNum(r,9), rdcShortBoxes: getSafeNum(r,10),
        rdcTransitTotal: getSafeNum(r,11), rdcCount: getSafeNum(r,12),
        huabeiShort: getSafeNum(r,13), huabeiTransit: getSafeNum(r,14),
        xinanShort: getSafeNum(r,15), xinanTransit: getSafeNum(r,16),
        dongbeiShort: getSafeNum(r,17), dongbeiTransit: getSafeNum(r,18),
        huazhongShort: getSafeNum(r,19), huazhongTransit: getSafeNum(r,20),
        huananShort: getSafeNum(r,21), huananTransit: getSafeNum(r,22),
        huadongShort: getSafeNum(r,23), huadongTransit: getSafeNum(r,24),
        xibeiShort: getSafeNum(r,25), xibeiTransit: getSafeNum(r,26)
      });
    }

    // Sheet2: 总体订单满足情况 (复杂多区块布局)
    // 实际结构(0-indexed):
    //   Row1: [1]=KA+经销商, [8]=RDC日订单满足率, [16]=品牌月度订单满足率
    //   Row2: [1]=RDC,[2]=订单支数,...[6]=日订单满足率 | [8]=日期\RDC,[9]=华南RDC... | [16]=品牌\RDC,[17]=华南RDC...
    //   Row3-8: Block1 KA+经销商数据(cols 1-6) + Block2日数据(col 8-14) + Block3品牌数据(col 16-22) 交错
    //   Row9: 合计行
    //   Row10-20: 继续Block2日数据 (cols 8-14)
    //   Row12: [0]=经销商 header
    //   Row13-19: 经销商月度数据 (cols 1-6)
    //   Row21-22: 空行
    //   Row23: [0]=KA header
    //   Row24-30: KA月度数据 (cols 1-6)
    const sh2 = sheetToArray(wb.Sheets[sheetNames[1]]);

    // ---- Block 1: 月度订单满足率 (KA+经销商 / 经销商 / KA 三组) ----
    // 数据在 cols 1-6: [1]=RDC名, [2]=订单支数, [3]=总履约排单数, [4]=首日排单数, [5]=月满足率, [6]=日满足率
    function parseMonthlyBlock(startRow, endRow, label) {
      for (let i = startRow; i <= endRow && i < sh2.length; i++) {
        const r = sh2[i];
        if (!r || r.length < 7) continue;
        const name = getSafeStr(r, 1);
        if (!name || name === 'RDC' || name === '合计' || name.includes('订单满足')) continue;
        // 验证是有效RDC名（包含RDC或合计等关键字）
        if (!name.includes('RDC') && name !== '合计') continue;
        const kaKey = label + '|' + name;
        if (existingKaDealerKeys.has(kaKey)) continue;
        existingKaDealerKeys.add(kaKey);
        dataStore.overall.kaDealer.push({
          label: label,
          rdc: name, orders: getSafeNum(r,2), totalFulfill: getSafeNum(r,3),
          firstDayFulfill: getSafeNum(r,4), monthRate: getSafeNum(r,5), dayRate: getSafeNum(r,6)
        });
      }
    }
    // 组1: KA+经销商 (rows 2-8, 跳过row2表头)
    parseMonthlyBlock(2, 8, 'KA+经销商');
    // 组2: 经销商 (row12=header "经销商", row13=sub-header, rows14-19=data, row20=合计)
    parseMonthlyBlock(13, 20, '经销商');
    // 组3: KA (row23=header "KA", row24=sub-header, rows25-30=data, row31=合计)
    parseMonthlyBlock(24, 31, 'KA');

    // ---- Block 2: RDC日订单满足率 (cols 8-14) ----
    // Header在row2 col8="日期\\RDC", 数据从row3开始，col8=日期, col9-14=6个RDC满足率
    // 日数据和月度数据交错在同一行！需要逐行扫描col8是否为日期
    for (let i = 2; i < sh2.length; i++) {
      const r = sh2[i];
      if (!r || r.length < 15) continue;
      const d = normalizeDate(r[8]);
      if (!d) continue;
      // 确认不是表头行
      const val = String(r[8] || '');
      if (val.includes('日期') || val.includes('\\')) continue;
      const dailyKey = fmtDate(d);
      if (existingDailyKeys.has(dailyKey)) continue;
      existingDailyKeys.add(dailyKey);
      dataStore.overall.dailyFulfill.push({
        date: d, dateStr: fmtDate(d),
        huanan: getSafeNum(r,9), huabei: getSafeNum(r,10),
        dongbei: getSafeNum(r,11), xibei: getSafeNum(r,12),
        huazhong: getSafeNum(r,13), xinan: getSafeNum(r,14)
      });
    }

    // ---- Block 3: 品牌月度订单满足率 (col15=品牌名, cols16-21=6个RDC) ----
    // 注意：xlsx 行化后 row2 col15="品牌\\RDC"，数据从 row3 开始；品牌名在 col15，6个RDC满足率在 col16-21。
    for (let i = 2; i < sh2.length; i++) {
      const r = sh2[i];
      if (!r || r.length < 22) continue;
      const rawBrand = getSafeStr(r, 15);
      if (!rawBrand || rawBrand === '' || rawBrand.includes('品牌') || rawBrand.includes('\\') || rawBrand === 'RDC') continue;
      // 只取有实际数据的品牌行（至少有一个RDC有值）
      const hasData = [16,17,18,19,20,21].some(ci => r[ci] != null && r[ci] !== '' && !isNaN(Number(r[ci])));
      if (!hasData) continue;
      const brand = normalizeBrandName(rawBrand);
      const brandKey = brand;
      const rdcKeys = ['huanan','huabei','dongbei','xibei','huazhong','xinan'];
      if (existingBrandKeys.has(brandKey)) {
        // 同名品牌已存在：按RDC求平均（处理友谊/春蕾/海鸥/百爱神/雅霜归并为"传统"）
        const existing = dataStore.overall.brandFulfill.find(d => d.brand === brand);
        if (existing) {
          rdcKeys.forEach((rk, idx) => {
            const v = getSafeNum(r, 16 + idx);
            if (v != null && !isNaN(v)) {
              const c = existing._counts[rk] || 0;
              existing[rk] = c === 0 ? v : (existing[rk] * c + v) / (c + 1);
              existing._counts[rk] = c + 1;
            }
          });
        }
        continue;
      }
      existingBrandKeys.add(brandKey);
      const entry = { brand };
      const counts = {};
      rdcKeys.forEach((rk, idx) => {
        const v = getSafeNum(r, 16 + idx);
        entry[rk] = v;
        counts[rk] = (v != null && !isNaN(v)) ? 1 : 0;
      });
      entry._counts = counts;
      dataStore.overall.brandFulfill.push(entry);
    }

    // Sheet4: 业务需求满足情况 (1 title row)
    const sh4 = sheetToArray(wb.Sheets[sheetNames[3]]);
    const existingBizKeys = new Set(dataStore.bizDemand.map(d => d.dateStr + '|' + d.rdc + '|' + d.opCode));
    for (let i = 2; i < sh4.length; i++) {
      const r = sh4[i];
      if (!r || r.length < 17) continue;
      const d = normalizeDate(r[1]);
      if (!d) continue;
      const bizKey = fmtDate(d) + '|' + getSafeStr(r,0) + '|' + getSafeStr(r,2);
      if (existingBizKeys.has(bizKey)) continue;
      existingBizKeys.add(bizKey);
      dataStore.bizDemand.push({
        rdc: getSafeStr(r,0), date: d, dateStr: fmtDate(d),
        opCode: getSafeStr(r,2), productName: getSafeStr(r,3),
        boxSpec: getSafeStr(r,4), dealerDemand: getSafeNum(r,5),
        kaDemand: getSafeNum(r,6), newChannel: getSafeNum(r,7),
        cycleStock: getSafeNum(r,8), openOrder: getSafeNum(r,9),
        startStock: getSafeNum(r,10), transitStock: getSafeNum(r,11),
        sharedReplenish: getSafeNum(r,12), kaReplenish: getSafeNum(r,13),
        bizFulfillRate: getSafeNum(r,14), gap: getSafeNum(r,15),
        gapReason: getSafeStr(r,16), remark: getSafeStr(r,17)
      });
    }

    // Sheet5: 订单明细
    const sh5 = sheetToArray(wb.Sheets[sheetNames[4]]);
    for (let i = 1; i < sh5.length; i++) {
      const r = sh5[i];
      if (!r || r.length < 14) continue;
      const d = normalizeDate(r[0]);
      if (!d) continue;
      const orderKey = fmtDate(d) + '|' + getSafeStr(r,1) + '|' + getSafeStr(r,4);
      if (existingOrderKeys.has(orderKey)) continue;
      existingOrderKeys.add(orderKey);
      dataStore.orderDetail.push({
        date: d, dateStr: fmtDate(d),
        orderNo: getSafeStr(r,1), channel: getSafeStr(r,2),
        brand: normalizeBrandName(getSafeStr(r,3)), skuCode: getSafeStr(r,4),
        skuName: getSafeStr(r,5), rejectReason: getSafeStr(r,6),
        customerGroup: getSafeStr(r,7), warehouse: getSafeStr(r,8),
        orderQty: getSafeNum(r,9), firstDayQty: getSafeNum(r,10),
        totalFulfillQty: getSafeNum(r,11), firstDayShort: getSafeNum(r,12),
        totalGap: getSafeNum(r,13)
      });
    }

    // Sheet7: 客户订单满足率（按名称查找，兼容不同版本Sheet顺序）
    const custSheet = sheetNames.findIndex(n => n.includes('客户订单') || n.includes('客户'));
    if (custSheet >= 0) {
      const sh7 = sheetToArray(wb.Sheets[sheetNames[custSheet]]);
      const existingCustKeys = new Set(dataStore.customerFulfill.map(d => d.customerGroup + '|' + d.warehouse));
      for (let i = 1; i < sh7.length; i++) {
        const r = sh7[i];
        if (!r || r.length < 6) continue;
        const cg = getSafeStr(r,0);
        if (!cg) continue;
        const custKey = cg + '|' + getSafeStr(r,1);
        if (existingCustKeys.has(custKey)) continue;
        existingCustKeys.add(custKey);
        dataStore.customerFulfill.push({
          customerGroup: cg, warehouse: getSafeStr(r,1),
          orderQty: getSafeNum(r,2), firstDayQty: getSafeNum(r,3),
          totalFulfillQty: getSafeNum(r,4), firstDayRate: getSafeNum(r,5),
          monthRate: getSafeNum(r,6)
        });
      }
    }

    // Sheet: 转储数据（按名称查找，skipTransship为true时跳过）
    const transSheet = sheetNames.findIndex(n => n.includes('转储'));
    if (transSheet >= 0 && !options.skipTransship) {
      const shT = sheetToArray(wb.Sheets[sheetNames[transSheet]]);
      for (let i = 1; i < shT.length; i++) {
        const r = shT[i];
        if (!r || r.length < 16) continue;
        const d = normalizeDate(r[1]);
        if (!d) continue;
        const loc = getSafeStr(r, 3);
        // 排除30开头未知库位
        if (loc.startsWith('30')) continue;
        let rdc = '未知';
        if (loc.startsWith('20')) rdc = '东北RDC';
        else if (loc.startsWith('40')) rdc = '华南RDC';
        else if (loc.startsWith('60')) rdc = '西北RDC';
        else if (loc.startsWith('70')) rdc = '华中RDC';
        else if (loc.startsWith('80')) rdc = '西南RDC';
        else if (loc.startsWith('90')) rdc = '华北RDC';
        let transType = '常规转储';
        if (loc.endsWith('23') || loc.endsWith('06')) transType = '免费单转储';
        else if (loc.endsWith('03')) transType = 'KA常规转储';
        const unit = getSafeStr(r, 15);
        const transKey = fmtDate(d) + '|' + getSafeStr(r, 5) + '|' + loc;
        if (existingTransKeys.has(transKey)) continue;
        existingTransKeys.add(transKey);
        dataStore.transship.push({
          date: d, dateStr: fmtDate(d),
          location: loc, rdc: rdc, factory: getSafeStr(r, 4),
          material: getSafeStr(r, 5), materialName: getSafeStr(r, 6),
          poQty: getSafeNum(r, 7), planQty: getSafeNum(r, 10),
          confirmQty: getSafeNum(r, 12), invoiceQty: getSafeNum(r, 14),
          unit: unit, isBox: unit === '箱',
          transType: transType,
          shipFactory: getSafeStr(r, 16),
          inboundQty: getSafeNum(r, 19),
          deliveryQty: getSafeNum(r, 21)
        });
      }
    }

    // Sheet: 库存周转（按名称查找）
    const invSheet = sheetNames.findIndex(function(n) { return n.indexOf('库存') >= 0 || n.indexOf('周转') >= 0; });
    if (invSheet >= 0 && !options.skipInventory) {
      const shI = sheetToArray(wb.Sheets[sheetNames[invSheet]]);
      const invData = parseInventoryTurnoverSheet(shI);
      if (invData) dataStore.inventoryTurnover = invData;
    }

    dataStore.loaded = true;
    dataStore.lastUpdated = new Date().toISOString();
    saveToIDB();
    // 检测所有数据中的月份
    detectAllMonths();
    // 自动选择最新月份
    if (window._latestMonth && filters.dataMonth === 'all') {
      filters.dataMonth = window._latestMonth;
    }
    const transCount = dataStore.transship.length;
    showToast('数据导入成功！共加载 ' + dataStore.shortage.length + ' 条缺货记录、' + dataStore.orderDetail.length + ' 条订单明细' + (transCount > 0 ? '、' + transCount + ' 条转储数据' : '') + '（已自动保存）');
    return true;
  } catch(e) {
    showToast('数据解析失败：' + e.message, true);
    console.error(e);
    return false;
  }
}

// Router
function navigateTo(page) {
  currentPage = page;
  window.location.hash = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const targetPage = document.getElementById('page-' + page);
  if (targetPage) targetPage.classList.add('active');
  document.querySelectorAll('.sidebar .menu-item').forEach(m => m.classList.remove('active'));

function handleLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  if (user === DEFAULT_USER && pass === DEFAULT_PASS) {
    isAuthenticated = true;
    localStorage.setItem(AUTH_KEY, 'true');
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-layout').classList.add('active');

function getFilteredShortage() {
  let data = dataStore.shortage;
  if (filters.shortageDate && filters.shortageDate !== 'all') {
    data = data.filter(d => d.dateStr === filters.shortageDate);
  }
  if (filters.brand !== 'all') data = data.filter(d => d.brand === filters.brand);
  if (filters.rdc !== 'all') {
    const rdcMap = {
      '华南RDC': 'huananShort', '华北RDC': 'huabeiShort', '东北RDC': 'dongbeiShort',
      '西北RDC': 'xibeiShort', '华中RDC': 'huazhongShort', '西南RDC': 'xinanShort'
    };
    data = data.filter(d => d[rdcMap[filters.rdc]] > 0);
  }
  if (filters.search) {
    const s = filters.search.toLowerCase();
    data = data.filter(d => d.materialName.toLowerCase().includes(s) || d.materialCode.toLowerCase().includes(s) || d.brand.toLowerCase().includes(s));
  }
  return data;
}

function getFilteredOrders() {
  let data = dataStore.orderDetail;
  if (filters.brand !== 'all') data = data.filter(d => d.brand === filters.brand);
  if (filters.channel !== 'all') data = data.filter(d => d.channel === filters.channel);
  if (filters.rdc !== 'all') data = data.filter(d => d.warehouse === filters.rdc);
  return data;
}

function getFilteredCustomers() {
  // 从订单明细聚合，不再依赖客户订单满足率Sheet
  let data = dataStore.orderDetail;
  if (filters.dataMonth && filters.dataMonth !== 'all') {
    data = data.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth));
  }
  if (filters.rdc !== 'all') data = data.filter(d => d.warehouse === filters.rdc);
  const groupMap = {};
  data.forEach(d => {
    const cg = d.customerGroup;
    if (!cg) return;
    if (filters.search) {
      const s = filters.search.toLowerCase();
      if (!cg.toLowerCase().includes(s)) return;
    }
    if (!groupMap[cg]) groupMap[cg] = { customerGroup: cg, orderQty: 0, firstDayQty: 0, totalFulfillQty: 0, rejectQty: 0 };
    groupMap[cg].orderQty += d.orderQty;
    groupMap[cg].firstDayQty += d.firstDayQty;
    groupMap[cg].totalFulfillQty += d.totalFulfillQty;
    if (d.rejectReason && d.rejectReason.trim()) groupMap[cg].rejectQty += d.orderQty;
  });
  return Object.values(groupMap);
}

function renderOverview() {
  setTitle('总览仪表板');
  const page = document.getElementById('page-overview');
  if (!page) return;

  ensureOverviewDate();
  const sData = getShortageByDate(filters.overviewDate);

  const totalShortAmount = sData.reduce((s,d) => s + d.rdcShortAmount, 0);
  const totalShortBoxes = sData.reduce((s,d) => s + d.rdcShortBoxes, 0);
  const totalTransitBoxes = sData.reduce((s,d) => s + d.rdcTransitTotal, 0);
  const rdcNamesForKpi = ['华南RDC','华北RDC','东北RDC','西北RDC','华中RDC','西南RDC'];
  const rdcKeysForKpi = ['huananShort','huabeiShort','dongbeiShort','xibeiShort','huazhongShort','xinanShort'];
  const affectedRdcs = rdcNamesForKpi.filter((rdc, i) => sData.some(d => d[rdcKeysForKpi[i]] > 0)).length;

  const allOrders = dataStore.orderDetail;
  // 按全局月份过滤订单数据
  const monthOrders = (filters.dataMonth && filters.dataMonth !== 'all')
    ? allOrders.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : allOrders;
  const totalOrderAll = monthOrders.reduce((s,d) => s + d.orderQty, 0);
  const totalFulfillAll = monthOrders.reduce((s,d) => s + d.totalFulfillQty, 0);
  const totalFirstAll = monthOrders.reduce((s,d) => s + d.firstDayQty, 0);
  const monthFulfillRate = totalOrderAll > 0 ? totalFulfillAll / totalOrderAll : 0;
  const dayRate = totalOrderAll > 0 ? totalFirstAll / totalOrderAll : 0;

  const dateLabel = filters.overviewDate || '最新日期';
  const dateDisplay = filters.overviewDate ? '日期：' + filters.overviewDate : '最新日期';
  const sortLabel = { rdcCount: '涉及RDC最多的', boxes: '缺货箱数最多的', amount: '缺货金额最高的', dcSupply: '按大仓供应排序的' };
  const sortTitle = sortLabel[window._overviewShortSort] || '涉及RDC最多的';

  // 构建日期选项列表（按月份过滤）
  const dateSet = new Set();
  const shortageForDates = (filters.dataMonth && filters.dataMonth !== 'all')
    ? dataStore.shortage.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : dataStore.shortage;
  shortageForDates.forEach(d => { if (d.dateStr) dateSet.add(d.dateStr); });
  const dateOptions = [...dateSet].sort().reverse();

  page.innerHTML = `
    <div class="filter-bar">
      <label>缺货日期：</label>
      <select id="filter-overview-date" onchange="filters.overviewDate=this.value;renderOverview()" style="min-width:160px">
        ${dateOptions.map(d => '<option value="'+d+'"'+(filters.overviewDate===d?' selected':'')+'>'+d+'</option>').join('')}
      </select>
      <span style="font-size:11px;color:var(--text-secondary);margin-left:auto">月度/日订单满足率口径为MTD；缺货指标截止至${dateLabel}</span>
    </div>
    <div class="kpi-row">
      <div class="kpi-card blue"><div class="kpi-label">月度订单满足率（MTD）</div><div class="kpi-value">${(monthFulfillRate*100).toFixed(1)}<span class="kpi-unit">%</span></div></div>
      <div class="kpi-card green"><div class="kpi-label">日订单满足率（MTD）</div><div class="kpi-value">${(dayRate*100).toFixed(1)}<span class="kpi-unit">%</span></div></div>
      <div class="kpi-card red"><div class="kpi-label">缺货总金额（截止至${dateLabel}）</div><div class="kpi-value">${formatMoney(totalShortAmount)}</div></div>
      <div class="kpi-card orange"><div class="kpi-label">缺货总箱数（截止至${dateLabel}）</div><div class="kpi-value">${formatNum(totalShortBoxes)}<span class="kpi-unit">箱</span></div></div>
      <div class="kpi-card teal"><div class="kpi-label">在途总箱数（截止至${dateLabel}）</div><div class="kpi-value">${formatNum(totalTransitBoxes)}<span class="kpi-unit">箱</span></div></div>
      <div class="kpi-card purple"><div class="kpi-label">涉及RDC数（截止至${dateLabel}）</div><div class="kpi-value">${affectedRdcs}<span class="kpi-unit">个</span></div></div>
    </div>
    ${(renderOverviewHistory() || '')}
    <div class="row-2">
      <div class="card">
        <div class="card-header"><span class="card-title">RDC日订单满足率趋势</span></div>
        ${renderOverviewRdcCheckboxes()}
        <div class="chart-container" id="chart-fulfill-trend"></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">各RDC缺货金额对比 (${dateLabel})</span></div>
        <div class="chart-container" id="chart-rdc-short-amount"></div>
      </div>
    </div>
    <div class="row-2">
      <div class="card">
        <div class="card-header"><span class="card-title">渠道订单量占比</span></div>
        <div style="padding:8px 12px 0">
          <select id="pie-rdc-filter" onchange="window._pieRdc=this.value;renderOverview()" style="padding:4px 8px;border:1px solid var(--border-card);border-radius:6px;font-size:12px">
            <option value="all" ${(window._pieRdc||'all')==='all'?'selected':''}>全部RDC</option>
            ${RDC_LIST.map(r => '<option value="'+r+'"' + ((window._pieRdc||'')===r?' selected':'') + '>'+r+'</option>').join('')}
          </select>
        </div>
        <div class="chart-container" id="chart-channel-pie-overview"></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">品牌 × RDC 月度订单满足率矩阵</span></div>
        <div class="chart-container" id="chart-brand-rdc-heat"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">缺货概览 - ${sortTitle}Top物料 (${dateLabel})</span></div>
      <div class="table-wrap" id="table-shortage-overview"></div>
    </div>
  `;

  // Chart 1: Daily fulfillment trend (按月份过滤)
  let daily = (filters.dataMonth && filters.dataMonth !== 'all')
    ? dataStore.overall.dailyFulfill.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : dataStore.overall.dailyFulfill;
  // 如果 overall.dailyFulfill 为空，从 orderDetail 计算日趋势
  if (daily.length === 0 && dataStore.orderDetail.length > 0) {
    const dayMap = {};
    dataStore.orderDetail.forEach(d => {
      if (!d.dateStr || !d.warehouse) return;
      const monthMatch = filters.dataMonth && filters.dataMonth !== 'all' ? d.dateStr.startsWith(filters.dataMonth) : true;
      if (!monthMatch) return;
      if (!dayMap[d.dateStr]) dayMap[d.dateStr] = {};
      if (!dayMap[d.dateStr][d.warehouse]) dayMap[d.dateStr][d.warehouse] = { orderQty: 0, firstDayQty: 0 };
      dayMap[d.dateStr][d.warehouse].orderQty += d.orderQty;
      dayMap[d.dateStr][d.warehouse].firstDayQty += d.firstDayQty;
    });
    daily = Object.keys(dayMap).sort().map(dateStr => {
      const rdcMap = dayMap[dateStr];
      return {
        dateStr,
        huanan: (rdcMap['华南RDC'] && rdcMap['华南RDC'].orderQty > 0) ? rdcMap['华南RDC'].firstDayQty / rdcMap['华南RDC'].orderQty : null,
        huabei: (rdcMap['华北RDC'] && rdcMap['华北RDC'].orderQty > 0) ? rdcMap['华北RDC'].firstDayQty / rdcMap['华北RDC'].orderQty : null,        dongbei: (rdcMap['东北RDC'] && rdcMap['东北RDC'].orderQty > 0) ? rdcMap['东北RDC'].firstDayQty / rdcMap['东北RDC'].orderQty : null,
        xibei: (rdcMap['西北RDC'] && rdcMap['西北RDC'].orderQty > 0) ? rdcMap['西北RDC'].firstDayQty / rdcMap['西北RDC'].orderQty : null,
        huazhong: (rdcMap['华中RDC'] && rdcMap['华中RDC'].orderQty > 0) ? rdcMap['华中RDC'].firstDayQty / rdcMap['华中RDC'].orderQty : null,
        xinan: (rdcMap['西南RDC'] && rdcMap['西南RDC'].orderQty > 0) ? rdcMap['西南RDC'].firstDayQty / rdcMap['西南RDC'].orderQty : null
      };
    });
  }
  // 过滤周末和国定假日（与业务提报表口径一致）
  daily = daily.filter(d => isWorkday(d.dateStr));
  if (daily.length > 0) {
    const rdcKeys = ['huanan','huabei','dongbei','xibei','huazhong','xinan'];
    const activeRDCs = getOverviewCheckedRDCs();
    const chart1 = initChart('chart-fulfill-trend');
    const dates = daily.map(d => d.dateStr);
    chart1.setOption({
      tooltip: { 
        trigger: 'axis',
        confine: true,
        textStyle: { fontSize: 11 },
        position: function(point, params, dom, rect, size) {
          // 默认显示在鼠标下方，空间不足则显示在上方
          const below = point[1] + 18;
          const fitsBelow = below + size.contentSize[1] + 10 < size.viewSize[1];
          return { left: Math.min(point[0] + 10, size.viewSize[0] - size.contentSize[0] - 10), top: fitsBelow ? below : point[1] - size.contentSize[1] - 18 };

        formatter: function(params) {
          const dateStr = params[0].axisValue;

          params.forEach(p => {
            const rdc = p.seriesName;
            const rate = (p.value * 100).toFixed(1) + '%';
            html += '<div style="margin-top:6px"><strong>' + rdc + '：' + rate + '</strong></div>';
            const skus = getTopFirstDayShortSKUs(dateStr, rdc, 5);
            html += buildTopShortTipTable(skus, '缺口(箱)', function(s, info){ return (info.boxSpec && s.gap) ? formatNum(Math.round(s.gap / info.boxSpec)) : '—'; }, rdc);
          });
          return html;
        }
      },
      legend: { data: activeRDCs, type: 'scroll', top: 5, left: 10, right: 10, itemGap: 16, textStyle: { fontSize: 11 }, height: 45, pageIconSize: 10, pageButtonGap: 5, pageIconColor: '#2563EB', pageIconInactiveColor: '#94a3b8', pageTextStyle: { fontSize: 10 } },
      grid: { left: 55, right: 20, top: 55, bottom: 60 },
      xAxis: { type: 'category', data: dates, axisLabel: { rotate: 45, fontSize: 10, interval: Math.max(0, Math.floor(dates.length / 10) - 1) }, boundaryGap: true },
      yAxis: { type: 'value', min: 0, max: 1.03, axisLabel: { formatter: v => (v*100).toFixed(0)+'%' } },
      series: activeRDCs.map((rdc, idx) => {
        const key = rdcKeys[RDC_LIST.indexOf(rdc)];

      })

  }

  // Chart 2: RDC shortage amount

  const rdcAmounts = rdcNames.map((rdc, i) => {
    return sData.filter(d => d[rdcKeys[i]] > 0).reduce((s, d) => {

  const chart2 = initChart('chart-rdc-short-amount');
  chart2.setOption({
    tooltip: {
      trigger: 'axis',
      confine: true,
      textStyle: { fontSize: 11 },
      position: function(point, params, dom, rect, size) {
        const below = point[1] + 18;
        const fitsBelow = below + size.contentSize[1] + 10 < size.viewSize[1];
        return { left: Math.min(point[0] + 10, size.viewSize[0] - size.contentSize[0] - 10), top: fitsBelow ? below : point[1] - size.contentSize[1] - 18 };
      },
      formatter: function(p) {
        const rdcName = p[0].name;

        const rdcKey = rdcKeyMap[rdcName];
        let html = '<strong>' + rdcName + '</strong><br/>缺货金额：¥' + p[0].value.toLocaleString();
        const skus = getTopShortageAmountSKUsByRDC(filters.overviewDate, rdcKey, 5);
        html += buildTopShortTipTable(skus, '缺货金额', function(s, info){ return '¥' + formatNum(s.amount) + '<br/><span class="muted">' + formatNum(s.boxes) + '箱</span>'; }, rdcName);
        return html;
      }
    },
    grid: { left: 100, right: 30, top: 10, bottom: 20 },
    xAxis: { type: 'value', axisLabel: { formatter: v => '¥'+(v/10000).toFixed(0)+'万' } },
    yAxis: { type: 'category', data: rdcNames, inverse: true },
    series: [{ type: 'bar', data: rdcAmounts, itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#FEE2E2'},{offset:1,color:'#EF4444'}]) }, label: { show: true, position: 'right', formatter: p => '¥'+(p.value/10000).toFixed(1)+'万', fontSize: 11 } }]
  });

  // Chart 3: Brand x RDC heatmap - dynamic from orderDetail by month
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';
  const monthOrderData = monthFilter
    ? dataStore.orderDetail.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : dataStore.orderDetail;

  // Build brand x RDC fulfillment rate from orderDetail
  const brandRdcMap = {};
  monthOrderData.forEach(d => {
    if (!d.brand || !d.warehouse) return;
    const key = d.brand + '|' + d.warehouse;
    if (!brandRdcMap[key]) brandRdcMap[key] = { orderQty: 0, fulfillQty: 0 };
    brandRdcMap[key].orderQty += d.orderQty;
    brandRdcMap[key].fulfillQty += d.totalFulfillQty;
  });

  const brandSet = new Set();
  Object.keys(brandRdcMap).forEach(k => brandSet.add(k.split('|')[0]));
  const brands = [...brandSet].sort();
  const rdck = ['huanan','huabei','dongbei','xibei','huazhong','xinan'];
  const heatData = [];
  brands.forEach((b, bi) => {
    rdck.forEach((rk, ri) => {
      const rdcName = RDC_LIST[ri];
      const d = brandRdcMap[b + '|' + rdcName];
      const rate = (d && d.orderQty > 0) ? d.fulfillQty / d.orderQty : 0;
      heatData.push([ri, bi, rate]);
    });
  });

  if (brands.length > 0) {
    const chart3 = initChart('chart-brand-rdc-heat');
    chart3.setOption({
      tooltip: {
        confine: true,
        textStyle: { fontSize: 11 },
        formatter: function(p) {
          const brand = brands[p.value[1]];
          const rdc = RDC_LIST[p.value[0]];
          const rate = (p.value[2] * 100).toFixed(1) + '%';
          let html = '<strong>' + brand + ' · ' + rdc + '</strong><br/>月满足率：' + rate;
          const skus = getTopShortageSKUs(brand, rdc, filters.overviewDate, 5);
          if (skus.length > 0) {
            html += buildTopShortTipTable(skus, '缺口(箱)', function(s, info){ return (info.boxSpec && s.gap) ? formatNum(Math.round(s.gap / info.boxSpec)) : '—'; }, rdc);
          } else {
            // 从orderDetail计算当月该品牌×RDC的总缺货
            const monthStr = filters.dataMonth && filters.dataMonth !== 'all' ? filters.dataMonth : (filters.overviewDate ? filters.overviewDate.slice(0, 7) : '');
            const monthGap = dataStore.orderDetail.filter(d => d.brand === brand && d.warehouse === rdc && d.dateStr && d.dateStr.startsWith(monthStr) && d.firstDayShort > 0).reduce((s, d) => s + d.firstDayShort, 0);
            if (monthGap > 0) {
              html += '<br/>当月缺货量：' + formatNum(monthGap) + '支（订单明细）';
              html += '<br/>当日缺货报告无该品牌记录';
            } else {
              html += '<br/>当月该品牌在该RDC下无订单缺货';
            }
          }
          return html;
        }
      },
      grid: { left: 60, right: 30, top: 50, bottom: 40 },
      xAxis: { type: 'category', data: RDC_LIST, position: 'top', axisLabel: { fontSize: 10, rotate: 15, interval: 0 } },
      yAxis: { type: 'category', data: brands, inverse: true },
      visualMap: { min: 0.7, max: 1, calculable: true, orient: 'horizontal', left: 'center', bottom: 0, inRange: { color: ['#FEE2E2','#FEF3C7','#D1FAE5','#A7F3D0','#6EE7B7'] }, formatter: v => (v*100).toFixed(1)+'%' },
      series: [{ type: 'heatmap', data: heatData, label: { show: true, formatter: p => {
        const brand = brands[p.value[1]];
        const rdc = RDC_LIST[p.value[0]];
        const d = brandRdcMap[brand + '|' + rdc];
        if (!d || d.orderQty === 0) return '无订单';
        return (p.value[2]*100).toFixed(1)+'%';
      }, fontSize: 11 }, emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,.3)' } } }]
    });

    ? dataStore.orderDetail.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : dataStore.orderDetail;
  // Precompute customer group breakdown per channel (orderQty + dayRate)
  const chCgMap = {};
  monthOrderData2.forEach(d => {
    if (pieRdcFilter !== 'all' && d.warehouse !== pieRdcFilter) return;
    const ch = d.channel || '其他';
    const cg = d.customerGroup || '未知';
    if (!chCgMap[ch]) chCgMap[ch] = {};
    if (!chCgMap[ch][cg]) chCgMap[ch][cg] = { orderQty: 0, firstDayQty: 0 };
    chCgMap[ch][cg].orderQty += (d.orderQty || 0);
    chCgMap[ch][cg].firstDayQty += (d.firstDayQty || 0);

  const pieData = Object.entries(chCgMap).map(([ch, cgMap]) => ({
    name: ch,
    value: Object.values(cgMap).reduce((s, v) => s + v.orderQty, 0)
  }));
  const breakdown = {};
  Object.entries(chCgMap).forEach(([ch, cgMap]) => {
    breakdown[ch] = Object.entries(cgMap)
      .map(([cg, v]) => ({ name: cg, qty: v.orderQty, rate: v.orderQty > 0 ? (v.firstDayQty / v.orderQty * 100).toFixed(1) : '0.0' }))
      .sort((a, b) => b.qty - a.qty);
  });
  const chartChannel = initChart('chart-channel-pie-overview');
  chartChannel.setOption({
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        const items = breakdown[p.name] || [];
        let html = '<div style="font-weight:600;font-size:13px;margin-bottom:6px">' + p.name + '（总量：' + formatNum(p.value) + '支）</div>';
        html += '<table style="font-size:11px;border-collapse:collapse;width:100%"><tr style="border-bottom:1px solid #ddd"><td style="padding:2px 6px;color:#888">#</td><td style="padding:2px 6px;color:#888">客户组</td><td style="padding:2px 6px;text-align:right;color:#888">订单量</td><td style="padding:2px 6px;text-align:right;color:#888">日满足率</td></tr>';
        items.slice(0, 10).forEach(function(d, i) {
          html += '<tr><td style="padding:2px 6px;color:#aaa;text-align:center">' + (i+1) + '</td><td style="padding:2px 6px">' + d.name + '</td><td style="padding:2px 6px;text-align:right">' + formatNum(d.qty) + '</td><td style="padding:2px 6px;text-align:right">' + d.rate + '%</td></tr>';
        });
        if (items.length > 10) html += '<tr><td colspan="4" style="padding:4px 6px;color:#888;text-align:center">... 共' + items.length + '个客户组</td></tr>';
        html += '</table>';
        return html;
      },
      extraCssText: 'max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,.1);border-radius:8px;padding:10px 12px'
    },
    legend: { bottom: 0, textStyle: { fontSize: 11 } },
    series: [{ type: 'pie', radius: ['40%','70%'], center: ['50%','45%'], data: pieData, label: { formatter: '{b}\n{d}%' }, emphasis: { itemStyle: { shadowBlur: 10 } } }]
  });

  // Table: Top shortage materials - deduplicate by materialCode
  const skuMap = {};
  sData.forEach(d => {
    if (!skuMap[d.materialCode]) {
      skuMap[d.materialCode] = {
        materialCode: d.materialCode, materialName: d.materialName, brand: d.brand,
        abcClass: d.abcClass, rdcShortBoxes: 0, rdcShortAmount: 0, rdcTransitTotal: 0, rdcCount: 0, dcSupply: d.dcSupply
      };
    }
    skuMap[d.materialCode].rdcShortBoxes += d.rdcShortBoxes;
    skuMap[d.materialCode].rdcShortAmount += d.rdcShortAmount;
    skuMap[d.materialCode].rdcTransitTotal += (d.rdcTransitTotal || 0);
    skuMap[d.materialCode].rdcCount = Math.max(skuMap[d.materialCode].rdcCount, d.rdcCount);
  });
  const topShort = Object.values(skuMap).sort((a,b) => b.rdcCount - a.rdcCount || b.rdcShortBoxes - a.rdcShortBoxes).slice(0, 20);
  // 全局存储供排序切换
  window._overviewShortList = Object.values(skuMap);
  window._overviewShortSort = window._overviewShortSort || 'amount';
  let displayList = [...window._overviewShortList];
  if (window._overviewShortSort === 'boxes') displayList.sort((a,b) => b.rdcShortBoxes - a.rdcShortBoxes);
  else if (window._overviewShortSort === 'amount') displayList.sort((a,b) => b.rdcShortAmount - a.rdcShortAmount);
  else if (window._overviewShortSort === 'rdcCount') displayList.sort((a,b) => b.rdcCount - a.rdcCount || b.rdcShortBoxes - a.rdcShortBoxes);
  else if (window._overviewShortSort === 'dcSupply') displayList.sort((a,b) => (a.dcSupply||'').localeCompare(b.dcSupply||''));
  displayList = displayList.slice(0, 20);
  const sortActive = (k) => window._overviewShortSort === k ? 'background:var(--color-blue);color:#fff;' : '';
  const tableHtml = '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--text-secondary)">排序：</span>' +
    `<button class="btn-export" style="font-size:11px;padding:4px 10px;${sortActive('rdcCount')}" onclick="window._overviewShortSort='rdcCount';renderOverview()">涉及RDC数</button>` +
    `<button class="btn-export" style="font-size:11px;padding:4px 10px;${sortActive('boxes')}" onclick="window._overviewShortSort='boxes';renderOverview()">缺货箱数</button>` +
    `<button class="btn-export" style="font-size:11px;padding:4px 10px;${sortActive('amount')}" onclick="window._overviewShortSort='amount';renderOverview()">缺货金额</button>` +
    `<button class="btn-export" style="font-size:11px;padding:4px 10px;${sortActive('dcSupply')}" onclick="window._overviewShortSort='dcSupply';renderOverview()">大仓供应</button>` +
    `<button class="btn-export" style="font-size:11px;padding:4px 10px;margin-left:auto;background:var(--color-orange)" onclick="window._showAllShortage=!window._showAllShortage;renderOverview()">${window._showAllShortage?'返回Top20':'展示所有缺货信息'}</button>` +
    '</div>' +
    (window._showAllShortage ? renderAllShortageTable(sData) : '<table class="data-table"><thead><tr><th>物料号</th><th>物料名称</th><th>品牌</th><th>ABC</th><th>缺货箱数</th><th>在途箱数</th><th>缺货金额</th><th>涉及RDC数</th><th>大仓供应</th></tr></thead><tbody>' +
    displayList.map(d => `<tr>
      <td>${d.materialCode}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.materialName}">${d.materialName}</td>
      <td>${d.brand}</td><td>${d.abcClass}</td>
      <td class="num">${formatNum(d.rdcShortBoxes)}</td><td class="num">${formatNum(d.rdcTransitTotal || 0)}</td><td class="num">${formatMoney(d.rdcShortAmount)}</td>
      <td class="num"><span class="badge ${d.rdcCount>=4?'badge-red':d.rdcCount>=2?'badge-orange':'badge-green'}">${d.rdcCount}</span></td>
      <td>${d.dcSupply}</td></tr>`).join('') + '</tbody></table>');
  document.getElementById('table-shortage-overview').innerHTML = tableHtml;

  // 月度订单满足率历史趋势（2025 vs 2026）

// 月度订单满足率历史趋势卡片（图表渲染）
function renderOverviewHistoryCharts() {

      { name: '2026', type: 'line', data: arr26, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { width: 2 }, color: '#2563EB' }
