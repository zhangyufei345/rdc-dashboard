      label: { show: true, position: 'top', formatter: '{c}%', fontSize: 10 }
    };
  });

  compareChart.setOption({
    tooltip: { trigger: 'axis', formatter: function(p) {
      let res = p[0].axisValue + '<br/>';
      p.forEach(item => {
        if (item.value) res += item.marker + ' ' + item.seriesName + '：' + item.value + '%<br/>';
      });
      return res;
    }},
    legend: { bottom: 0, textStyle: { fontSize: 11 } },
    grid: { top: 30, left: 10, right: 10, bottom: 40, containLabel: true },
    xAxis: { type: 'category', data: chartMonths, axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', name: '进度%', max: v => Math.min(Math.ceil(v.max/50)*50, 2500) || 100, axisLabel: { formatter: '{value}%', fontSize: 11 } },
    series: progressSeries,
    animation: true
  });

  // 注册图表到resize列表
  window._chartInstances = window._chartInstances || [];
  window._chartInstances.push(compareChart);

  setTimeout(() => { compareChart.resize(); }, 100);
}

/**
 * 导出业务需求对比表为CSV
 */
function exportBizDemandTable() {
  const f = window._bizDemandFilters;
  const summary = getBizDemandSummary(f);
  let csv = '\uFEFF月份,RDC,渠道,提报量,出货量,出货进度(%),SKU数\n';
  summary.forEach(r => {
    csv += [r.month, r.rdc, r.channel, r.demand, r.shipped, r.progress.toFixed(1), r.skuCount].join(',') + '\n';
  });
  downloadFile('业务需求满足分析_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

/**
 * 导出下钻SKU明细为CSV
 */
function exportBizDemandDetail() {
  const rows = window._bizDrillRows || [];
  if (rows.length === 0) {
    showToast('当前无数据可导出', true);
    return;
  }
  let csv = '\uFEFF月份,RDC,产品编码,产品名称,箱规,经销商提报,KA提报,新通路提报,经销商出货,KA出货,新通路出货,总提报,总出货,出货进度(%)\n';
  rows.forEach(d => {
    csv += [
      d.month, d.rdc, d.opCode, d.productName, d.boxSpec,
      d.dealerD, d.kaD, d.ncD, d.dealerS, d.kaS, d.ncS,
      d.totalD, d.totalS, d.progress.toFixed(1)
    ].join(',') + '\n';
  });
  const filter = window._bdDetailFilter || {};
  const name = '需求满足SKU明细_' + (filter.month || '全部') + '_' + (filter.rdc || '全部RDC') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  downloadFile(name, csv);
}

/**
 * 业务需求满足分析 — SKU明细独立页面（提报 vs 出货对比）
 */
window._bizDrillPage = 1;
function renderBizDemandDetail() {
  setTitle('需求满足分析 · SKU明细');
  const page = document.getElementById('page-biz-demand-detail');
  const filter = window._bdDetailFilter || { month: 'all', rdc: 'all', channel: 'all' };
  const filterMonth = filter.month || 'all';
  const filterRdc = filter.rdc || 'all';
  const filterCh = filter.channel || 'all';

  if (!dataStore.loaded || !dataStore.bizDemand || dataStore.bizDemand.length === 0) {
    page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)"><div style="font-size:48px;margin-bottom:16px">📋</div><div style="font-size:var(--font-size-lg)">暂无业务需求数据</div></div>';
    return;
  }

  // 收集所有月份（用于出货窗口匹配）
  const sortedMonths = [...new Set((dataStore.bizDemand||[]).map(d=>d.dateStr&&d.dateStr.slice(0,7)).filter(Boolean))].sort();

  // ===== 1. 按SKU×月×RDC聚合提报需求（去重） =====
  const biz = (dataStore.bizDemand || []).filter(d => {
    if (filterMonth !== 'all' && d.dateStr.slice(0,7) !== filterMonth) return false;
    if (filterRdc !== 'all' && normalizeRdcName(d.rdc) !== filterRdc) return false;
    return true;
  });

  const dedupKeys = new Set();
  const skuMap = {}; // key: "month|rdc|opCode" => { dealer, ka, newChannel }

  biz.forEach(d => {
    const m = d.dateStr.slice(0, 7);
    const nrdc = normalizeRdcName(d.rdc);
    const sk = m + '|' + nrdc + '|' + d.opCode;

    // 去重：同月同RDC同SKU同渠道同需求值只计一次
    const dealerVal = d.dealerDemand || 0;
    if (dealerVal > 0) {
      const dk = sk + '|dealer|' + dealerVal;
      if (!dedupKeys.has(dk)) {
        dedupKeys.add(dk);
        if (!skuMap[sk]) skuMap[sk] = { month: m, rdc: nrdc, opCode: d.opCode, productName: d.productName, boxSpec: d.boxSpec, dealerD: 0, kaD: 0, ncD: 0 };
        skuMap[sk].dealerD += dealerVal;
        if (!skuMap[sk].prodName && d.productName) { skuMap[sk].productName = d.productName; skuMap[sk].boxSpec = d.boxSpec; }
      }
    }
    const kaVal = d.kaDemand || 0;
    if (kaVal > 0) {
      const dk = sk + '|ka|' + kaVal;
      if (!dedupKeys.has(dk)) {
        dedupKeys.add(dk);
        if (!skuMap[sk]) skuMap[sk] = { month: m, rdc: nrdc, opCode: d.opCode, productName: d.productName, boxSpec: d.boxSpec, dealerD: 0, kaD: 0, ncD: 0 };
        skuMap[sk].kaD += kaVal;
        if (!skuMap[sk].prodName && d.productName) { skuMap[sk].productName = d.productName; skuMap[sk].boxSpec = d.boxSpec; }
      }
    }
    const ncVal = d.newChannel || 0;
    if (ncVal > 0) {
      const dk = sk + '|newChannel|' + ncVal;
      if (!dedupKeys.has(dk)) {
        dedupKeys.add(dk);
        if (!skuMap[sk]) skuMap[sk] = { month: m, rdc: nrdc, opCode: d.opCode, productName: d.productName, boxSpec: d.boxSpec, dealerD: 0, kaD: 0, ncD: 0 };
        skuMap[sk].ncD += ncVal;
        if (!skuMap[sk].prodName && d.productName) { skuMap[sk].productName = d.productName; skuMap[sk].boxSpec = d.boxSpec; }
      }
    }
  });

  // ===== 2. 按SKU×月×RDC聚合出货（从订单明细） =====
  // 需要map SKU code to name (from bizDemand)
  const skuNameMap = {};
  dataStore.bizDemand.forEach(d => {
    if (d.opCode && d.productName) skuNameMap[d.opCode] = d.productName;
  });

  // 每个 SKU×RDC×月 的最早补货日期（出货计入时间下限）
  const skuSubmitDate = {}; // key: month|rdc|opCode => 最早补货日期(YYYY-MM-DD)
  biz.forEach(d => {
    const m = d.dateStr.slice(0, 7);
    const nrdc = normalizeRdcName(d.rdc);
    const anyDemand = (d.dealerDemand||0) + (d.kaDemand||0) + (d.newChannel||0);
    if (anyDemand <= 0) return;
    const sk = m + '|' + nrdc + '|' + d.opCode;
    if (!skuSubmitDate[sk] || d.dateStr < skuSubmitDate[sk]) skuSubmitDate[sk] = d.dateStr;
  });

  const orders = dataStore.orderDetail || [];
  const shipMap = {}; // key: "month|rdc|opCode|channel" => qty

  orders.forEach(d => {
    if (!d.dateStr || d.dateStr.length < 10 || !d.skuCode) return;
    const orderMonth = d.dateStr.slice(0, 7);
    const ch = mapOrderChannel(d);
    if (ch === '其他') return;

    // 匹配到对应月份的需求窗口（按月份降序，优先归属到自身所在月份）
    for (const mi of sortedMonths.slice().reverse()) {
      const cutoff = getNextMonth15Cutoff(mi);
      if (orderMonth === mi || (orderMonth > mi && d.dateStr <= cutoff)) {
        const mNum = parseInt(mi.split('-')[1]);
        const oNum = parseInt(orderMonth.split('-')[1]);
        if (oNum > mNum + 1) continue;

        // 应用筛选
        if (filterMonth !== 'all' && mi !== filterMonth) { continue; }
        const wrh = normalizeRdcName(d.warehouse || '');
        if (filterRdc !== 'all' && wrh !== filterRdc) { continue; }

        const baseKey = mi + '|' + wrh + '|' + d.skuCode;
        if (skuMap[baseKey]) {
          // 时间下限：仅计入"补货日期之后"（SAP放行日期 严格 > 该SKU最早补货日期）产生的出货
          const submitDate = skuSubmitDate[baseKey];
          if (!submitDate || d.dateStr > submitDate) {
            const sk = baseKey + '|' + ch;
            shipMap[sk] = (shipMap[sk] || 0) + (d.firstDayQty || 0);
          }
        }
        break;
      }
    }
  });

  // ===== 3. 合并成显示行，计算出货进度 =====
  let displayRows = Object.values(skuMap).map(s => {
    const skBase = s.month + '|' + s.rdc + '|' + s.opCode;
    const dealerS = shipMap[skBase + '|经销商'] || 0;
    const kaS = shipMap[skBase + '|KA'] || 0;
    const ncS = shipMap[skBase + '|新通路'] || 0;
    const totalD = s.dealerD + s.kaD + s.ncD;
    const totalS = dealerS + kaS + ncS;
    const progress = totalD > 0 ? (totalS / totalD * 100) : 0;
    return { ...s, dealerS, kaS, ncS, totalD, totalS, progress };
  });

  // 如果指定了渠道，只保留该渠道有需求的SKU，并按该渠道需求降序排列
  if (filterCh !== 'all') {
    const getVal = r => filterCh==='经销商' ? r.dealerD : filterCh==='KA' ? r.kaD : r.ncD;
    displayRows = displayRows.filter(r => getVal(r) > 0);
    displayRows.sort((a,b) => getVal(b) - getVal(a));
  } else {
    displayRows.sort((a,b) => b.totalD - a.totalD);
  }

  // 保存到全局，供导出使用
  window._bizDrillRows = displayRows;

  // 分页
  const pageSize = 20;
  const totalPages = Math.max(1, Math.ceil(displayRows.length / pageSize));
  let p = window._bizDrillPage || 1;
  if (p > totalPages) p = totalPages;
  window._bizDrillPage = p;
  const startIdx = (p - 1) * pageSize;
  const pageData = displayRows.slice(startIdx, startIdx + pageSize);

  const titleText = (filterMonth==='全部'?'全部月份':filterMonth) + ' · ' + (filterRdc==='全部'?'全部RDC':filterRdc) + (filterCh&&filterCh!=='all'?' · '+filterCh:'');

  let html = '';
  html += '<div style="padding:16px 20px;background:var(--bg-card);border-radius:12px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
  html += '<button class="btn-export" onclick="navigateTo(\'biz-demand\')" style="display:flex;align-items:center;gap:4px">← 返回需求满足分析</button>';
  html += '<span style="font-size:14px;font-weight:600;color:var(--text-primary)">SKU明细 — ' + titleText + '</span>';
  html += '<button class="btn-export" onclick="exportBizDemandDetail()">导出CSV</button>';
  html += '<span style="font-size:11px;color:var(--text-secondary);margin-left:auto">共 ' + displayRows.length + ' 条SKU · 需求已去重（同SKU同渠道同数量重复提报只计一次） · 出货窗口：当月至次月15日</span>';
  html += '</div>';

  html += '<div class="card"><div style="overflow-x:auto"><table class="data-table"><thead><tr style="background:var(--bg-primary)">';
  html += '<th rowspan="2" style="vertical-align:middle">月份</th><th rowspan="2" style="vertical-align:middle">RDC</th><th rowspan="2" style="vertical-align:middle">产品编码</th><th rowspan="2" style="vertical-align:middle">产品名称</th><th rowspan="2" style="vertical-align:middle">箱规</th>';
  html += '<th colspan="3" style="text-align:center;background:#DBEAFE">📋 业务提报</th>';
  html += '<th colspan="3" style="text-align:center;background:#DCFCE7">📦 实际出货</th>';
  html += '<th rowspan="2" class="num" style="vertical-align:middle">出货进度</th>';
  html += '</tr><tr style="background:var(--bg-primary)">';
  html += '<th class="num" style="color:#3B82F6">经销商</th><th class="num" style="color:#8B5CF6">KA</th><th class="num" style="color:#14B8A6">新通路</th>';
  html += '<th class="num" style="color:#059669">经销商</th><th class="num" style="color:#7C3AED">KA</th><th class="num" style="color:#0D9488">新通路</th>';
  html += '</tr></thead><tbody>';

  if (pageData.length === 0) {
    html += '<tr><td colspan="12" style="text-align:center;padding:30px;color:var(--text-secondary)">无数据</td></tr>';
  } else {
    pageData.forEach(d => {
      const progressColor = d.progress >= 95 ? 'var(--color-green)' : d.progress >= 70 ? 'var(--color-orange)' : 'var(--color-red)';
      html += '<tr>';
      html += '<td>' + d.month + '</td><td>' + d.rdc + '</td><td>' + d.opCode + '</td>';
      html += '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + d.productName + '">' + d.productName + '</td>';
      html += '<td>' + d.boxSpec + '</td>';
      html += '<td class="num" style="color:#3B82F6;font-weight:600">' + (d.dealerD>0?formatNum(d.dealerD):'-') + '</td>';
      html += '<td class="num" style="color:#8B5CF6;font-weight:600">' + (d.kaD>0?formatNum(d.kaD):'-') + '</td>';
      html += '<td class="num" style="color:#14B8A6;font-weight:600">' + (d.ncD>0?formatNum(d.ncD):'-') + '</td>';
      html += '<td class="num">' + (d.dealerS>0?formatNum(d.dealerS):'-') + '</td>';
      html += '<td class="num">' + (d.kaS>0?formatNum(d.kaS):'-') + '</td>';
      html += '<td class="num">' + (d.ncS>0?formatNum(d.ncS):'-') + '</td>';
      html += '<td class="num"><span style="color:' + progressColor + ';font-weight:600">' + d.progress.toFixed(1) + '%</span></td>';
      html += '</tr>';
    });
  }
  html += '</tbody></table></div>';

  html += '<div style="display:flex;justify-content:center;gap:8px;padding:12px 0;align-items:center">' +
    '<button class="btn-export" style="padding:4px 12px;font-size:12px" onclick="window._bizDrillPage=Math.max(1,window._bizDrillPage-1);renderBizDemandDetail()" ' + (p<=1?'disabled':'') + '>上一页</button>' +
    '<span style="font-size:12px">第' + p + '/' + totalPages + '页（共' + displayRows.length + '条）</span>' +
    '<button class="btn-export" style="padding:4px 12px;font-size:12px" onclick="window._bizDrillPage=Math.min('+totalPages+',window._bizDrillPage+1);renderBizDemandDetail()" ' + (p>=totalPages?'disabled':'') + '>下一页</button>' +
    '</div></div>';

  page.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', resizeAllCharts);
</script>
