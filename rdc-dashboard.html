          window._replStatus = req.result.replStatus;
        }
      };
    }
  } catch(e) {}

  // Utility function
  function fmtNum(n) { return n == null ? '-' : n % 1 ? n.toFixed(1) : n.toLocaleString(); }
  function fmtPct(n) { return n == null ? '-' : (n*100).toFixed(1) + '%'; }

  // Count by urgency
  var emergencyCount = displayList.filter(function(d) { return d.urgency === 'emergency'; }).length;
  var importantCount = displayList.filter(function(d) { return d.urgency === 'important'; }).length;
  var attentionCount = displayList.filter(function(d) { return d.urgency === 'attention'; }).length;

  var dailyHtml = '<div class="card" style="margin-bottom:16px">' +
    '<div class="card-header"><span class="card-title">🔴 每日补货建议</span><span style="font-size:11px;color:var(--text-secondary);margin-left:auto">分析日期：' + latestDate + ' | ' + monthLabel + '</span><button onclick="navigateTo(\'replenish-logic\')" style="margin-left:12px;padding:6px 14px;border:2px solid var(--color-blue);color:var(--color-blue);background:transparent;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;font-weight:600;">📖 补货建议逻辑</button></div>' +
    '<div style="margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">' +
    '<div style="flex:1;min-width:120px;border:1px solid var(--border-card);border-radius:8px;padding:10px;text-align:center;background:#F8FAFC">' +
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px">🔴 紧急</div><div style="font-size:24px;font-weight:600;color:#EF4444">' + emergencyCount + '</div><div style="font-size:10px;color:var(--text-secondary)">评分≥70</div></div>' +
    '<div style="flex:1;min-width:120px;border:1px solid var(--border-card);border-radius:8px;padding:10px;text-align:center;background:#F8FAFC">' +
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px">🟡 重要</div><div style="font-size:24px;font-weight:600;color:#F59E0B">' + importantCount + '</div><div style="font-size:10px;color:var(--text-secondary)">40≤评分<70</div></div>' +
    '<div style="flex:1;min-width:120px;border:1px solid var(--border-card);border-radius:8px;padding:10px;text-align:center;background:#F8FAFC">' +
    '<div style="font-size:11px;color:var(--text-secondary);margin-bottom:2px">🔵 关注</div><div style="font-size:24px;font-weight:600;color:#2563EB">' + attentionCount + '</div><div style="font-size:10px;color:var(--text-secondary)">评分<40</div></div>' +
    '<div style="flex:1;min-width:120px;border:1px solid var(--border-card);border-radius:8px;padding:10px;text-align:center;background:#F8FAFC">' +

    '</div>';

  // RDC filter & export
  dailyHtml += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">' +

    '<option value="all"' + (rdcFilter==='all'?' selected':'') + '>全部RDC</option>' +
    rdcKeys.map(function(r) { return '<option value="'+r+'"'+(rdcFilter===r?' selected':'')+'>'+r+'</option>'; }).join('') +
    '</select>' +
    '<span style="font-size:11px;color:var(--text-secondary);margin-left:auto">共 ' + displayList.length + ' 条</span>' +

    '</div>';

  // Table
  dailyHtml += '<div class="table-wrap" style="max-height:500px;overflow-y:auto"><table class="data-table">' +

        '<td><span style="padding:2px 6px;border-radius:4px;font-size:10px;color:' + d.urgencyColor + ';background:' + d.urgencyBg + '">' + d.urgencyLabel + '</span></td>' +
        '</tr>';
    });
  }
  dailyHtml += '</tbody></table></div></div>';

  // ==== MID-TERM STRATEGY HTML ====
  var midHtml = '<div class="card" style="margin-bottom:16px">' +
    '<div class="card-header"><span class="card-title">🔵 中期补货策略调整</span><span style="font-size:11px;color:var(--text-secondary);margin-left:auto">基于近60天数据分析（含上月） | ' + monthLabel + '</span></div>';

  // 1. Distribution adjustments
  midHtml += '<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:8px">分仓需求调整</div>';

  if (distAdjustments.length === 0) {

  } else {

    distAdjustments.forEach(function(d) {

  midHtml += '</div>';

  midHtml += '<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:8px">安全库存调整</div>';

  if (ssAdjustments.length === 0) {
    midHtml += '<div style="padding:12px;background:#F0FDF4;border-radius:6px;font-size:11px;color:#065F46">当前各SKU库存水位在合理范围内</div>';
  } else {
    midHtml += '<table class="data-table"><thead><tr><th>SKU编码</th><th>RDC</th><th>日均需求</th><th>标准差</th><th>CV</th><th>理论SS</th><th>当前库存</th><th>建议</th></tr></thead><tbody>';
    ssAdjustments.forEach(function(d) {
      var sugColor = d.suggestion.indexOf('上调') >= 0 ? '#DC2626' : d.suggestion.indexOf('下调') >= 0 ? '#065F46' : '#2563EB';
      var sugBg = d.suggestion.indexOf('上调') >= 0 ? '#FEE2E2' : d.suggestion.indexOf('下调') >= 0 ? '#D1FAE5' : '#DBEAFE';
      midHtml += '<tr><td>' + d.skuCode + '</td><td>' + d.rdc + '</td><td class="num">' + d.dailyMean + '</td><td class="num">' + d.stdDev + '</td><td class="num">' + d.cv + '</td><td class="num" style="font-weight:500">' + d.ss + '</td><td class="num">' + d.currentStock + '</td><td><span style="padding:2px 6px;border-radius:4px;font-size:10px;color:' + sugColor + ';background:' + sugBg + '">' + d.suggestion + '</span></td></tr>';
    });
    midHtml += '</tbody></table>';
  }
  midHtml += '</div>';

  // 3. Anomaly patterns
  midHtml += '<div><div style="font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:8px">异常模式检测</div>';
  if (anomalies.length === 0) {
    midHtml += '<div style="padding:12px;background:#F0FDF4;border-radius:6px;font-size:11px;color:#065F46">近60天未检测到异常补货模式</div>';
  } else {
    midHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">';

      var sevBg = '#FEF2F2';

      midHtml += '<div style="border:1px solid ' + sevColor.replace('DC2626','FCA5A5') + ';border-radius:8px;padding:10px;background:' + sevBg + '">' +
        '<div style="font-size:12px;font-weight:500;color:' + sevColor + ';margin-bottom:4px">' + a.type + '</div>' +

    });

function exportReplenishmentCSV() {
  var shortageData = dataStore.shortage;
  var orderData = dataStore.orderDetail;
  var shortageReasons = window._shortageReasons || {};
  var allDates = shortageData.map(function(d) { return d.dateStr; }).filter(Boolean).sort();
  var latestDate = allDates[allDates.length - 1];
  if (!latestDate) return;

  var rdcNames = ['huananShort','huabeiShort','dongbeiShort','xibeiShort','huazhongShort','xinanShort'];
  var rdcKeys = ['华南RDC','华北RDC','东北RDC','西北RDC','华中RDC','西南RDC'];
  var sixtyDaysAgoExp = new Date(latestDate);
  sixtyDaysAgoExp.setDate(sixtyDaysAgoExp.getDate() - 60);
  var sixtyDaysAgoStrExp = sixtyDaysAgoExp.toISOString().slice(0, 10);
  var analysisDaysExp = Math.min(60, Math.ceil((new Date(latestDate) - sixtyDaysAgoExp) / 86400000));

  var csv = '\uFEFF评分,SKU编码,物料名称,品牌,ABC,RDC,今日缺口箱数,近60天日均需求,月满足率,建议补货量,缺货原因,应对建议,紧急度,处理状态\n';
  var dmMap = {};
  orderData.forEach(function(d) {
    if (d.dateStr < sixtyDaysAgoStrExp || d.dateStr > latestDate) return;
    var dmKey = d.skuCode + '|' + d.warehouse;
    if (!dmMap[dmKey]) dmMap[dmKey] = { total: 0, fulfill: 0 };
    dmMap[dmKey].total += d.orderQty;
    dmMap[dmKey].fulfill += d.totalFulfillQty;
  });

  // Reuse the same scoring logic for export
  var latestShortage = shortageData.filter(function(d) { return d.dateStr === latestDate; });
  latestShortage.forEach(function(d) {
    if (d.dcSupply && d.dcSupply.indexOf('整体缺货') >= 0 && d.rdcTransitTotal <= 0) return;
    rdcKeys.forEach(function(rdcName, idx) {
      var rdcKey = rdcNames[idx];
      var shortVal = d[rdcKey] || 0;
      if (shortVal <= 0) return;
      var dmKey = d.materialCode + '|' + rdcName;
      var dm = dmMap[dmKey] || { total: 0, fulfill: 0 };
      var dailyAvg = dm.total > 0 ? dm.total / analysisDaysExp : 0;
      var fulfillRate = dm.total > 0 ? dm.fulfill / dm.total : 0;
      var suggestQty = Math.max(0, Math.round(dailyAvg * 4 - (d.dcStock||0) - (d.rdcTransitTotal||0)));
      var reasonKey = d.dateStr + '|' + d.materialCode + '|' + rdcName;
      var reason = shortageReasons[reasonKey] || '';
      var advice = reason ? (reason.indexOf('总仓缺货')>=0?'需总仓协调':reason.indexOf('KA库')>=0?'协调KA库':reason.indexOf('效期')>=0?'调拨替代批次':'待确认') : '待确认原因';
      var abcCoeff = d.abcClass==='A'?1.0:d.abcClass==='B'?0.6:0.3;
      var score = Math.round(((1-fulfillRate)*0.25 + abcCoeff*0.15 + (shortVal/(shortVal+100))*0.35)*100);
      var status = (window._replStatus||{})[d.materialCode+'|'+rdcName] ? '已处理' : '待处理';
      csv += score + ',' + d.materialCode + ',"' + (d.materialName||'').replace(/"/g,'""') + '",' + d.brand + ',' + (d.abcClass||'C') + ',' + rdcName + ',' + shortVal + ',' + Math.round(dailyAvg) + ',' + (fulfillRate*100).toFixed(1) + '%,' + suggestQty + ',"' + reason + '","' + advice + '",' + (score>=70?'紧急':score>=40?'重要':'关注') + ',' + status + '\n';
    });
  });
  downloadFile('补货建议_' + latestDate + '.csv', csv);
}

  function fmtPctChange(newVal, oldVal) {
    if (!oldVal) return '';
    const chg = ((newVal - oldVal) / oldVal * 100).toFixed(1);
    const arrow = newVal > oldVal ? '↑' : '↓';
    const color = newVal > oldVal ? '#EF4444' : '#10B981';

      if (invKeys[k].indexOf(rdc) >= 0 && invKeys[k].indexOf('总部') < 0 && invKeys[k].indexOf('共享') < 0) {

// 库存规模年度对比卡片（图表 + KPI 渲染）
function renderInventoryTurnoverHistoryCharts() {
  if (!dataStore.history || !dataStore.history.inventory) return;
  const INV = dataStore.history.inventory;
  const months12 = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  function sumKeys(map, i, skip) { let s = 0; Object.keys(map).forEach(k => { if (skip && k.indexOf(skip) >= 0) return; const v = map[k] && map[k][i]; if (v != null) s += v; }); return s; }
  const amt25 = months12.map((_, i) => sumKeys(INV['2025'].inventoryAmount, i));
  const amt26 = months12.map((_, i) => (i < 6 ? sumKeys(INV['2026'].inventoryAmount, i) : null));
  // 出货成本：2026 总仓源数据缺失(null)，为口径一致，两年度均剔除总仓
  const ship25 = months12.map((_, i) => sumKeys(INV['2025'].shipmentCost, i, '总仓'));
  const ship26 = months12.map((_, i) => (i < 6 ? sumKeys(INV['2026'].shipmentCost, i, '总仓') : null));
  let ytd26 = 0; for (let i = 0; i < 6; i++) ytd26 += sumKeys(INV['2026'].shipmentCost, i, '总仓');
  let ann25 = 0; for (let i = 0; i < 12; i++) ann25 += sumKeys(INV['2025'].shipmentCost, i, '总仓');
  const annualized26 = ytd26 / 6 * 12;
  const shipYoY = ann25 > 0 ? (annualized26 - ann25) / ann25 : 0;
  let avgAmt25 = 0, avgAmt26 = 0;
  for (let i = 0; i < 12; i++) avgAmt25 += amt25[i];
  for (let i = 0; i < 6; i++) avgAmt26 += amt26[i];
  avgAmt25 /= 12; avgAmt26 /= 6;
  const amtYoY = avgAmt25 > 0 ? (avgAmt26 - avgAmt25) / avgAmt25 : 0;
  function fmtK(n) { return (n / 10000).toFixed(1) + '万'; }
  function chgColor(d) { return d >= 0 ? 'var(--color-red)' : 'var(--color-green)'; }
  const kpiHtml = '<div class="kpi-row" style="padding:0 12px 8px">' +
    '<div class="kpi-card orange"><div class="kpi-label">2026上半年RDC出货成本（年化）</div><div class="kpi-value">' + fmtK(annualized26) + '<span class="kpi-unit">千</span></div><div style="font-size:11px">2025（RDC）：' + fmtK(ann25) + '千 · 同比 <span style="color:' + chgColor(shipYoY) + '">' + (shipYoY >= 0 ? '+' : '') + (shipYoY * 100).toFixed(1) + '%</span><br/>（不含总仓：2026总仓源数据缺失）</div></div>' +
    '<div class="kpi-card blue"><div class="kpi-label">月均总库存金额（上半年）</div><div class="kpi-value">' + fmtK(avgAmt26) + '<span class="kpi-unit">千</span></div><div style="font-size:11px">2025月均：' + fmtK(avgAmt25) + '千 · 同比 <span style="color:' + chgColor(amtYoY) + '">' + (amtYoY >= 0 ? '+' : '') + (amtYoY * 100).toFixed(1) + '%</span></div></div>' +
    '</div>';
  document.getElementById('kpi-inv-history').innerHTML = kpiHtml;

  function lineChart(elId, title25, title26, arr25, arr26) {
    const c = initChart(elId);
    c.setOption({
      tooltip: { trigger: 'axis', confine: true, textStyle: { fontSize: 11 }, formatter: function (p) { let h = '<strong>' + p[0].axisValue + '</strong>'; p.forEach(s => { if (s.value != null) h += '<br/>' + s.marker + s.seriesName + '：' + (s.value / 10000).toFixed(1) + '万'; }); return h; } },
      legend: { data: [title25, title26], top: 0, left: 'center', textStyle: { fontSize: 11 } },
      grid: { left: 60, right: 20, top: 40, bottom: 30 },
      xAxis: { type: 'category', data: months12, axisLabel: { fontSize: 10, interval: 0 } },
      yAxis: { type: 'value', axisLabel: { formatter: v => (v / 10000).toFixed(0) + '万' } },
      series: [
        { name: title25, type: 'line', data: arr25, smooth: true, symbol: 'none', lineStyle: { width: 2, type: 'dashed' }, color: '#94a3b8' },
        { name: title26, type: 'line', data: arr26, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { width: 2 }, color: '#2563EB' }
      ]
    });
  }
  lineChart('chart-inv-history-amount', '2025总库存', '2026总库存', amt25, amt26);
  lineChart('chart-inv-history-ship', '2025出货成本', '2026出货成本', ship25, ship26);
}

  window.addEventListener('hashchange', handleHash);

  if (isAuthenticated) {
    // ===== 快速加载：manifest 变更检测 + IndexedDB 缓存 + JSON 优先 + xlsx 回退 =====
    function getStoredHashes() {
      try { return JSON.parse(localStorage.getItem('rdc_manifest_hashes') || 'null'); } catch (e) { return null; }
    }
    function setStoredHashes(h) {
      try { localStorage.setItem('rdc_manifest_hashes', JSON.stringify(h)); } catch (e) {}
    }
    function fileOrderKey(f) {
      if (f === 'data.json') return 0;
      if (f.indexOf('data-') === 0) return 1;
      if (f === 'inventory.json') return 2;
      if (f === 'history.json') return 2.5;
      return 3;
    }
    function applyPreparsed(filename, j) {
      const wb = { __preparsed: true, SheetNames: j.sheetNames, Sheets: j.sheets };
      if (filename === 'inventory.json') parseInventoryExcel(wb);
      else if (filename === 'data.json') { window._boxSpec = (j && j.boxSpecMap) || {}; parseExcel(wb, 'replace'); }
      else if (filename.indexOf('data-') === 0) parseExcel(wb, 'append', { skipTransship: true });
      else if (filename === 'history.json') { dataStore.history = j; }
    }
    async function bootLoad() {
      // 1) IndexedDB 恢复（秒开首屏）
      const restored = await loadFromIDB();
      // 自动选中最新月份（在首次渲染前生效，避免先渲染"全部月份"再闪烁切换）
      if (window._latestMonth && filters.dataMonth === 'all') filters.dataMonth = window._latestMonth;
      if (restored) renderAll();

      // 检测缓存异常：bizDemand 仅有单月数据时，清除哈希缓存强制全量重拉（修复 replace 清空归档的旧 bug）
      if (restored && dataStore.bizDemand && dataStore.bizDemand.length > 0) {
        var bizMonths = {};
        dataStore.bizDemand.forEach(function(d) { if (d.dateStr) bizMonths[d.dateStr.slice(0,7)] = true; });

          console.warn('缓存中 bizDemand 仅有单月数据(' + (Object.keys(bizMonths)[0] || '无') + ')，怀疑缓存异常，强制全量重拉');
          try { localStorage.removeItem('rdc_manifest_hashes'); } catch(e) {}
        }
      }

      // 2) manifest 变更检测：仅拉取哈希变化的文件
      let manifest = null;
      try {
        const mres = await fetch('./manifest.json', { cache: 'no-cache' });
        if (mres.ok) manifest = await mres.json();
      } catch (e) { manifest = null; }

      // 自动检测新版本并强制刷新（根治浏览器陈旧缓存：品牌归并"还是没变"、出货成本显示0等）
      try {
        if (manifest && manifest.generatedAt) {
          const flag = sessionStorage.getItem('rdc_deploy_flag');
          if (flag !== manifest.generatedAt) {
            sessionStorage.setItem('rdc_deploy_flag', manifest.generatedAt);
            try { localStorage.removeItem('rdc_manifest_hashes'); } catch (e) {}
            location.search = '?v=' + encodeURIComponent(manifest.generatedAt);
            return;
          }
        }
      } catch (e) {}

      if (manifest && manifest.files) {
        const stored = getStoredHashes() || {};
        let changed = Object.keys(manifest.files).filter(f => manifest.files[f] !== stored[f]);
        // 旧缓存没有 boxSpecMap 时，强制拉取一次 data.json 以补全箱规数据（一次性兼容）
        if ((!window._boxSpec || Object.keys(window._boxSpec).length === 0) && !changed.includes('data.json')) {
          changed.push('data.json');
        }
        // data.json 替换加载后会清空全量数据，若归档文件(5月/6月)哈希未变则不被重载导致数据丢失，故强制一并重载
        if (changed.includes('data.json')) {
          Object.keys(manifest.files).forEach(function(f) { if (f.indexOf('data-') === 0 && changed.indexOf(f) < 0) changed.push(f); });
        }
        if (restored && changed.length === 0) {
          if (window._latestMonth && filters.dataMonth === 'all') filters.dataMonth = window._latestMonth;
          showToast('已加载本地缓存（数据未更新）');
          return;
        }
        const ordered = changed.slice().sort((a, b) => fileOrderKey(a) - fileOrderKey(b));
        try {
          for (const f of ordered) {
            const j = await (await fetch('./' + f, { cache: 'no-cache' })).json();
            applyPreparsed(f, j);
          }
          if (dataStore.shortage.length === 0 && dataStore.orderDetail.length === 0 && !dataStore.inventory) {
            throw new Error('JSON 解析结果为空');
          }
          setStoredHashes(manifest.files);
          detectAllMonths();
          if (window._latestMonth && filters.dataMonth === 'all') filters.dataMonth = window._latestMonth;
          saveToIDB().catch(() => {});
          showToast('已更新 ' + ordered.length + ' 个数据文件（JSON 快速加载）');
          renderAll();
          return;
        } catch (e) {
          console.warn('JSON 快速加载失败，回退 Excel：', e);
          showToast('JSON 加载异常，已回退 Excel 加载', true);
        }
      }

      // 3) 回退：原始 xlsx 流程（全量重新解析）
      const loaded = await autoLoadData();
      detectAllMonths();
      if (window._latestMonth && filters.dataMonth === 'all') filters.dataMonth = window._latestMonth;
      renderAll();
      return loaded;
    }

    bootLoad().then(loaded => {
      if (window.location.hash) handleHash();
      else navigateTo((loaded || dataStore.loaded) ? 'overview' : 'data');
    });
  }
}

// ============ INVENTORY STRUCTURE ANALYSIS ============
function parseInventoryExcel(rawData) {
  try {
    let wb;
    if (rawData && rawData.__preparsed) wb = rawData;
    else wb = XLSX.read(rawData, { type: 'array' });
    const sheetNames = wb.SheetNames;
    const sa = (s) => Array.isArray(s) ? s : XLSX.utils.sheet_to_json(s, { header: 1, defval: null, raw: true });

    // Sheet1: 库存周转 (now separate, parse if needed)
    // Sheet2: 总体情况 - 包含多RDC区块，逐个解析后汇总
    const shSummary = sa(wb.Sheets[sheetNames[1]]);
    const summary = { status: {}, coverage: {} };
    const rdcStatus = {}; // keyed by RDC name

    // 正确的状态标签，与Excel列匹配
    const statusLabels = ['残次', '过期~6个月', '7个月~1/2效期', '退货库位', '计划可用库存', '在途'];
    const months = ['2月','3月','4月','5月','6月'];
    const rdcNameList = ['东北仓','华北仓','华东仓','华南仓','华中仓','西南仓','西北仓'];

    // 动态解析所有RDC区块
    for (let ri = 0; ri < shSummary.length; ri++) {
      const r = shSummary[ri];
      if (!r || r.length < 3) continue;
      const cell0 = String(r[0] || '').trim();
      const cell2 = String(r[2] || '').trim();
      // 检测RDC区块开始：行首为RDC名，且列C为"2月"
      if (rdcNameList.indexOf(cell0) >= 0 && cell2 === '2月') {
        const rdcName = cell0;
        if (!rdcStatus[rdcName]) rdcStatus[rdcName] = { status: {}, coverage: {} };
        // 接下来的行：Row+1=统计大类，Row+2~Row+7=6条状态，Row+8=合计，Row+9~Row+19=覆盖
        for (let si = 1; si <= 6; si++) {
          const sr = shSummary[ri + 1 + si];
          if (!sr || sr.length < 9) continue;
          const label = String(sr[1] || '').trim();
          if (statusLabels.indexOf(label) >= 0) {
            rdcStatus[rdcName].status[label] = {
              '2月': getSN(sr,2), '3月': getSN(sr,3), '4月': getSN(sr,4),
              '5月': getSN(sr,5), '6月': getSN(sr,6), '环比': getSN(sr,7), '占比': getSN(sr,8)
            };
          }
        }
        // 覆盖数据：从第10行开始，直到遇到空行或下一个区块头
        for (let ci = 9; ri + ci < shSummary.length; ci++) {
          const cr = shSummary[ri + ci];
          if (!cr || !cr[1]) break;
          const cLabel = String(cr[1] || '').trim();
          if (!cLabel || cLabel === '合计' || cLabel === '统计维度' || cLabel === '月订单满足率' || cLabel === '日订单满足率') continue;
          if (cLabel.match(/^[≤≥<>～~0-9]/) || cLabel === '大于6个月' || cLabel === '无需求' || cLabel === '非卖品' || cLabel === '促销装' || cLabel === '新品期') {
            rdcStatus[rdcName].coverage[cLabel] = {
              '2月': getSN(cr,2), '3月': getSN(cr,3), '4月': getSN(cr,4),
              '5月': getSN(cr,5), '6月': getSN(cr,6), '环比': getSN(cr,7), '占比': getSN(cr,8)
            };
          }
        }
      }
    }

    // 汇总所有RDC的状态数据
    Object.values(rdcStatus).forEach(rdc => {
      Object.keys(rdc.status).forEach(label => {
        if (!summary.status[label]) {
          summary.status[label] = { '2月':0,'3月':0,'4月':0,'5月':0,'6月':0,'环比':0,'占比':0 };
        }
        months.forEach(m => summary.status[label][m] += rdc.status[label][m]);
      });
      Object.keys(rdc.coverage).forEach(label => {
        if (!summary.coverage[label]) {
          summary.coverage[label] = { '2月':0,'3月':0,'4月':0,'5月':0,'6月':0,'环比':0,'占比':0 };
        }
        months.forEach(m => summary.coverage[label][m] += rdc.coverage[label][m]);
      });
    });

    // 计算环比和占比
    Object.keys(summary.status).forEach(label => {
      const d = summary.status[label];
      const totalAll = months.reduce((s,m) => s + d[m], 0);
      if (totalAll > 0) d['占比'] = d['6月'] / totalAll;
      if (d['5月'] > 0) d['环比'] = (d['6月'] - d['5月']) / d['5月'];
    });

    // Sheet 3/4: 库存状态分析 (5月/6月)
    const status5 = parseStatusSheet(sa(wb.Sheets[sheetNames[2]])); // 5月
    const status6 = parseStatusSheet(sa(wb.Sheets[sheetNames[3]])); // 6月

    // Sheet 5/6: 库存覆盖分析 (5月/6月)
    const cov5 = parseCoverageSheet(sa(wb.Sheets[sheetNames[4]])); // 5月
    const cov6 = parseCoverageSheet(sa(wb.Sheets[sheetNames[5]])); // 6月

    // 从6月覆盖明细按RDC汇总，并将覆盖月数分类映射为标准周期
    const rdcCoverage = {};
    cov6.forEach(d => {
      if (!rdcCoverage[d.rdc]) rdcCoverage[d.rdc] = { qty: {}, amt: {} };
      const p = rdcCoverage[d.rdc];
      const cov = mapCovLevel(d.coverageLevel);
      if (!cov) return;
      p.qty[cov] = (p.qty[cov] || 0) + (d.availableQty || 0);
      p.amt[cov] = (p.amt[cov] || 0) + (d.inventoryAmt || 0);
    });

    // Sheet 0: 库存周转（如果存在则解析，供库存周转模块使用）
    const invTurnoverSheet = sheetNames[0] && String(sheetNames[0]).indexOf('周转') >= 0 ? sa(wb.Sheets[sheetNames[0]]) : null;
    const turnoverData = invTurnoverSheet ? parseInventoryTurnoverSheet(invTurnoverSheet) : null;
    if (turnoverData) dataStore.inventoryTurnover = turnoverData;

    // 6月库存状态分析 → 按 RDC+SKU 聚合「效期风险」指标：可销售库存中 临期天数/总货架寿命 < 2/3 的金额占比
    function buildExpiryMap(arr) {
      const m = {};
      for (let i = 1; i < arr.length; i++) {
        const r = arr[i]; if (!r) continue;
        const st = String(r[13] || '').trim();
        if (st !== '计划可用库存' && st !== '7个月~1/2效期' && st !== '可用库存') continue; // 仅可销售状态（效期>1/2）
        const rdc = mapRDCName(String(r[1] || '').trim());
        const sku = String(r[3] || '').trim();
        if (!sku) continue;
        const amt = getSN(r, 11), ld = getSN(r, 9), life = getSN(r, 10); // 金额 / 临期天数 / 总货架寿命
        const key = rdc + '|' + sku;
        if (!m[key]) m[key] = { sellable: 0, below23: 0 };
        m[key].sellable += amt;
        if (life > 0 && ld / life < 2/3) m[key].below23 += amt; // 临期天数/总货架寿命 < 2/3 → 效期偏短
      }
      return m;
    }
    const expiry6 = buildExpiryMap(sa(wb.Sheets[sheetNames[3]]));

    // Save data
    dataStore.inventory = {
      summary, rdcStatus, status5, status6, cov5, cov6, rdcCoverage, expiry6,
      loadedAt: new Date().toISOString()
    };

    function getSN(row, idx) { const v = row[idx]; return (v == null || v === '' || isNaN(Number(v))) ? 0 : Number(v); }

    function parseStatusSheet(arr) {
      const result = [];
      for (let i = 1; i < arr.length; i++) {
        const r = arr[i];
        if (!r || r.length < 15 || !r[0]) continue;
        const status = String(r[13] || '').trim(); // 状态列
        const isStale = String(r[14] || '').trim(); // 呆滞标记
        result.push({
          location: String(r[0]||'').trim(), rdc: mapRDCName(String(r[1]||'').trim()),
          sku: String(r[3]||'').trim(), skuName: String(r[4]||'').trim(),
          brand: normalizeBrandName(String(r[6]||'').trim()), spec: String(r[7]||'').trim(),
          availableQty: getSN(r,9), ageDays: getSN(r,10),
          amount: getSN(r,11), status: status, isStale: isStale,
          isHainan: String(r[14] || '').trim() === '是'
        });
      }
      return result;
    }

    function parseCoverageSheet(arr) {
      const result = [];
      for (let i = 2; i < arr.length; i++) {
        const r = arr[i];
        if (!r || r.length < 31 || !r[0]) continue;
        const covLabel = String(r[30] || '').trim(); // 覆盖月数分类 (col 31)
        result.push({
          rdc: mapRDCName(String(r[0]||'').trim()), sku: String(r[1]||'').trim(),
          skuName: String(r[2]||'').trim(), brand: normalizeBrandName(String(r[3]||'').trim()),
          supplyChainAttr: String(r[4]||'').trim(), lifecycle: String(r[5]||'').trim(),
          abc: String(r[7]||'').trim(), isHainan: String(r[8]||'').trim() === '是',
          availableQty: getSN(r,9), availQtyPlan: getSN(r,15), inventoryAmt: getSN(r,10),
          totalAmt: getSN(r,10), staleAmt: getSN(r,17), expiredAmt: getSN(r,18),
          returnAmt: getSN(r,19), nearExpiryAmt: getSN(r,20), planAmt: getSN(r,21), inTransitAmt: getSN(r,22),
          // Coverage months (col 23-28: 2026-06 to 2026-11)
          cov06: getSN(r,23), cov07: getSN(r,24), cov08: getSN(r,25),
          cov09: getSN(r,26), cov10: getSN(r,27), cov11: getSN(r,28), cov12: getSN(r,29),
          coverageLevel: covLabel
        });
      }
      return result;
    }

    function mapRDCName(n) {
      const m = {
        '华南':'华南RDC','华北':'华北RDC','东北':'东北RDC','西北':'西北RDC','华中':'华中RDC','西南':'西南RDC',
        '华南RDC':'华南RDC','华北RDC':'华北RDC','东北RDC':'东北RDC','西北RDC':'西北RDC','华中RDC':'华中RDC','西南RDC':'西南RDC',
        '华南仓':'华南RDC','华北仓':'华北RDC','东北仓':'东北RDC','西北仓':'西北RDC','华中仓':'华中RDC','西南仓':'西南RDC'
      };
      return m[n] || n;
    }

    return true;
  } catch(e) { console.error('Inventory parse error:', e); return false; }
}

function renderInventoryStructure() {
  setTitle('库存结构分析');
  const page = document.getElementById('page-inventory-structure');
  if (!page) return;

  if (!dataStore.inventory) {
    page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)"><div style="font-size:48px;margin-bottom:16px">📊</div><div>请先上传库存分析Excel文件</div><div style="font-size:12px;margin-top:8px">前往 <a href="javascript:navigateTo(\'data\')" style="color:var(--color-blue)">数据管理</a> 页面导入</div></div>';
    return;
  }

  const inv = dataStore.inventory;
  const summary = inv.summary;
  const statusLabels = Object.keys(summary.status);
  const months = ['2月','3月','4月','5月','6月'];
  const curMonth = '6月';
  const prevMonth = '5月';

  // RDC filter
  window._isRdc = window._isRdc || 'all';
  const rdcFilter = window._isRdc;
  const allRdcs = ['华南RDC','华北RDC','东北RDC','西北RDC','华中RDC','西南RDC'];

  // Hainan 花露水 filter
  window._invHainan = window._invHainan || 'all';
  const hainanFilter = window._invHainan;

  // Helper: apply both RDC and Hainan filters
  function applyFilters(arr, filterHainan = true) {
    if (!arr || !Array.isArray(arr)) return [];
    let result = arr;
    if (rdcFilter !== 'all') result = result.filter(d => d.rdc === rdcFilter);
    if (filterHainan) {
      if (hainanFilter === 'yes') result = result.filter(d => d.isHainan === true);
      else if (hainanFilter === 'no') result = result.filter(d => d.isHainan !== true);
    }
    return result;
  }

  // Datasets: follow both filters
  const status6Filtered = applyFilters(inv.status6 || []);
  const status5Filtered = applyFilters(inv.status5 || []);
  const cov6Filtered = applyFilters(inv.cov6 || []);
  const cov5Filtered = applyFilters(inv.cov5 || []);

  // Datasets: RDC filter only (used for 2-4月 trend where Hainan dimension unavailable)
  const status6RdcOnly = applyFilters(inv.status6 || [], false);
  const status5RdcOnly = applyFilters(inv.status5 || [], false);

  // Helper: aggregate status6/5 by status
  function aggregateByStatus(arr) {
    const obj = {};
    arr.forEach(d => {
      const s = d.status;
      if (obj.hasOwnProperty(s) || statusLabels.indexOf(s) >= 0) {
        obj[s] = (obj[s] || 0) + (d.amount || 0);
      }
    });
    return obj;
  }

  // Helper: scale summary values by filter ratio from detail data
  // 由于 总体情况 Sheet 没有 RDC/海南花露水的明细维度，
  // 按筛选条件时，用库存状态分析明细中对应维度的占比去缩放总体情况汇总值
  function proportionalFilter(summaryValues, allDetail, filteredDetail) {
    const result = {};
    statusLabels.forEach(s => {
      const base = summaryValues[s] || 0;
      const all = allDetail[s] || 0;
      const fil = filteredDetail[s] || 0;
      if (all > 0) {
        result[s] = base * (fil / all);
      } else {
        // 明细中无该状态数据时，无法判断海南花露水占比，全部/是/否均保持原值
        result[s] = hainanFilter === 'all' ? base : 0;
      }
    });
    return result;
  }

  const status6RdcOnlyByStatus = aggregateByStatus(status6RdcOnly);
  const status5RdcOnlyByStatus = aggregateByStatus(status5RdcOnly);
  const status6FilteredByStatus = aggregateByStatus(status6Filtered);
  const status5FilteredByStatus = aggregateByStatus(status5Filtered);

  // KPI current month (6月) and previous month (5月) - from coverage data sheets (元 -> 千元)
  function kpiFromCov(arr) {
    let total = 0, plan = 0, nearExpiry = 0, returnInv = 0;
    arr.forEach(d => {
      total += d.totalAmt || 0;
      plan += d.planAmt || 0;
      nearExpiry += d.nearExpiryAmt || 0;
      returnInv += d.returnAmt || 0;
    });
    return { total: total / 1000, plan: plan / 1000, nearExpiry: nearExpiry / 1000, returnInv: returnInv / 1000 };
  }
  const kpi6 = kpiFromCov(cov6Filtered);
  const kpi5 = kpiFromCov(cov5Filtered);

  // Debug: print raw coverage sums to browser console
  console.log('[KPI Debug] RDC=' + rdcFilter + ', Hainan=' + hainanFilter, {
    '6月 totalAmt(元)': cov6Filtered.reduce((s,d)=>s+(d.totalAmt||0),0),
    '6月 planAmt(元)': cov6Filtered.reduce((s,d)=>s+(d.planAmt||0),0),
    '6月 nearExpiryAmt(元)': cov6Filtered.reduce((s,d)=>s+(d.nearExpiryAmt||0),0),
    '6月 returnAmt(元)': cov6Filtered.reduce((s,d)=>s+(d.returnAmt||0),0),
    '5月 totalAmt(元)': cov5Filtered.reduce((s,d)=>s+(d.totalAmt||0),0),
    '5月 planAmt(元)': cov5Filtered.reduce((s,d)=>s+(d.planAmt||0),0),
    '5月 nearExpiryAmt(元)': cov5Filtered.reduce((s,d)=>s+(d.nearExpiryAmt||0),0),
    '5月 returnAmt(元)': cov5Filtered.reduce((s,d)=>s+(d.returnAmt||0),0)
  });

  const totalInv = kpi6.total;
  const totalInvPrev = kpi5.total;
  const healthyInv = kpi6.plan;
  const healthyInvPrev = kpi5.plan;
  const nearExpiryInv = kpi6.nearExpiry;
  const nearExpiryInvPrev = kpi5.nearExpiry;
  const returnInv = kpi6.returnInv;
  const returnInvPrev = kpi5.returnInv;
  const totalChange = totalInvPrev > 0 ? (totalInv - totalInvPrev) / totalInvPrev : 0;

  // Recalculate coverage from filtered cov6
  const rdcCoverageFiltered = {};
  const recalcCoverage = {};
  cov6Filtered.forEach(d => {
    if (!rdcCoverageFiltered[d.rdc]) rdcCoverageFiltered[d.rdc] = { qty: {}, amt: {} };
    const p = rdcCoverageFiltered[d.rdc];
    const cov = mapCovLevel(d.coverageLevel);
    if (!cov) return;
    p.qty[cov] = (p.qty[cov] || 0) + (d.availableQty || 0);
    p.amt[cov] = (p.amt[cov] || 0) + (d.inventoryAmt || 0);
    recalcCoverage[cov] = (recalcCoverage[cov] || 0) + (d.availableQty || 0);
  });

  // Helper: format change with arrow and color
  function fmtChangeHtml(cur, prev) {
    if (!prev) return '<span style="font-size:11px;color:var(--text-secondary)">环比 -</span>';
    const chg = ((cur - prev) / prev * 100);
    const arrow = chg > 0 ? '↑' : '↓';
    const color = chg > 0 ? 'var(--color-red)' : 'var(--color-green)';
    return '<span style="font-size:11px;color:' + color + '">环比 ' + arrow + Math.abs(chg).toFixed(1) + '%</span>';
  }

  // Per-RDC summary lookup (for 2-4月 trend data)
  function rawRdcName(rdc) {
    const m = { '华南RDC':'华南仓', '华北RDC':'华北仓', '东北RDC':'东北仓', '西北RDC':'西北仓', '华中RDC':'华中仓', '西南RDC':'西南仓' };
    return m[rdc] || rdc;
  }
  const selectedSummary = rdcFilter === 'all' ? summary : (inv.rdcStatus[rawRdcName(rdcFilter)] || summary);
  const selectedStatus = selectedSummary.status || summary.status;

  // Status data for trend/pie (5-6月 directly from filtered coverage data, 2-4月 from 总体情况)
  const summary6 = {}; statusLabels.forEach(s => summary6[s] = selectedStatus[s]?.['6月'] || 0);
  const summary5 = {}; statusLabels.forEach(s => summary5[s] = selectedStatus[s]?.['5月'] || 0);

  // Datasets: always exclude Hainan for trend chart (各状态月度趋势始终不含海南花露水)
  const cov6NoHainan = (inv.cov6 || []).filter(d => (rdcFilter === 'all' || d.rdc === rdcFilter) && d.isHainan !== true);
  const cov5NoHainan = (inv.cov5 || []).filter(d => (rdcFilter === 'all' || d.rdc === rdcFilter) && d.isHainan !== true);

  // 5-6月从库存覆盖数据直接聚合（与KPI/饼图同源，始终不含海南花露水）
  function aggregateCovByStatus(arr) {
    const obj = {};
    const amtFields = ['staleAmt', 'expiredAmt', 'nearExpiryAmt', 'returnAmt', 'planAmt', 'inTransitAmt'];
    statusLabels.forEach((s, i) => { obj[s] = 0; });
    arr.forEach(d => {
      statusLabels.forEach((s, i) => { obj[s] += (d[amtFields[i]] || 0); });
    });
    return obj;
  }
  const cov6ByStatus = aggregateCovByStatus(cov6NoHainan);
  const cov5ByStatus = aggregateCovByStatus(cov5NoHainan);
  const trendStatus6 = {}; statusLabels.forEach(s => trendStatus6[s] = (cov6ByStatus[s] || 0) / 1000);
  const trendStatus5 = {}; statusLabels.forEach(s => trendStatus5[s] = (cov5ByStatus[s] || 0) / 1000);

  // Build trend data: 2-4月 from per-RDC summary (元→千元), 5-6月 from filtered coverage data (已千元)
  const trendStatus = {};
  statusLabels.forEach(k => {
    trendStatus[k] = {
      '2月': (selectedStatus[k]?.['2月'] || 0) / 1000,
      '3月': (selectedStatus[k]?.['3月'] || 0) / 1000,
      '4月': (selectedStatus[k]?.['4月'] || 0) / 1000,

    };

  const rdcLabel = rdcFilter === 'all' ? '全部RDC' : rdcFilter;

  const filterCondition = rdcLabel + '，' + hainanLabel;
  const trendFilterCondition = rdcLabel + '，不含海南花露水';
  const kpiRdcLabel = rdcFilter === 'all' ? '全部RDC' : rdcFilter.replace('RDC','');

  page.innerHTML = `

      </select>
      <label style="margin-left:12px">海南花露水：</label>
      <select onchange="window._invHainan=this.value;renderInventoryStructure()" style="min-width:100px">
        <option value="all" ${hainanFilter==='all'?'selected':''}>全部</option>

        <option value="no" ${hainanFilter==='no'?'selected':''}>否</option>

      <span style="font-size:11px;color:var(--text-secondary);margin-left:auto">当前：${filterCondition}</span>

    ${(renderInventoryStructureHistory() || '')}
    <div class="kpi-row">

      <div class="kpi-card green"><div class="kpi-label">计划可用库存</div><div class="kpi-value">${fmtK(healthyInv)}<span class="kpi-unit">千元</span></div>${fmtChangeHtml(healthyInv, healthyInvPrev)}</div>
      <div class="kpi-card orange"><div class="kpi-label">7月~1/2效期库存</div><div class="kpi-value">${fmtK(nearExpiryInv)}<span class="kpi-unit">千元</span></div>${fmtChangeHtml(nearExpiryInv, nearExpiryInvPrev)}</div>
      <div class="kpi-card red"><div class="kpi-label">退货库位</div><div class="kpi-value">${fmtK(returnInv)}<span class="kpi-unit">千元</span></div>${fmtChangeHtml(returnInv, returnInvPrev)}</div>
      <div class="kpi-card purple"><div class="kpi-label">库存状态分类</div><div class="kpi-value">${statusLabels.length}<span class="kpi-unit">类</span></div><div style="font-size:11px">含残次/过期/效期/退货/可用/在途</div></div>

    </div>

      <div class="table-wrap" id="table-is-rdc-cov"></div>

  `;

  // Chart 1: 库存状态占比环形图 (from coverage data, filtered by RDC + Hainan)
  const pieData = {};
  const amtFields = ['staleAmt', 'expiredAmt', 'nearExpiryAmt', 'returnAmt', 'planAmt', 'inTransitAmt'];
  statusLabels.forEach((s, i) => {
    pieData[s] = cov6Filtered.reduce((sum, d) => sum + (d[amtFields[i]] || 0), 0) / 1000;
  });
  const statusPieData = statusLabels.map(k => ({ name: k, value: Math.max(0, pieData[k] || 0) })).filter(d => d.value > 0);
  if (statusPieData.length) {
    const pie = initChart('chart-is-status-pie');
    pie.setOption({
      tooltip: { trigger: 'item', formatter: p => p.name + '<br/>' + fmtK(p.value) + '千元 (' + p.percent + '%)' },
      legend: { type: 'scroll', bottom: 0, textStyle: { fontSize: 10 } },
      series: [{
        type: 'pie', radius: ['45%','75%'], center: ['50%','48%'], data: statusPieData,
        label: { formatter: '{b}\n{d}%', fontSize: 10 },
        emphasis: { itemStyle: { shadowBlur: 10 } }
      }]
    });
    pie.on('click', function(p) {
      const fieldMap = {'残次':'staleAmt','过期~6个月':'expiredAmt','7个月~1/2效期':'nearExpiryAmt','退货库位':'returnAmt','计划可用库存':'planAmt','在途':'inTransitAmt'};
      const field = fieldMap[p.name];
      if (field && cov6Filtered) drillCoverageDetail(cov6Filtered.filter(d => (d[field] || 0) > 0), p.name);
    });
  }

  // Chart 2: 各状态月度趋势（堆叠面积图）- 2-4月来自总体情况，5-6月已剔除海南花露水
  const chart2 = initChart('chart-is-status-trend');
  chart2.setOption({
    tooltip: { trigger: 'axis', confine: true, textStyle: { fontSize: 11 }, formatter: p => {
      let h = '<strong>' + p[0].axisValue + '</strong>';
      p.forEach(i => h += '<br/>' + i.marker + i.seriesName + '：' + fmtK(i.value) + '千元');
      return h;
    }},
    legend: { data: statusLabels, type: 'scroll', top: 5, textStyle: { fontSize: 10 }, height: 30 },
    grid: { left: 60, right: 20, top: 45, bottom: 25 },
    xAxis: { type: 'category', data: months, axisLabel: { fontSize: 10 } },
    yAxis: { type: 'value', axisLabel: { formatter: v => (v/1000).toFixed(0)+'M', fontSize: 10 } },
    series: statusLabels.map((k, i) => ({
      name: k, type: 'bar', stack: 'total', data: months.map(m => (trendStatus[k][m] || 0)),
      color: ['#EF4444','#F59E0B','#8B5CF6','#3B82F6','#10B981','#6B7280'][i], barMaxWidth: 40
    }))
  });

  // Table: 库存状态月度汇总（2-4月来自总体情况，5-6月已按双筛选缩放）
  const tableTotal6 = statusLabels.reduce((s,k) => s + (trendStatus[k]['6月'] || 0), 0);
  const tableTotal5 = statusLabels.reduce((s,k) => s + (trendStatus[k]['5月'] || 0), 0);
  const statusTableHtml = '<table class="data-table"><thead><tr><th>库存状态</th>' + months.map(m => '<th style="text-align:right">' + m + '</th>').join('') + '<th style="text-align:right">环比</th><th style="text-align:right">占比(6月)</th></tr></thead><tbody>' +
    statusLabels.map(k => {
      const vals = months.map(m => (trendStatus[k][m] || 0));
      const change = vals[3] > 0 ? (vals[4] - vals[3]) / vals[3] : 0;
      const share = tableTotal6 > 0 ? vals[4] / tableTotal6 : 0;
      return '<tr style="cursor:pointer" onclick="drillStatusDetail((dataStore.inventory.status6||[]).filter(function(d){return d.status===\'' + k + '\'}), \'' + k + '\')">' +
        '<td><strong>' + k + '</strong></td>' +
        vals.map(v => '<td class="num">' + fmtK(v) + '</td>').join('') +
        '<td class="num" style="color:' + (change<0?'var(--color-green)':'var(--color-red)') + '">' + (change*100).toFixed(1) + '%</td>' +
        '<td class="num">' + (share*100).toFixed(1) + '%</td></tr>';
    }).join('') +
    '<tr style="font-weight:700;background:var(--bg-alt)"><td>合计</td>' + months.map(m => '<td class="num">' + fmtK(statusLabels.reduce((s,k) => s + (trendStatus[k][m]||0), 0)) + '</td>').join('') + '<td class="num">' + (tableTotal5 > 0 ? ((tableTotal6 - tableTotal5) / tableTotal5 * 100).toFixed(1) : '0.0') + '%</td><td class="num">100.0%</td></tr>' +
    '</tbody></table>';
  document.getElementById('table-is-status').innerHTML = statusTableHtml;

  // Chart 3: 库存覆盖周期柱状图
  const covLabels = ['1个月','2个月','3个月','4-6个月','6个月以上'];
  const covData = covLabels.map(k => recalcCoverage[k] || 0);
  if (covData.some(v => v > 0)) {
    const chart3 = initChart('chart-is-coverage-bar');
    chart3.setOption({
      tooltip: { trigger: 'axis', confine: true, formatter: p => p[0].name + '<br/>' + formatNum(p[0].value) + '支' },
      grid: { left: 80, right: 30, top: 10, bottom: 30 },
      xAxis: { type: 'category', data: covLabels, axisLabel: { rotate: 30, fontSize: 10 } },
      yAxis: { type: 'value', axisLabel: { formatter: v => formatNum(v) } },
      series: [{
        type: 'bar', data: covData,
        itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#60A5FA'},{offset:1,color:'#2563EB'}]) },
        label: { show: true, position: 'top', formatter: p => formatNum(p.value), fontSize: 10 }
      }]
    });
    chart3.on('click', function(p) {
      if (p.name && cov6Filtered) drillCoverageDetail(cov6Filtered.filter(d => mapCovLevel(d.coverageLevel) === p.name), p.name);
    });
  }

  // Chart 4: RDC覆盖能力对比
  const allRdcCov = rdcCoverageFiltered;
  const covLevels = ['1个月','2个月','3个月','4-6个月','6个月以上'];
  const displayRdcs = rdcFilter === 'all' ? allRdcs : allRdcs.filter(r => r === rdcFilter);
  const rdcChartData = displayRdcs.map(rdc => {
    const d = allRdcCov[rdc] || { qty: {} };
    return { name: rdc, data: covLevels.map(l => d.qty[l] || 0) };
  });
  const chart4 = initChart('chart-is-rdc-cov');
  chart4.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, confine: true, textStyle: { fontSize: 11 }, formatter: p => {
      let h = '<strong>' + p[0].axisValue + '</strong>';
      p.forEach(i => h += '<br/>' + i.marker + i.seriesName + '：' + formatNum(i.value) + '支');
      return h;
    }},
    legend: { data: covLevels, type: 'scroll', top: 5, textStyle: { fontSize: 10 }, height: 30 },
    grid: { left: 20, right: 30, top: 45, bottom: 40 },
    xAxis: { type: 'category', data: displayRdcs, axisLabel: { fontSize: 10, rotate: 15 } },
    yAxis: { type: 'value', axisLabel: { formatter: v => formatNum(v) } },
    series: covLevels.map((l, i) => ({
      name: l, type: 'bar', stack: 'cov', data: rdcChartData.map(d => d.data[i] || 0),
      color: ['#10B981','#34D399','#60A5FA','#F59E0B','#EF4444'][i], barMaxWidth: 30
    }))
  });

  // Table: RDC覆盖表
  const rdcCovTableHtml = '<table class="data-table"><thead><tr><th>RDC</th>' + covLevels.map(l => '<th style="text-align:right">' + l + '</th>').join('') + '<th style="text-align:right">合计</th></tr></thead><tbody>' +
    displayRdcs.map(rdc => {
      const d = allRdcCov[rdc] || { qty: {} };
      const vals = covLevels.map(l => d.qty[l] || 0);
      const total = vals.reduce((a,b) => a + b, 0);
      return '<tr style="cursor:pointer" onclick="drillRdcCovDetail(\'' + rdc + '\')">' +
        '<td><strong>' + rdc + '</strong></td>' +
        vals.map(v => '<td class="num">' + (v ? formatNum(v) : '-') + '</td>').join('') +
        '<td class="num" style="font-weight:600">' + formatNum(total) + '<span style="font-size:10px;color:var(--text-secondary)"> 支</span></td></tr>';
    }).join('') +
    '</tbody></table>';
  document.getElementById('table-is-rdc-cov').innerHTML = rdcCovTableHtml;

  // 库存规模年度对比（2025 vs 2026）
  renderInventoryStructureHistoryCharts();
}

function renderInventoryStructureHistoryCharts() {
  if (!dataStore.history || !dataStore.history.inventory) return;
  const INV = dataStore.history.inventory;
  const months12 = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  function sumKeys(map, i) { let s = 0; Object.keys(map).forEach(k => { const v = map[k] && map[k][i]; if (v != null) s += v; }); return s; }
  const amt25 = months12.map((_, i) => sumKeys(INV['2025'].inventoryAmount, i));
  const amt26 = months12.map((_, i) => (i < 6 ? sumKeys(INV['2026'].inventoryAmount, i) : null));
  let avg25 = 0, avg26 = 0;
  for (let i = 0; i < 12; i++) avg25 += amt25[i];
  for (let i = 0; i < 6; i++) avg26 += amt26[i];
  avg25 /= 12; avg26 /= 6;
  const amtYoY = avg25 > 0 ? (avg26 - avg25) / avg25 : 0;
  function fmtK(n) { return (n / 10000).toFixed(1) + '万'; }
  const kpiHtml = '<div class="kpi-row" style="padding:0 12px 8px">' +
    '<div class="kpi-card blue"><div class="kpi-label">月均总库存金额</div><div class="kpi-value">' + fmtK(avg26) + '<span class="kpi-unit">千</span></div><div style="font-size:11px">2026上半年 vs 2025月均 ' + fmtK(avg25) + '千 · 同比 <span style="color:' + (amtYoY >= 0 ? 'var(--color-red)' : 'var(--color-green)') + '">' + (amtYoY >= 0 ? '+' : '') + (amtYoY * 100).toFixed(1) + '%</span></div></div>' +
    '<div class="kpi-card green" style="flex:2.4"><div class="kpi-label">说明</div><div style="font-size:11px;color:var(--text-secondary);line-height:1.6">2025 库存结构（状态级）未纳入源数据，故仅做总量级年度对比；状态级月度趋势见本页「各状态月度趋势」（2–6月，来自总体情况）。</div></div>' +
    '</div>';
  document.getElementById('kpi-inv-structure-history').innerHTML = kpiHtml;
  const c = initChart('chart-inv-structure-history');
  c.setOption({
    tooltip: { trigger: 'axis', confine: true, textStyle: { fontSize: 11 }, formatter: function (p) { let h = '<strong>' + p[0].axisValue + '</strong>'; p.forEach(s => { if (s.value != null) h += '<br/>' + s.marker + s.seriesName + '：' + (s.value / 10000).toFixed(1) + '万'; }); return h; } },
    legend: { data: ['2025总库存', '2026总库存'], top: 0, left: 'center', textStyle: { fontSize: 11 } },
    grid: { left: 60, right: 20, top: 40, bottom: 30 },
    xAxis: { type: 'category', data: months12, axisLabel: { fontSize: 10, interval: 0 } },
    yAxis: { type: 'value', axisLabel: { formatter: v => (v / 10000).toFixed(0) + '万' } },
    series: [
      { name: '2025总库存', type: 'line', data: amt25, smooth: true, symbol: 'none', lineStyle: { width: 2, type: 'dashed' }, color: '#94a3b8' },
      { name: '2026总库存', type: 'line', data: amt26, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { width: 2 }, color: '#2563EB' }
    ]
  });
}

function drillStatusDetail(data, label) {
  if (!data || data.length === 0) { showToast('暂无' + (label||'') + '明细数据'); return; }
  const h = window._invHainan || 'all';
  if (h === 'yes') data = data.filter(d => d.isHainan === true);
  if (h === 'no') data = data.filter(d => d.isHainan !== true);
  const r = window._isRdc || 'all';
  if (r !== 'all') data = data.filter(d => d.rdc === r);
  window._drillTitle = (label || '状态') + '明细（共' + data.length + '条）';
  window._drillData = data;
  window._drillType = 'status';
  renderDrillModal();
}

function drillCoverageDetail(data, label) {
  if (!data || data.length === 0) { showToast('暂无' + (label||'') + '明细数据'); return; }
  const h = window._invHainan || 'all';
  if (h === 'yes') data = data.filter(d => d.isHainan === true);
  if (h === 'no') data = data.filter(d => d.isHainan !== true);
  window._invCoverageDetailTitle = (label || '覆盖周期') + '明细（共' + data.length + '条）';
  window._invCoverageDetailData = data.slice().sort((a,b) => (b.inventoryAmt || 0) - (a.inventoryAmt || 0));

}

  window._invCoverageDetailTitle = rdc + ' 覆盖明细（共' + data.length + '条）';

}

function exportCauseMatrix() {
  var cm = window._causeMatrix;
  if (!cm || !cm.causeYOrder || cm.causeYOrder.length === 0) { showToast('暂无根因矩阵数据', true); return; }
  var header = ['主根因'].concat(cm.rdcs).concat(['全国合计(千元)']);
  var csv = '\uFEFF' + header.join(',') + '\n';
  cm.causePriority.forEach(function(cause) {
    if (!cm.causeRdcMatrix[cause]) return;
    var row = [cause];
    var rowTotal = 0;
    cm.rdcs.forEach(function(r) {
      var amtK = (cm.causeRdcMatrix[cause][r] || 0) / 1000;
      row.push(amtK.toFixed(1));
      rowTotal += amtK;
    });
    row.push(rowTotal.toFixed(1));
    csv += row.join(',') + '\n';
  });
  // 合计行
  var totRow = ['全国合计(千元)'];
  var grand = 0;
  cm.rdcs.forEach(function(r) {
    var amtK = (cm.rdcCauseTotalAmt[r] || 0) / 1000;
    totRow.push(amtK.toFixed(1));
    grand += amtK;
  });
  totRow.push(grand.toFixed(1));
  csv += totRow.join(',') + '\n';
  downloadFile('RDC×主根因慢动金额矩阵_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

function exportBrandBucket(brand, rdc) {
  var cm = window._causeMatrix;
  var skus = (cm && cm.brandRdcSkus && cm.brandRdcSkus[brand] && cm.brandRdcSkus[brand][rdc]) || [];
  if (skus.length === 0) { if (typeof showToast === 'function') showToast('该桶无数据', true); return; }
  var cell = (window._slowHeatCells && window._slowHeatCells[brand] && window._slowHeatCells[brand][rdc]) || {};
  var bucketAmt = cell.slow || 0;
  var csv = '\uFEFF#,RDC,SKU编码,名称,品牌,覆盖等级,慢动金额(元),占桶%,根因(完整)\n';
  skus.forEach(function(r, i) {
    var pct = bucketAmt > 0 ? (r.inventoryAmt / bucketAmt * 100).toFixed(1) : '0.0';
    var name = (r.skuName || '').replace(/,/g, '，');
    var brandStr = (r.brand || '').replace(/,/g, '，');
    var rc = (r.rootCause || '').replace(/,/g, '，').replace(/\n/g, ' ');
    csv += [(i + 1), rdc, r.sku, name, brandStr, r.coverageLevel, r.inventoryAmt, pct, rc].join(',') + '\n';
  });
  var safeBrand = brand.replace(/[^\w一-龥]/g, '');
  downloadFile('品牌SKU下钻_' + safeBrand + '_' + rdc + '_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

// 筛选器状态
window._bizDemandFilters = { rdc: 'all', month: 'all', channel: 'all' };

/**
 * 将订单明细记录映射到业务需求渠道
 * 经销商渠道 = 主渠道='经销商' 且 客户组≠'京东新通路'
 * KA渠道 = 主渠道含'KA'
 * 新通路 = 客户组='京东新通路'
 */
function mapOrderChannel(d) {
  const cg = (d.customerGroup || '').trim();
  const ch = (d.channel || '').trim();
  if (cg.includes('京东新通路')) return '新通路';
  if (ch.includes('KA')) return 'KA';
  if (ch === '经销商') return '经销商';
  return '其他';
}

/**
 * 计算某月的次月15日截止日期字符串（用于出货窗口）
 * @param {string} monthStr - "2026-06"
 * @returns {string} - "2026-07-15"
 */
function getNextMonth15Cutoff(monthStr) {
  const parts = monthStr.split('-');
  const y = parseInt(parts[0]);
  const m = parseInt(parts[1]);
  const nextM = m === 12 ? 1 : m + 1;
  const nextY = m === 12 ? y + 1 : y;
  return nextY + '-' + String(nextM).padStart(2, '0') + '-15';
}

/**
 * 规范化RDC名称（兼容"华南""华南仓""华南RDC"等混用格式）
 */
function normalizeRdcName(name) {
  if (!name) return '';
  const n = name.replace(/仓$/, '').trim();
  const m = {
    '华南':'华南RDC','华北':'华北RDC','华中':'华中RDC','东北':'东北RDC','西北':'西北RDC','西南':'西南RDC',
    '华南RDC':'华南RDC','华北RDC':'华北RDC','华中RDC':'华中RDC','东北RDC':'东北RDC','西北RDC':'西北RDC','西南RDC':'西南RDC'
  };
  return m[n] || name;
}

function normalizeBrandName(name) {
  if (!name) return '';
  // 品牌名称标准化映射表
  const map = { '传统品牌': '传统', '百爱神': '传统', '春蕾': '传统', '海鸥': '传统', '雅霜': '传统', '友谊': '传统' };
  return map[name] || name;
}

/**
 * 对 brandFulfill 做标准化归并（保险层）：
 * 兼容旧 IndexedDB 缓存、旧 data.json 或列解析异常导致的原始品牌名，
 * 确保友谊/春蕾/海鸥/百爱神/雅霜在矩阵中始终显示为"传统"。
 */
function getNormalizedBrandFulfill() {
  const list = (dataStore.overall && dataStore.overall.brandFulfill) || [];
  const rdcKeys = ['huanan','huabei','dongbei','xibei','huazhong','xinan'];
  const map = {};
  list.forEach(item => {
    const brand = normalizeBrandName(item.brand);
    if (!brand) return;
    if (!map[brand]) {
      map[brand] = { brand };
      rdcKeys.forEach(rk => { map[brand][rk] = 0; map[brand]['_count_' + rk] = 0; });
    }
    rdcKeys.forEach(rk => {
      const v = item[rk];
      if (v != null && !isNaN(v) && v !== 0) {
        const c = map[brand]['_count_' + rk] || 0;
        map[brand][rk] = c === 0 ? v : (map[brand][rk] * c + v) / (c + 1);
        map[brand]['_count_' + rk] = c + 1;
      }
    });
  });
  return Object.values(map);
}

/**
 * 获取业务需求满足分析汇总数据
 * 返回月×RDC×渠道维度的汇总数组
 */
function getBizDemandSummary(f) {
  const biz = dataStore.bizDemand || [];
  const orders = dataStore.orderDetail || [];
  const rdcFilter = f.rdc || 'all';
  const monthFilter = f.month || 'all';
  const chFilter = f.channel || 'all';

  // 收集所有月份
  const allMonths = new Set();
  biz.forEach(d => { if (d.dateStr && d.dateStr.length >= 7) allMonths.add(d.dateStr.slice(0,7)); });
  const sortedMonths = Array.from(allMonths).sort();

  // 收集所有RDC（规范化后）
  const allRdcs = new Set();
  biz.forEach(d => { if (d.rdc) allRdcs.add(normalizeRdcName(d.rdc)); });
  const rdcList = Array.from(allRdcs).sort();

  // 渠道列表
  const channels = ['经销商', 'KA', '新通路'];

  // 去重集合：同月同RDC同SKU同渠道同需求值只计一次（跳过重复提报）
  const dedupSet = new Set();

  // 按月×RDC×渠道聚合业务提报
  const demandMap = {}; // key: "month|rdc|channel" => { demand, skuCount }
  biz.forEach(d => {
    const m = d.dateStr.slice(0, 7);
    if (monthFilter !== 'all' && m !== monthFilter) return;
    const nrdc = normalizeRdcName(d.rdc);
    if (rdcFilter !== 'all' && nrdc !== rdcFilter) return;

    channels.forEach(ch => {
      let demandVal = 0;
      if (ch === '经销商') demandVal = d.dealerDemand || 0;
      else if (ch === 'KA') demandVal = d.kaDemand || 0;
      else if (ch === '新通路') demandVal = d.newChannel || 0;

      // 去重：同月同RDC同SKU同渠道同需求值只计一次
      if (demandVal > 0) {
        const dedupKey = m + '|' + nrdc + '|' + d.opCode + '|' + ch + '|' + demandVal;
        if (dedupSet.has(dedupKey)) return;
        dedupSet.add(dedupKey);
      }

      const key = m + '|' + nrdc + '|' + ch;
      if (!demandMap[key]) {
        demandMap[key] = { month: m, rdc: nrdc, channel: ch, demand: 0, skuCount: 0 };
      }
      demandMap[key].demand += demandVal;
      if (demandVal > 0) demandMap[key].skuCount++;
    });
  });

  // 构建需求SKU集合，用于出货匹配时的校验（只统计有业务提报的SKU出货）
  // 同时记录每个 SKU×RDC×月 的"最早补货日期"，作为出货计入的时间下限
  const demandSkuSet = new Set();
  const skuSubmitDate = {}; // key: month|rdc|opCode => 最早补货日期(YYYY-MM-DD)
  biz.forEach(d => {
    const m = d.dateStr.slice(0, 7);
    if (monthFilter !== 'all' && m !== monthFilter) return;
    const nrdc = normalizeRdcName(d.rdc);
    if (rdcFilter !== 'all' && nrdc !== rdcFilter) return;
    const anyDemand = (d.dealerDemand||0) + (d.kaDemand||0) + (d.newChannel||0);
    if (anyDemand > 0) {
      const sk = m + '|' + nrdc + '|' + d.opCode;
      demandSkuSet.add(sk);
      if (!skuSubmitDate[sk] || d.dateStr < skuSubmitDate[sk]) skuSubmitDate[sk] = d.dateStr;
    }
  });

  // 按月×RDC×渠道聚合实际出货（从订单明细，时间窗口：当月~次月15日）
  // 只统计能匹配到业务提报SKU的出货
  const shipmentMap = {}; // key: "month|rdc|channel" => shipped qty
  orders.forEach(d => {
    if (!d.dateStr || d.dateStr.length < 10) return;
    const orderMonth = d.dateStr.slice(0, 7);

    // 找出该订单属于哪个月份的需求窗口（按月份降序，优先归属到自身所在月份）
    for (const mi of sortedMonths.slice().reverse()) {
      const cutoff = getNextMonth15Cutoff(mi);
      // 出货日期 >= 当月1日 and <= 次月15日
      if (orderMonth === mi || (orderMonth > mi && d.dateStr <= cutoff)) {
        // 但不能跨越太远（只处理相邻两个月）
        const mNum = parseInt(mi.split('-')[1]);
        const oNum = parseInt(orderMonth.split('-')[1]);
        if (oNum > mNum + 1) continue;

        const ch = mapOrderChannel(d);
        if (ch === '其他') continue;

        // 只统计能匹配到业务提报SKU的出货
        const wrh = normalizeRdcName(d.warehouse || '');
        const skuKey = mi + '|' + wrh + '|' + d.skuCode;
        if (!demandSkuSet.has(skuKey)) continue;

        // 时间下限：仅计入"补货日期之后"（SAP放行日期 严格 > 该SKU最早补货日期）产生的出货
        const submitDate = skuSubmitDate[skuKey];
        if (submitDate && !(d.dateStr > submitDate)) { break; }

        const key = mi + '|' + wrh + '|' + ch;
        if (!shipmentMap[key]) shipmentMap[key] = 0;
        shipmentMap[key] += (d.firstDayQty || 0); // 用首日出货量作为实际出货
        break; // 每个订单只归属一个需求月份
      }
    }
  });

  // 合并成结果
  const results = [];
  Object.keys(demandMap).forEach(key => {
    const dm = demandMap[key];
    // 应用渠道筛选
    if (chFilter !== 'all' && dm.channel !== chFilter) return;

    const shipped = shipmentMap[key] || 0;
    const progress = dm.demand > 0 ? (shipped / dm.demand * 100) : 0;

    results.push({
      month: dm.month,
      rdc: dm.rdc,
      channel: dm.channel,
      demand: Math.round(dm.demand),
      shipped: Math.round(shipped),
      progress: progress,
      skuCount: dm.skuCount
    });
  });

  // 排序：月份 desc, RDC asc, 渠道固定顺序
  const chOrder = {'经销商':0,'KA':1,'新通路':2};
  results.sort((a,b) => {
    if (a.month !== b.month) return b.month.localeCompare(a.month);
    if (a.rdc !== b.rdc) return a.rdc.localeCompare(b.rdc);
    return (chOrder[a.channel]||9) - (chOrder[b.channel]||9);
  });

  return results;
}

// ========== 业务需求可信度（DACR）分析 ==========
function renderBizDemandDACR() {
  setTitle('业务需求可信度（DACR）');
  const page = document.getElementById('page-biz-demand-dacr');
  if (!dataStore.loaded || !dataStore.bizDemand || dataStore.bizDemand.length === 0) {
    page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)">暂无业务需求数据</div>';
    return;
  }
  var f = window._dacrFilters || { rdc: 'all', month: 'all' };
  window._dacrFilters = f;
  // ===== 1. 按 SKU×RDC×渠道 聚合业务提报和实际出货 =====
  // 注意：bizDemand r[2] 实为"操作工号"非SKU编码，故用 产品名称+规格 作匹配键
  function normKey(s) { return String(s||'').replace(/[\s\u3000]/g,'').slice(0,30); }
  var dacrMap = {}; // key: "normPname|rdc|ch"
  var orders = dataStore.orderDetail || [];
  var biz = dataStore.bizDemand || [];
  // 先聚合订单明细的出货量到 productName+rdc+ch
  var shipMap = {};
  orders.forEach(function(d) {
    var nrdc = normalizeRdcName(d.warehouse);
    if (f.rdc !== 'all' && nrdc !== f.rdc) return;
    var m = d.dateStr ? d.dateStr.slice(0,7) : '';
    if (f.month !== 'all' && m !== f.month) return;
    var ch = d.channel;
    if (ch === 'KA' || ch === '经销商' || ch === '新通路') {
      var pkey = normKey(d.skuName) + '|' + nrdc + '|' + ch;
      shipMap[pkey] = (shipMap[pkey] || 0) + (d.firstDayQty || 0);
    }
  });
  // 再聚合业务提报
  biz.forEach(function(d) {
    var nrdc = normalizeRdcName(d.rdc);
    if (f.rdc !== 'all' && nrdc !== f.rdc) return;
    var m = d.dateStr ? d.dateStr.slice(0,7) : '';
    if (f.month !== 'all' && m !== f.month) return;
    var chs = [{k:'经销商',v:d.dealerDemand},{k:'KA',v:d.kaDemand},{k:'新通路',v:(d.newChannel||0)}];
    var pkey = normKey(d.productName);
    chs.forEach(function(ch) {
      if (!ch.v || ch.v <= 0) return;
      var key = pkey + '|' + nrdc + '|' + ch.k;
      if (!dacrMap[key]) dacrMap[key] = { sku: d.opCode || '', skuName: d.productName || '', rdc: nrdc, channel: ch.k, bizD: 0, shipped: 0, months: {} };
      dacrMap[key].bizD += ch.v;
      // 匹配出货
      var sk = normKey(d.productName) + '|' + nrdc + '|' + ch.k;
      if (shipMap[sk]) dacrMap[key].shipped = (dacrMap[key].shipped || 0) + shipMap[sk];
      if (m) dacrMap[key].months[m] = (dacrMap[key].months[m] || 0) + ch.v;
    });
  });
  var dacrList = Object.values(dacrMap).filter(function(r) { return r.bizD > 0; });
  dacrList.forEach(function(r) {
    r.dacr = r.bizD > 0 ? r.shipped / r.bizD : 0;
    r.gap = r.bizD - r.shipped;
  });
  dacrList.sort(function(a,b) { return a.dacr - b.dacr; });
  // ===== 分类 =====
  var levels = { green: 0, yellow: 0, orange: 0, red: 0 };
  var lvlList = [];
  dacrList.forEach(function(r) {
    if (r.dacr >= 0.8) { levels.green++; r.level='可信'; r.lvl=4; }
    else if (r.dacr >= 0.5) { levels.yellow++; r.level='偏高'; r.lvl=3; }
    else if (r.dacr >= 0.3) { levels.orange++; r.level='虚高'; r.lvl=2; }
    else { levels.red++; r.level='严重虚高'; r.lvl=1; }
    lvlList.push(r);
  });
  // ===== 渠道级 DACR =====
  var chMap = {};
  ['经销商','KA','新通路'].forEach(function(ch) {
    var items = dacrList.filter(function(r) { return r.channel === ch; });
    var totBiz = items.reduce(function(s,r) { return s + r.bizD; }, 0);
    var totShip = items.reduce(function(s,r) { return s + r.shipped; }, 0);
    chMap[ch] = { channel: ch, bizD: totBiz, shipped: totShip, dacr: totBiz > 0 ? totShip / totBiz : 0, count: items.length };
  });
  // ===== 筛选选项 =====
  var rdcs = [...new Set(dacrList.map(function(r) { return r.rdc; }))].sort();
  var months = [...new Set(biz.map(function(d) { return d.dateStr ? d.dateStr.slice(0,7) : ''; }).filter(Boolean))].sort().reverse();
  var topN = lvlList.slice(0, 30);
  // ===== HTML 渲染 =====
  var html = '<div style="display:flex;flex-wrap:wrap;gap:12px;padding:16px 20px;background:var(--bg-card);border-radius:12px;margin-bottom:16px;align-items:center">';
  html += '<button class="back-btn" onclick="navigateTo(\'biz-demand\')" style="margin-right:8px">← 返回需求满足</button>';
  html += '<span style="font-size:13px;font-weight:600;color:var(--text-primary)">📊 业务需求可信度分析</span>';

    } else if (r.lvl===3) {

    } else if (r.lvl===2) {
      advice = 'DACR 30-50%虚高：补货量=max(系统需求, 系统需求×1.15) +安全库存+未清-在途-在库';
    } else {

    }
    html += '<tr><td class="c">'+(i+1)+'</td><td style="font-family:monospace">'+r.sku+'</td><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(r.skuName||'')+'">'+(r.skuName||'—')+'</td><td>'+r.rdc+'</td><td>'+r.channel+'</td><td class="num">'+formatNum(r.bizD)+'</td><td class="num">'+formatNum(r.shipped)+'</td><td class="num" style="color:'+lvlColor+';font-weight:700">'+(r.dacr*100).toFixed(1)+'%</td><td style="background:'+lvlBg+';color:'+lvlColor+';font-weight:700">'+r.level+'</td><td class="num" style="color:#DC2626">'+formatNum(r.gap)+'</td><td class="num">'+dacCoef.toFixed(2)+'</td><td class="num" style="font-weight:700">'+formatNum(recAdopt)+'</td><td class="num" style="color:'+(kaSafety==='×0.7'?'#EA580C':'#15803D')+';font-weight:700">'+kaSafety+'</td><td style="font-size:10px;line-height:1.4;max-width:380px">'+advice+'</td></tr>';

      yAxis: { type: 'category', data: chLabels },

        type: 'bar', data: chLabels.map(function(ch) { return { value: chMap[ch].dacr, itemStyle: { color: chMap[ch].dacr >= 0.8 ? '#15803D' : chMap[ch].dacr >= 0.5 ? '#D97706' : chMap[ch].dacr >= 0.3 ? '#EA580C' : '#DC2626' } }; }),
        label: { show: true, position: 'right', formatter: function(p) { return (p.value*100).toFixed(1)+'%'; }, fontSize: 12, fontWeight: 700 }
      }]
    });
    // 月度趋势图：只统计 dacrList 里的产品（口径与dacrList一致）
    var trendChart = echarts.init(document.getElementById('chart-dacr-trend'));
    var trendMonths = months.slice(0, 6).reverse();
    // 构建 dacrList 里的产品名+rdc 集合（用于过滤订单）
    var dacrProdSet = {};
    dacrList.forEach(function(r) { dacrProdSet[normKey(r.skuName) + '|' + r.rdc] = true; });
    var trendData = trendMonths.map(function(m) {
      var tBiz = 0, tShip = 0;
      dacrList.forEach(function(r) {

      orders.forEach(function(d) {
        var dm = d.dateStr ? d.dateStr.slice(0,7) : '';
        if (dm !== m) return;
        if (d.channel !== 'KA' && d.channel !== '经销商' && d.channel !== '新通路') return;
        var pkey = normKey(d.skuName) + '|' + normalizeRdcName(d.warehouse);
        if (dacrProdSet[pkey]) tShip += (d.firstDayQty || 0);
      });
      return tBiz > 0 ? Math.min(tShip / tBiz, 1.5) : 0;
    });
    trendChart.setOption({
      tooltip: { formatter: function(p) { return p.axisValue+': <b>'+(p.value*100).toFixed(1)+'%</b>'; } },
      grid: { left: 50, right: 20, top: 10, bottom: 30 },
      xAxis: { type: 'category', data: trendMonths, axisLabel: { fontSize: 11 } },
      yAxis: { type: 'value', min: 0, max: 1, axisLabel: { formatter: function(v) { return (v*100).toFixed(0)+'%'; } } },
      series: [{ type: 'line', data: trendData, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { width: 3, color: '#2563EB' }, itemStyle: { color: '#2563EB' }, areaStyle: { color: 'rgba(37,99,235,0.1)' } }]
    });
    // 热力图：用产品名+RDC+渠道作key（与dacrMap一致）
    var heatEl = document.getElementById('chart-dacr-heat');
    if (heatEl && topN.length > 0) {
      var topPnameRdc = [...new Set(topN.map(function(r) { return r.skuName + '|' + r.rdc; }))];
      var heatChart = echarts.init(heatEl);
      var heatY = topPnameRdc.map(function(k) { var p=k.split('|'); var first=dacrList.find(function(x){return x.skuName===p[0]&&x.rdc===p[1];})||{}; return (p[0]||'').slice(0,12)+'@'+p[1]; });
      var heatChLabels = ['经销商','KA','新通路'];
      var heatData = [];
      topPnameRdc.forEach(function(k, yi) {
        var parts = k.split('|');
        heatChLabels.forEach(function(ch, xi) {
          var pkey = normKey(parts[0]) + '|' + parts[1] + '|' + ch;
          var r = dacrMap[pkey];
          if (r && r.bizD > 0) heatData.push([xi, yi, Math.min(r.dacr, 1)]);
        });
      });
      heatChart.setOption({
        tooltip: { position: 'top', formatter: function(p) {
          var pkey = topPnameRdc[p.data[1]];
          var ch = heatChLabels[p.data[0]];
          var r = dacrMap[normKey(pkey.split('|')[0]) + '|' + pkey.split('|')[1] + '|' + ch];
          if (!r) return ch+': 无数据';
          return '<b>'+r.skuName+'</b><br/>'+r.rdc+' × '+ch+'<br/>DACR: <b>'+(r.dacr*100).toFixed(1)+'%</b><br/>提报 '+formatNum(r.bizD)+' / 出货 '+formatNum(r.shipped);
        }},
        grid: { left: 180, right: 20, top: 40, bottom: 10 },
        xAxis: { type: 'category', data: heatChLabels, position: 'top', splitArea: { show: true }, axisLabel: { fontSize: 11 } },
        yAxis: { type: 'category', data: heatY, splitArea: { show: true }, axisLabel: { fontSize: 9 } },
        visualMap: { min: 0, max: 1, calculable: true, orient: 'horizontal', left: 'center', top: 0, inRange: { color: ['#DC2626','#EA580C','#D97706','#FBBF24','#4ADE80'] }, text: ['可信', '虚高'], textStyle: { fontSize: 10 } },
        series: [{ type: 'heatmap', data: heatData, label: { show: true, fontSize: 8, formatter: function(p) { return (p.data[2]*100).toFixed(0)+'%'; } }, cursor: 'pointer', emphasis: { itemStyle: { shadowBlur: 8 } } }]
      });
    }
  }, 100);
}

function exportDACR() {
  var data = (window._dacrData && window._dacrData.dacrList) || [];
  if (!data.length) { showToast('无数据', true); return; }
  // 表头：补货操作决策列
  var csv = '\uFEFF#,SKU代码,名称,RDC,渠道,业务提报量,实际出货量,虚高增量,DACR(%),DACR分级,DACR上限系数,推荐采纳上限,KA安全库存系数,补货操作建议(可直接套用)\n';
  data.forEach(function(r,i) {
    var dacCoef = Math.min(r.dacr, 0.3);  // DACR上限系数 = min(历史出货÷业务提报, 0.3)
    var recAdoptLimit = Math.round(r.bizD * dacCoef);  // 推荐采纳上限 = 业务提报 × DACR上限
    var kaSafetyCoef = (r.channel === 'KA' && r.dacr < 0.5) ? 0.7 : 1.0;
    // 补货操作建议（按DACR分级给出可直接套用的公式）
    var advice = '';
    if (r.lvl === 4) {
      advice = 'DACR≥80%可信：补货量=max(系统需求,业务提报) +安全库存+未清-在途-在库';
    } else if (r.lvl === 3) {
      advice = 'DACR 50-80%偏高：补货量=max(系统需求, 系统需求×1.3) +安全库存+未清-在途-在库';
    } else if (r.lvl === 2) {
      advice = 'DACR 30-50%虚高：补货量=max(系统需求, 系统需求×1.15) +安全库存+未清-在途-在库';
    } else {
      advice = 'DACR<30%严重虚高：只按系统需求补，不采纳业务增量；' + (r.channel === 'KA' ? 'KA安全库存×0.7；' : '') + '新品设默认上限(系统×1.2)';
    }
    // KA差异化说明
    if (r.channel === 'KA' && r.dacr < 0.5 && r.lvl > 2) {
      advice = 'KA虚高：max(系统需求, 业务提报×DACR) +安全库存×0.7 +未清-在途-在库';
    }
    csv += [
      (i+1),
      r.sku,
      (r.skuName||'').replace(/,/g,'，'),
      r.rdc,
      r.channel,
      r.bizD,
      r.shipped,
      r.gap,
      (r.dacr*100).toFixed(1),
      r.level || '',
      dacCoef.toFixed(3),
      recAdoptLimit,
      kaSafetyCoef.toFixed(1),
      advice
    ].join(',') + '\n';
  });
  downloadFile('业务需求可信度DACR+补货建议_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

function renderBizDemand() {

  html += '<select id="bd-channel-filter" onchange="window._bizDemandFilters.channel=this.value;renderBizDemand()" style="padding:6px 10px;border:1px solid var(--border-card);border-radius:6px;font-size:12px"><option value="all"'+(f.channel==='all'?' selected':'')+'>全部渠道</option><option value="经销商"'+(f.channel==='经销商'?' selected':'')+'>经销商</option><option value="KA"'+(f.channel==='KA'?' selected':'')+'>KA</option><option value="新通路"'+(f.channel==='新通路'?' selected':'')+'>新通路</option></select>';
  html += '<span style="font-size:11px;color:var(--text-secondary);margin-left:auto" title="仅统计 SAP放行日期 晚于该SKU最早补货日期 的出货，且不晚于次月15日">共 ' + summary.length + ' 条记录 · 出货窗口：补货日期次日 ~ 次月15日（仅计提报后出货）</span>';
  html += '</div>';

  // ===== KPI 卡片 =====
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px">';
  html += '<div class="kpi-card blue"><div class="kpi-label">总业务提报量</div><div class="kpi-value">' + formatNum(totalDemand) + '</div></div>';
  html += '<div class="kpi-card green"><div class="kpi-label">总实际出货量</div><div class="kpi-value">' + formatNum(totalShipped) + '</div></div>';
  html += '<div class="kpi-card orange"><div class="kpi-label">整体出货进度</div><div class="kpi-value">' + avgProgress.toFixed(1) + '<span class="kpi-unit">%</span></div></div>';
  html += '</div>';

  // ===== 图表 =====
  html += '<div style="margin-bottom:16px">';

  html += '<button class="btn-export" onclick="exportBizDemandTable()">导出CSV</button></div>';

  html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
  html += '<th style="position:sticky;left:0;background:inherit;z-index:1">月份</th><th>RDC</th><th>渠道</th><th class="num">提报量</th><th class="num">出货量</th><th class="num">出货进度</th><th class="num">SKU数</th><th style="cursor:pointer" onclick="navigateToBizDemandDetail()" title="点击查看所有SKU明细">操作</th>';

      name: ch,
      type: 'bar',
