}

// ============ FULFILLMENT PAGE ============
function renderFulfillment() {
  setTitle('订单满足率分析');
  const page = document.getElementById('page-fulfillment');
  if (!page) return;

  // 构建日期选项列表（按全局月份过滤）
  const dateSet = new Set();
  const odForDates = (filters.dataMonth && filters.dataMonth !== 'all')
    ? dataStore.orderDetail.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : dataStore.orderDetail;
  odForDates.forEach(d => { if (d.dateStr) dateSet.add(d.dateStr); });
  const dateOptions = [...dateSet].sort().reverse();
  if (!filters.fulfillDate || filters.fulfillDate === 'all' || (filters.dataMonth && filters.dataMonth !== 'all' && !filters.fulfillDate.startsWith(filters.dataMonth))) {
    filters.fulfillDate = dateOptions[0] || 'all';
  }

  const activeChannels = getFulfillCheckedChannels();
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';

  // ---- 工作日日订单满足率趋势数据（按RDC+月份筛选） ----
  const selectedRdc = filters.fulfillRDC;
  const weekdayMap = {};
  dataStore.orderDetail.forEach(d => {
    if (monthFilter && !d.dateStr.startsWith(filters.dataMonth)) return;
    if (selectedRdc !== 'all' && d.warehouse !== selectedRdc) return; // 按RDC筛选
    if (!isWorkday(d.dateStr)) return; // 跳过周末和国定假日
    const key = d.dateStr + '|' + d.channel;
    if (!weekdayMap[key]) weekdayMap[key] = { dateStr: d.dateStr, channel: d.channel, orderQty: 0, firstDayQty: 0 };
    weekdayMap[key].orderQty += d.orderQty;
    weekdayMap[key].firstDayQty += d.firstDayQty;
  });
  const weekdayData = Object.values(weekdayMap);
  const wdDates = [...new Set(weekdayData.map(d => d.dateStr))].sort();

  // ---- RDC×渠道 统计表数据 ----
  // 日满足率（按选中日期过滤）
  const dayRdcChMap = {};
  const dayFiltered = dataStore.orderDetail.filter(d => d.dateStr === filters.fulfillDate);
  dayFiltered.forEach(d => {
    const key = d.warehouse + '|' + d.channel;
    if (!dayRdcChMap[key]) dayRdcChMap[key] = { rdc: d.warehouse, channel: d.channel, orderQty: 0, firstDayQty: 0, totalFulfillQty: 0 };
    dayRdcChMap[key].orderQty += d.orderQty;
    dayRdcChMap[key].firstDayQty += d.firstDayQty;
    dayRdcChMap[key].totalFulfillQty += d.totalFulfillQty;
  });
  // 月满足率（按全局月份过滤）
  const monthRdcChMap = {};
  const monthOrderData = monthFilter
    ? dataStore.orderDetail.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth))
    : dataStore.orderDetail;
  monthOrderData.forEach(d => {
    const key = d.warehouse + '|' + d.channel;
    if (!monthRdcChMap[key]) monthRdcChMap[key] = { rdc: d.warehouse, channel: d.channel, orderQty: 0, firstDayQty: 0, totalFulfillQty: 0 };
    monthRdcChMap[key].orderQty += d.orderQty;
    monthRdcChMap[key].firstDayQty += d.firstDayQty;
    monthRdcChMap[key].totalFulfillQty += d.totalFulfillQty;
  });

  // 获取RDC某渠道某日缺货TOP5（tooltip用）
  function getRdcChannelShortageSKUs(rdc, channel, dateStr, limit) {
    limit = limit || 5;
    if (!rdc || !channel || !dateStr) return [];
    const dedup = {};
    dataStore.orderDetail.filter(d => d.warehouse === rdc && d.channel === channel && d.dateStr === dateStr && d.totalGap > 0).forEach(d => {
      if (!dedup[d.skuCode]) dedup[d.skuCode] = { code: d.skuCode, name: d.skuName, gap: 0 };
      dedup[d.skuCode].gap += d.totalGap;
    });
    return Object.values(dedup).sort((a,b) => b.gap - a.gap).slice(0, limit);
  }

  page.innerHTML = `
    <div class="filter-bar">
      <label>显示渠道：</label>
      ${renderFulfillChannelCheckboxes()}
      <label>RDC：</label>
      <select id="filter-fulfill-rdc" onchange="filters.fulfillRDC=this.value;renderFulfillment()" style="min-width:120px">
        <option value="all" ${filters.fulfillRDC==='all'?'selected':''}>所有RDC</option>
        ${RDC_LIST.map(r => '<option value="'+r+'"'+(filters.fulfillRDC===r?' selected':'')+'>'+r+'</option>').join('')}
      </select>
      <span style="font-size:11px;color:var(--text-secondary);margin-left:auto">日满足率基于所选日期 · 月满足率基于全月数据</span>
    </div>
    ${renderFulfillmentHistory() || ''}
    <div class="card">
      <div class="card-header"><span class="card-title">日订单满足趋势（跳过双休日）</span></div>
      <div class="chart-container" id="chart-fulfill-weekday"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">RDC × 渠道 订单满足率统计表</span>
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:11px;color:var(--text-secondary)">📅</label>
          <select onchange="filters.fulfillDate=this.value;renderFulfillment()" style="min-width:120px;padding:4px 8px;border:1px solid var(--border-card);border-radius:6px;font-size:12px;background:var(--bg-card);color:var(--text-primary);outline:none">
            ${dateOptions.map(d => '<option value="'+d+'"'+(filters.fulfillDate===d?' selected':'')+'>'+d+'</option>').join('')}
          </select>
        </div>
      </div>
      <div class="table-wrap" id="table-rdc-channel-fulfill"></div>
    </div>
  `;

  // ---- 折线图：工作日订单满足趋势 ----
  if (wdDates.length > 0 && activeChannels.length > 0) {
    const chart1 = initChart('chart-fulfill-weekday');
    const colors = { 'KA': '#2563EB', '经销商': '#10B981' };
    chart1.setOption({
      tooltip: {
        trigger: 'axis',
        confine: true,
        textStyle: { fontSize: 11 },
        formatter: function(params) {
          const dateStr = params[0].axisValue;
          let html = '<strong>' + dateStr + '</strong>';
          params.forEach(p => {
            const ch = p.seriesName;
            const rate = (p.value * 100).toFixed(1) + '%';
            html += '<br/>' + ch + '：' + rate;
          });
          return html;
        }
      },
      legend: { data: activeChannels, top: 5, left: 10, textStyle: { fontSize: 11 } },
      grid: { left: 55, right: 20, top: 40, bottom: 60 },
      xAxis: { type: 'category', data: wdDates, axisLabel: { rotate: 45, fontSize: 10, interval: Math.max(0, Math.floor(wdDates.length / 10) - 1) }, boundaryGap: true },
      yAxis: { type: 'value', min: 0.55, max: 1.03, axisLabel: { formatter: v => (v*100).toFixed(0)+'%' } },
      series: activeChannels.map(ch => {
        const chData = wdDates.map(d => {
          const item = weekdayMap[d + '|' + ch];
          return item ? (item.orderQty > 0 ? item.firstDayQty / item.orderQty : null) : null;
        });
        return { name: ch, type: 'line', data: chData, smooth: true, symbol: 'none', lineStyle: { width: 2 }, color: colors[ch] || '#64748B' };
      })
    });
  }

  // ---- 统计表：RDC×渠道 ----
  const channels = ['KA', '经销商'];
  const tableRows = [];
  RDC_LIST.forEach(rdc => {
    const row = { rdc: rdc };
    let allDayOrder = 0, allDayFirst = 0, allMonthOrder = 0, allMonthFulfill = 0;
    channels.forEach(ch => {
      const dk = rdc + '|' + ch;
      const dayData = dayRdcChMap[dk];
      const monthData = monthRdcChMap[dk];
      const dOrder = dayData ? dayData.orderQty : 0;
      const dFirst = dayData ? dayData.firstDayQty : 0;
      const mOrder = monthData ? monthData.orderQty : 0;
      const mFulfill = monthData ? monthData.totalFulfillQty : 0;
      row[ch + '_dayOrder'] = dOrder;
      row[ch + '_dayFirst'] = dFirst;
      row[ch + '_dayRate'] = dOrder > 0 ? dFirst / dOrder : 0;
      row[ch + '_monthOrder'] = mOrder;
      row[ch + '_monthFulfill'] = mFulfill;
      row[ch + '_monthRate'] = mOrder > 0 ? mFulfill / mOrder : 0;
      allDayOrder += dOrder; allDayFirst += dFirst;
      allMonthOrder += mOrder; allMonthFulfill += mFulfill;
    });
    row['total_dayRate'] = allDayOrder > 0 ? allDayFirst / allDayOrder : 0;
    row['total_monthRate'] = allMonthOrder > 0 ? allMonthFulfill / allMonthOrder : 0;
    tableRows.push(row);
  });

  const pctCell = function(v, type) {
    const cls = v >= 0.95 ? 'rate-good' : v >= 0.9 ? 'rate-warn' : 'rate-bad';
    const bg = type === 'day' ? 'background:#FFFBEB;' : 'background:#EFF6FF;';
    return '<td class="num" style="' + bg + '"><span class="' + cls + '">' + formatPct(v) + '</span></td>';
  };

  let tableHtml = '<table class="data-table"><thead><tr>' +
    '<th rowspan="2" style="vertical-align:middle">RDC</th>' +
    '<th colspan="3" style="text-align:center;background:#FFFBEB">日满足率（' + filters.fulfillDate + '）</th>' +
    '<th colspan="3" style="text-align:center;background:#EFF6FF">月满足率（全月）</th>' +
    '</tr><tr>' +
    '<th style="text-align:center;background:#FFFBEB">KA</th><th style="text-align:center;background:#FFFBEB">经销商</th><th style="text-align:center;background:#FFFBEB">合计</th>' +
    '<th style="text-align:center;background:#EFF6FF">KA</th><th style="text-align:center;background:#EFF6FF">经销商</th><th style="text-align:center;background:#EFF6FF">合计</th>' +
    '</tr></thead><tbody>';

  window._tipStore.length = 0;
  tableRows.forEach(r => {
    const dayKa = getRdcChannelShortageSKUs(r.rdc, 'KA', filters.fulfillDate, 5);
    const dayDealer = getRdcChannelShortageSKUs(r.rdc, '经销商', filters.fulfillDate, 5);

    function skuTooltipHTML(channel, skus) {
      let head = '<div style="font-weight:600;margin-bottom:4px">' + r.rdc + ' · ' + channel + '</div>'
        + '<div style="color:#6b7280;font-size:11px;margin-bottom:4px">订单支数：' + formatNum(r[channel + '_dayOrder']) + '</div>';
      if (skus.length === 0) return head + '<div style="color:#9ca3af">当日无缺货记录</div>';
      return head + buildTopShortTipTable(skus, '缺口(箱)', function(s, info){ return (info.boxSpec && s.gap) ? formatNum(Math.round(s.gap / info.boxSpec)) : '—'; }, r.rdc);
    }

    tableHtml += '<tr>' +
      '<td><strong>' + r.rdc + '</strong></td>' +
      // 日满足率（淡黄底）
      '<td class="num" style="background:#FFFBEB;cursor:pointer" data-tip="' + regTip(skuTooltipHTML('KA', dayKa)) + '">' +
        '<span class="' + (r.KA_dayRate >= 0.95 ? 'rate-good' : r.KA_dayRate >= 0.9 ? 'rate-warn' : 'rate-bad') + '">' + formatPct(r.KA_dayRate) + '</span>' +
        (dayKa.length > 0 ? '<br/><span style="font-size:10px;color:var(--text-tertiary)">缺货' + dayKa.length + 'SKU</span>' : '') +
      '</td>' +
      '<td class="num" style="background:#FFFBEB;cursor:pointer" data-tip="' + regTip(skuTooltipHTML('经销商', dayDealer)) + '">' +
        '<span class="' + (r.经销商_dayRate >= 0.95 ? 'rate-good' : r.经销商_dayRate >= 0.9 ? 'rate-warn' : r.经销商_dayRate > 0 ? 'rate-bad' : '') + '">' + formatPct(r.经销商_dayRate) + '</span>' +
        (dayDealer.length > 0 ? '<br/><span style="font-size:10px;color:var(--text-tertiary)">缺货' + dayDealer.length + 'SKU</span>' : '') +
      '</td>' +
      pctCell(r.total_dayRate, 'day') +
      // 月满足率（淡蓝底）
      pctCell(r.KA_monthRate, 'month') +
      pctCell(r.经销商_monthRate, 'month') +
      pctCell(r.total_monthRate, 'month') +
      '</tr>';
  });
  tableHtml += '</tbody></table>';

  // 为每个带缺货的单元格添加tooltip弹框
  document.getElementById('table-rdc-channel-fulfill').innerHTML = tableHtml;

  // 月度满足率历史对比（2025 vs 2026）
  renderFulfillmentHistoryCharts();
}

// 月度订单满足率历史对比卡片（图表 + 表格 + KPI 渲染）
function renderFulfillmentHistoryCharts() {
  if (!dataStore.history || !dataStore.history.fulfillment) return;
  const H = dataStore.history.fulfillment;
  const rdc = window._fulHtyRdc || 'all';
  const months12 = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
  function monthlyArr(year) {
    const m = H[year].monthly;
    if (rdc === 'all') {
      return months12.map((_, i) => {
        let s = 0, c = 0;
        RDC_LIST.forEach(r => { const v = m[r] && m[r][i]; if (v != null) { s += v; c++; } });
        return c ? s / c : null;
      });
    }
    return (m[rdc] || []).slice();
  }
  const arr25 = monthlyArr('2025');
  let arr26 = monthlyArr('2026');
  while (arr26.length < 12) arr26.push(null);
  const arr26pad = arr26;

  // Chart: trend
  const chart = initChart('chart-fulfill-history-trend');
  chart.setOption({
    tooltip: { trigger: 'axis', confine: true, textStyle: { fontSize: 11 }, formatter: function (p) {
      let h = '<strong>' + p[0].axisValue + '</strong>';
      p.forEach(s => { if (s.value != null) h += '<br/>' + s.marker + s.seriesName + '：' + (s.value * 100).toFixed(1) + '%'; });
      return h;
    } },
    legend: { data: ['2025', '2026'], top: 0, left: 'center', textStyle: { fontSize: 11 } },
    grid: { left: 55, right: 20, top: 40, bottom: 30 },
    xAxis: { type: 'category', data: months12, axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', min: 0.5, max: 1.03, axisLabel: { formatter: v => (v * 100).toFixed(0) + '%' } },
    series: [
      { name: '2025', type: 'line', data: arr25, smooth: true, symbol: 'none', lineStyle: { width: 2, type: 'dashed' }, color: '#94a3b8' },
      { name: '2026', type: 'line', data: arr26pad, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { width: 2 }, color: '#2563EB' }
    ]
  });

  // Matrix table: RDC x month (1-6), cell = 2026 value, sub = 2025 value + YoY delta
  const h1 = [0, 1, 2, 3, 4, 5];
  let mHtml = '<table class="data-table"><thead><tr><th style="text-align:left">RDC</th>';
  ['1月', '2月', '3月', '4月', '5月', '6月'].forEach(mo => mHtml += '<th style="text-align:right">' + mo + '</th>');
  mHtml += '<th style="text-align:right">上半年均值</th></tr></thead><tbody>';
  RDC_LIST.forEach(r => {
    mHtml += '<td><strong>' + r + '</strong></td>';
    let s26 = 0, c26 = 0, s25 = 0, c25 = 0;
    h1.forEach(i => {
      const v26 = H['2026'].monthly[r][i];
      const v25 = H['2025'].monthly[r][i];
      let cell = '';
      if (v26 != null) {
        cell += '<div class="rate-' + (v26 >= 0.95 ? 'good' : v26 >= 0.9 ? 'warn' : 'bad') + '">' + (v26 * 100).toFixed(1) + '%</div>';
        s26 += v26; c26++;
      } else cell += '<div style="color:#cbd5e1">—</div>';
      if (v25 != null) {
        const d = (v26 != null) ? (v26 - v25) : null;
        const dStr = d != null ? ('<span style="font-size:10px;color:' + (d >= 0 ? 'var(--color-green)' : 'var(--color-red)') + '">' + (d >= 0 ? '+' : '') + (d * 100).toFixed(1) + 'pp</span>') : '';
        cell += '<div style="font-size:10px;color:var(--text-tertiary)">25: ' + (v25 * 100).toFixed(1) + '%</div>' + dStr;
        s25 += v25; c25++;
      }
      mHtml += '<td class="num" style="text-align:right">' + cell + '</td>';
    });
    const avg26 = c26 ? s26 / c26 : null;
    const avg25 = c25 ? s25 / c25 : null;
    let avgCell = avg26 != null ? (avg26 * 100).toFixed(1) + '%' : '—';
    if (avg26 != null && avg25 != null) {
      const d = avg26 - avg25;
      avgCell += '<br/><span style="font-size:10px;color:' + (d >= 0 ? 'var(--color-green)' : 'var(--color-red)') + '">' + (d >= 0 ? '+' : '') + (d * 100).toFixed(1) + 'pp</span>';
    }
    mHtml += '<td class="num" style="text-align:right;font-weight:600">' + avgCell + '</td></tr>';
  });
  mHtml += '</tbody></table>';
  document.getElementById('table-fulfill-history-matrix').innerHTML = mHtml;

  // KPI overview (first-half YoY)
  function avgOf(year, idxs) {
    let s = 0, c = 0;
    RDC_LIST.forEach(r => { idxs.forEach(i => { const v = H[year].monthly[r][i]; if (v != null) { s += v; c++; } }); });
    return c ? s / c : 0;
  }
  const h1_26 = avgOf('2026', h1), h1_25 = avgOf('2025', h1);
  const jun_26 = avgOf('2026', [5]), jun_25 = avgOf('2025', [5]);
  function pp(cur, prev) { const d = cur - prev; return { color: d >= 0 ? 'var(--color-green)' : 'var(--color-red)', txt: (d >= 0 ? '+' : '') + (d * 100).toFixed(1) + 'pp' }; }
  const a1 = pp(h1_26, h1_25), a2 = pp(jun_26, jun_25);
  let improved = 0, declined = 0;
  RDC_LIST.forEach(r => h1.forEach(i => { const v26 = H['2026'].monthly[r][i], v25 = H['2025'].monthly[r][i]; if (v26 != null && v25 != null) { if (v26 >= v25) improved++; else declined++; } }));
  const kpiHtml = '<div style="padding:12px">' +
    '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border-card)"><span style="font-size:12px;color:var(--text-secondary)">2026上半年月均满足率</span><span style="font-size:18px;font-weight:700">' + (h1_26 * 100).toFixed(1) + '%</span></div>' +
    '<div style="text-align:right;font-size:11px;color:' + a1.color + '">同比 ' + a1.txt + '（2025 H1：' + (h1_25 * 100).toFixed(1) + '%）</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border-card)"><span style="font-size:12px;color:var(--text-secondary)">2026年6月月均满足率</span><span style="font-size:18px;font-weight:700">' + (jun_26 * 100).toFixed(1) + '%</span></div>' +
    '<div style="text-align:right;font-size:11px;color:' + a2.color + '">同比 ' + a2.txt + '（2025年6月：' + (jun_25 * 100).toFixed(1) + '%）</div>' +
    '<div style="margin-top:10px;font-size:12px;color:var(--text-secondary)">上半年 36 个「RDC×月」中：<span style="color:var(--color-green)">↑ ' + improved + ' 个改善</span> · <span style="color:var(--color-red)">↓ ' + declined + ' 个下滑</span></div>' +
    '</div>';
  document.getElementById('kpi-fulfill-history').innerHTML = kpiHtml;
}

function renderShortage() {

// ============ SHORTAGE ORDER-DETAIL ANALYSIS ============
function renderShortageOrderDetail() {
  setTitle('缺货分析 - 订单明细');
  const page = document.getElementById('page-shortage');
  if (!page || !dataStore.loaded || dataStore.orderDetail.length === 0) {
    page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)">请先导入包含订单明细的数据</div>';
    return;
  }

  const data = dataStore.orderDetail;
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';

  // ---- Filters ----
  window._odRdc = window._odRdc || 'all';
  const odRdc = window._odRdc;
  // Channel checkboxes: default both checked (only when undefined)
  if (typeof window._odChKa === 'undefined') window._odChKa = true;
  if (typeof window._odChDealer === 'undefined') window._odChDealer = true;
  const showKa = window._odChKa;
  const showDealer = window._odChDealer;
  const activeChannels = [];
  if (showKa) activeChannels.push('KA');
  if (showDealer) activeChannels.push('经销商');

  // Get all RDCs from orderDetail
  const allRdcs = [...new Set(data.map(d => d.warehouse).filter(Boolean))].sort();

  // Apply month+RDC+channel filters
  let filtered = data;
  if (monthFilter) filtered = filtered.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth));
  if (odRdc !== 'all') filtered = filtered.filter(d => d.warehouse === odRdc);
  if (activeChannels.length > 0 && activeChannels.length < 2) {
    filtered = filtered.filter(d => activeChannels.includes(d.channel));
  } else if (activeChannels.length === 0) {
    filtered = [];
  }

  // ---- 汇总统计 (all/ka/dealer from filtered data, respecting channel) ----
  function buildSummary(src) {
    const s = { firstShort: 0, fulfilled: 0, reject: 0, gap: 0 };
    src.forEach(d => {
      s.firstShort += d.firstDayShort;
      s.fulfilled += d.firstDayQty;
      if (d.rejectReason && d.rejectReason.trim() !== '') s.reject += d.firstDayShort;
      s.gap += d.totalGap;
    });
    return s;
  }
  const sumAll = buildSummary(filtered);
  const sumKa = buildSummary(filtered.filter(d => d.channel === 'KA'));
  const sumDealer = buildSummary(filtered.filter(d => d.channel === '经销商'));

  // ---- 品牌维度 ----
  const brandMap = {};
  filtered.forEach(d => {
    if (!brandMap[d.brand]) brandMap[d.brand] = { all:0, ka:0, dealer:0, fulfilled:0 };
    brandMap[d.brand].all += d.firstDayShort;
    brandMap[d.brand].fulfilled += d.firstDayQty;
    if (d.channel === 'KA') brandMap[d.brand].ka += d.firstDayShort;
    else if (d.channel === '经销商') brandMap[d.brand].dealer += d.firstDayShort;
  });
  const brandSorted = Object.entries(brandMap).sort((a,b) => b[1].all - a[1].all);
  const brandNames = brandSorted.map(([b]) => b);
  const brandAllData = brandSorted.map(([,v]) => v.all);
  const brandKaData = brandSorted.map(([,v]) => v.ka);
  const brandDealerData = brandSorted.map(([,v]) => v.dealer);

  // ---- SKU维度明细 ----
  const skuMap = {};
  filtered.forEach(d => {
    const key = d.brand + '|' + d.skuCode;
    if (!skuMap[key]) skuMap[key] = {
      brand: d.brand, skuCode: d.skuCode, skuName: d.skuName,
      firstShort:0, fulfilled:0, gap:0, reject:0, orderQty:0,
      kaFirstShort:0, kaGap:0, dealerFirstShort:0, dealerGap:0,
      dates: new Set()
    };
    const s = skuMap[key];
    s.firstShort += d.firstDayShort;
    s.fulfilled += d.firstDayQty;
    s.gap += d.totalGap;
    s.orderQty += d.orderQty;
    if (d.rejectReason && d.rejectReason.trim() !== '') s.reject += d.firstDayShort;
    s.dates.add(d.dateStr);
    if (d.channel === 'KA') { s.kaFirstShort += d.firstDayShort; s.kaGap += d.totalGap; }
    else if (d.channel === '经销商') { s.dealerFirstShort += d.firstDayShort; s.dealerGap += d.totalGap; }
  });
  let skuList = Object.values(skuMap).sort((a,b) => b.gap - a.gap);
  // ---- 新增筛选：KA&经销商都缺货 ----
  window._odBothShort = typeof window._odBothShort === 'undefined' ? false : window._odBothShort;
  const showBothOnly = window._odBothShort;

  // Apply both-short filter
  if (showBothOnly) {
    skuList = skuList.filter(s => s.kaFirstShort > 0 && s.dealerFirstShort > 0);
  }

  // Pagination
  const perPage = 30;
  window._shortageSkuPage = window._shortageSkuPage || 1;
  const totalSkuPages = Math.ceil(skuList.length / perPage) || 1;
  if (window._shortageSkuPage > totalSkuPages) window._shortageSkuPage = totalSkuPages;
  const startSku = (window._shortageSkuPage - 1) * perPage;
  const skuPageData = skuList.slice(startSku, startSku + perPage);

  const monthLabel = monthFilter ? filters.dataMonth : '全部月份';

  const rdcFilterHtml = `<label>RDC：</label>
    <select onchange="window._odRdc=this.value;window._shortageSkuPage=1;renderShortage()" style="padding:3px 8px;border:1px solid var(--border-card);border-radius:4px;font-size:12px">
      <option value="all" ${odRdc==='all'?'selected':''}>全部RDC</option>
      ${allRdcs.map(r => '<option value="'+r+'"'+(odRdc===r?' selected':'')+'>'+r+'</option>').join('')}

// 矩阵品牌列表（与 dataStore.orderDetail 中的 brand 字段保持一致）
// 调整历史：2026-07-15 根据实际7月数据剔除友谊/春蕾/海鸥/百爱神/雅霜（数据中无），保留数据中有的上海/六神/启初/家安/美加净/高夫/传统
const MATRIX_BRANDS = ['上海','六神','启初','家安','美加净','高夫','传统'];
const MATRIX_RDCS = ['华南RDC','华北RDC','东北RDC','西北RDC','华中RDC','西南RDC'];

// 满足率背景色（红→黄→绿，与图2 渐变一致）
function matrixColor(rate) {
  if (rate >= 0.95) return { bg: '#A7F3D0', fg: '#065F46' }; // 深绿
  if (rate >= 0.85) return { bg: '#D1FAE5', fg: '#065F46' }; // 绿
  if (rate >= 0.7)  return { bg: '#FEF3C7', fg: '#92400E' }; // 黄
  if (rate >= 0.5)  return { bg: '#FED7AA', fg: '#9A3412' }; // 橙
  if (rate > 0)     return { bg: '#FECACA', fg: '#991B1B' }; // 浅红
  return { bg: '#F3F4F6', fg: '#6B7280' }; // 灰
}

function renderBrandRdcMatrix() {
  const container = document.getElementById('brand-rdc-matrix');
  if (!container) return;
  if (!dataStore.orderDetail || dataStore.orderDetail.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">暂无订单明细数据</div>';
    return;
  }

  // 跟上层筛选联动：月份 + 渠道(KA/经销商)。RDC 不联动（矩阵永远 6 RDC 全景）
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';
  const showKa = window._odChKa !== false;
  const showDealer = window._odChDealer !== false;
  const activeCh = [];
  if (showKa) activeCh.push('KA');
  if (showDealer) activeCh.push('经销商');
  let data = dataStore.orderDetail;
  if (monthFilter) data = data.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth));
  if (activeCh.length > 0 && activeCh.length < 2) {
    data = data.filter(d => activeCh.includes(d.channel));
  } else if (activeCh.length === 0) {
    data = [];
  }

  // 日期下拉 = filtered 中的所有日期
  const allDates = [...new Set(data.map(d => d.dateStr).filter(Boolean))].sort();
  const sel = document.getElementById('matrix-date');
  if (sel) {
    if (sel.options.length === 0) {
      allDates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); });
      // 首次填充后设默认值为最新日期
      window._matrixDate = allDates[allDates.length - 1] || '';
      sel.value = window._matrixDate;
    }
    // onchange 时 window._matrixDate 已由 onchange 同步，不碰 sel.value，避免干扰
  }
  // 矩阵永远按日（默认行为，UI 不可改）
  window._matrixGran = 'day';

  // 计算矩阵
  const matrix = {};
  MATRIX_BRANDS.forEach(b => {
    matrix[b] = {};
    MATRIX_RDCS.forEach(r => { matrix[b][r] = { qty: 0, firstShort: 0 }; });
  });
  data.forEach(d => {
    if (!d.brand || !d.warehouse) return;
    if (!matrix[d.brand] || matrix[d.brand][d.warehouse] === undefined) return;
    if (d.dateStr !== window._matrixDate) return; // 按日
    matrix[d.brand][d.warehouse].qty += d.orderQty;
    matrix[d.brand][d.warehouse].firstShort += d.firstDayShort;
  });

  // 表格（紧凑样式：列宽 30px，padding 2px）
  let html = '<table style="width:auto;border-collapse:collapse;font-size:11px;table-layout:fixed"><colgroup><col style="width:85px">';
  MATRIX_RDCS.forEach(() => { html += '<col style="width:83px">'; });
  html += '</colgroup><thead><tr>';
  html += '<th style="text-align:left;padding:3px 4px;background:#F3F4F6;border:1px solid #E5E7EB;font-weight:600;position:sticky;left:0;z-index:1">品牌 \\ RDC</th>';
  MATRIX_RDCS.forEach(r => {
    html += '<th style="padding:3px 2px;background:#F3F4F6;border:1px solid #E5E7EB;font-weight:600;font-size:11px;white-space:nowrap">'+r+'</th>';
  });
  html += '</tr></thead><tbody>';

  MATRIX_BRANDS.forEach(b => {
    html += '<tr>';
    html += '<td style="padding:3px 4px;font-weight:600;border:1px solid #E5E7EB;background:#F9FAFB;position:sticky;left:0;z-index:1;white-space:nowrap">'+b+'</td>';
    MATRIX_RDCS.forEach(r => {
      const m = matrix[b][r];
      let content, bg, fg;
      if (m.qty === 0) {
        content = '<span style="color:#9CA3AF;font-size:10px">无订单</span>';
        bg = '#F9FAFB'; fg = '#9CA3AF';
      } else {
        const rate = 1 - m.firstShort / m.qty;
        const c = matrixColor(rate);
        content = (rate * 100).toFixed(1) + '%';
        bg = c.bg; fg = c.fg;
      }
      const tr = { type: 'day', dateStr: window._matrixDate };
      const trJson = JSON.stringify(tr).replace(/"/g, '&quot;');
      html += '<td data-brand="'+b+'" data-rdc="'+r+'" data-tr="'+trJson+'" '
        + 'style="padding:3px 2px;text-align:center;border:1px solid #E5E7EB;background:'+bg+';color:'+fg+';cursor:pointer;transition:transform 0.1s;white-space:nowrap" '
        + 'onmouseenter="showMatrixTooltip(event, this)" onmouseleave="hideMatrixTooltip()">'
        + '<span style="font-weight:600">'+content+'</span></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';

  // 图例
  html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding:8px 0;font-size:11px;color:var(--text-secondary)">'
    + '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:14px;height:14px;background:#A7F3D0;border:1px solid #E5E7EB;display:inline-block"></span>≥95%</span>'
    + '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:14px;height:14px;background:#D1FAE5;border:1px solid #E5E7EB;display:inline-block"></span>85-95%</span>'
    + '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:14px;height:14px;background:#FEF3C7;border:1px solid #E5E7EB;display:inline-block"></span>70-85%</span>'
    + '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:14px;height:14px;background:#FED7AA;border:1px solid #E5E7EB;display:inline-block"></span>50-70%</span>'
    + '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:14px;height:14px;background:#FECACA;border:1px solid #E5E7EB;display:inline-block"></span><50%</span>'
    + '<span style="display:inline-flex;align-items:center;gap:4px;margin-left:auto">鼠标悬停查看TOP5首日缺货产品</span>'
    + '</div>';

  container.innerHTML = html;
}

function showMatrixTooltip(event, td) {
  let tip = document.getElementById('matrix-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'matrix-tooltip';
    tip.style.cssText = 'position:fixed;background:rgba(31,41,55,0.96);color:#fff;padding:10px 14px;border-radius:6px;font-size:12px;z-index:10000;pointer-events:none;box-shadow:0 6px 18px rgba(0,0,0,0.35);max-width:360px;line-height:1.6';
    document.body.appendChild(tip);
  }
  const brand = td.getAttribute('data-brand');
  const rdc = td.getAttribute('data-rdc');
  const trJson = td.getAttribute('data-tr');
  let tr = { type: 'all' };
  try { tr = JSON.parse(trJson); } catch(e) {}
  const skus = getTopFirstDayShortSKUsByBrand(brand, rdc, tr, 5);
  const dateLabel = tr.type === 'day' ? tr.dateStr : (tr.month || '');
  let html = '<div style="font-weight:600;margin-bottom:6px;font-size:13px">'+brand+' × '+rdc+'</div>';
  html += '<div style="color:#9CA3AF;font-size:11px;margin-bottom:6px">'+dateLabel+' · 首日缺货TOP5</div>';
  if (skus.length === 0) {
    html += '<div style="color:#9CA3AF">该单元格下无首日缺货记录</div>';
  } else {
    let rows = '';
    skus.forEach((s, i) => {
      const info = getSkuSupplyInfo(s.code, rdc);
      const transit = info.transitBoxes ? formatNum(info.transitBoxes) : '—';
      const supply = info.dcSupply || '—';
      const gapBoxes = (info.boxSpec && s.gap) ? formatNum(Math.round(s.gap / info.boxSpec)) : '—';
      rows += '<tr>'
        + '<td style="color:#9CA3AF;padding:2px 10px 2px 0;text-align:right">'+(i+1)+'.</td>'
        + '<td style="padding:2px 10px 2px 0;font-size:11px;color:#9CA3AF">'+s.code+'</td>'
        + '<td style="padding:2px 10px 2px 0">'+s.name+'</td>'
        + '<td style="padding:2px 10px 2px 0;text-align:right;color:#FCA5A5;font-weight:600">'+gapBoxes+'</td>'
        + '<td style="padding:2px 10px 2px 0;text-align:right">'+transit+'</td>'
        + '<td style="padding:2px 0 0 0;max-width:130px">'+supply+'</td></tr>';
    });
    html += '<table style="border-collapse:collapse;font-variant-numeric:tabular-nums;margin-top:6px;width:100%">'
      + '<thead><tr style="color:#9CA3AF;font-size:10px;text-align:left">'
      + '<th style="padding:2px 10px 4px 0;text-align:right">#</th>'
      + '<th style="padding:2px 10px 4px 0">代码</th>'
      + '<th style="padding:2px 10px 4px 0">品名</th>'
      + '<th style="padding:2px 10px 4px 0;text-align:right">缺口(箱)</th>'
      + '<th style="padding:2px 10px 4px 0;text-align:right">在途(箱)</th>'
      + '<th style="padding:2px 0 4px 0">大仓供应</th></tr></thead>'
      + '<tbody>'+rows+'</tbody></table>';
  }
  tip.innerHTML = html;
  // 位置：鼠标右下方，超出屏幕则放左/上
  const padding = 14;
  const vw = window.innerWidth, vh = window.innerHeight;
  const tipW = tip.offsetWidth || 320, tipH = tip.offsetHeight || 200;
  let left = event.clientX + padding;
  let top = event.clientY + padding;
  if (left + tipW + 8 > vw) left = event.clientX - tipW - padding;
  if (top + tipH + 8 > vh) top = event.clientY - tipH - padding;
  tip.style.left = Math.max(8, left) + 'px';
  tip.style.top = Math.max(8, top) + 'px';
  tip.style.display = 'block';
}

function exportShortageOrderDetailCSV() {
  const data = dataStore.orderDetail;
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';
  const odRdc = window._odRdc || 'all';
  const showKa = window._odChKa !== false;
  const showDealer = window._odChDealer !== false;
  const activeCh = [];
  if (showKa) activeCh.push('KA');
  if (showDealer) activeCh.push('经销商');

  let filtered = data;
  if (monthFilter) filtered = filtered.filter(d => d.dateStr && d.dateStr.startsWith(filters.dataMonth));
  if (odRdc !== 'all') filtered = filtered.filter(d => d.warehouse === odRdc);
  if (activeCh.length > 0) filtered = filtered.filter(d => activeCh.includes(d.channel));

  const skuMap = {};
  filtered.forEach(d => {
    const key = d.brand + '|' + d.skuCode;
    if (!skuMap[key]) skuMap[key] = {
      brand: d.brand, skuCode: d.skuCode, skuName: d.skuName,
      firstShort:0, fulfilled:0, gap:0, reject:0, orderQty:0,
      kaFirstShort:0, kaGap:0, dealerFirstShort:0, dealerGap:0
    };
    const s = skuMap[key];
    s.firstShort += d.firstDayShort;
    s.fulfilled += d.firstDayQty;
    s.gap += d.totalGap;
    s.orderQty += d.orderQty;
    if (d.rejectReason && d.rejectReason.trim() !== '') s.reject += d.firstDayShort;
    if (!skuMap[key]._dates) skuMap[key]._dates = new Set();
    skuMap[key]._dates.add(d.dateStr);
    if (d.channel === 'KA') { s.kaFirstShort += d.firstDayShort; s.kaGap += d.totalGap; }
    else if (d.channel === '经销商') { s.dealerFirstShort += d.firstDayShort; s.dealerGap += d.totalGap; }
  });
  const skuList = Object.values(skuMap);
  let csv = '\uFEFF品牌,SKU编码,SKU名称,首日未满足,已满足,剩余缺口,拒绝,订单总量,KA&经销商都缺货,KA首日未满足,KA剩余缺口,经销首日未满足,经销剩余缺口\n';
  skuList.forEach(s => {
    const bothShort = (s.kaFirstShort > 0 && s.dealerFirstShort > 0) ? '是' : '';
    csv += s.brand + ',' + s.skuCode + ',"' + s.skuName + '",' + s.firstShort + ',' + s.fulfilled + ',' + s.gap + ',' + s.reject + ',' + s.orderQty + ',' + bothShort + ',' + s.kaFirstShort + ',' + s.kaGap + ',' + s.dealerFirstShort + ',' + s.dealerGap + '\n';
  });
  downloadFile('订单缺货分析_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

function renderBrandChannel() {
  setTitle('品牌与渠道分析');
  const page = document.getElementById('page-brand-channel');
  if (!page) return;

  const rdcFilter = filters.brandChannelRDC;
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';
  const monthOrderData = monthFilter

    : dataStore.orderDetail;
  const brandFl = getNormalizedBrandFulfill();

  // 品牌矩阵用全月数据，截至日期取订单明细最新日期
  const allOrderDates = dataStore.orderDetail.map(d => d.dateStr);
  const latestDate = allOrderDates.length > 0 ? allOrderDates.sort().pop() : '';
  const matrixDateLabel = latestDate || '全月';

  // 初始化品牌勾选状态
  if (!window._brandChecked) {
    window._brandChecked = {};
    BRAND_LIST.slice(0, 8).forEach(b => window._brandChecked[b] = true);
  }
  function renderBrandCheckboxes() {
    return '<div class="rdc-checkboxes" style="margin-bottom:0;padding-top:0">' +
      BRAND_LIST.slice(0, 8).map(function(b) {
        var checked = window._brandChecked[b];
        return '<label class="rdc-checkbox-chip' + (checked ? ' checked' : '') + '" style="' + (checked ? 'background:#EFF6FF;border-color:#2563EB;color:#1D4ED8' : '') + '" onclick="event.stopPropagation()">' +
          '<input type="checkbox" ' + (checked ? 'checked' : '') + ' onchange="window._brandChecked[\'' + b + '\']=this.checked;renderBrandChannel()">' +
          b + '</label>';
      }).join('') +
      '<button class="btn-toggle-all" onclick="event.stopPropagation();var all=Object.values(window._brandChecked).every(function(v){return v});BRAND_LIST.slice(0,8).forEach(function(b){window._brandChecked[b]=!all});renderBrandChannel()">' +
      (Object.values(window._brandChecked).every(function(v) { return v; }) ? '全部取消' : '全选') + '</button>' +
      '</div>';
  }
  var activeBrands = BRAND_LIST.slice(0, 8).filter(function(b) { return window._brandChecked[b]; });

  page.innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">品牌 × RDC 月度订单满足率矩阵（截至 ${matrixDateLabel}）</span></div>
      <div class="chart-container-lg" id="chart-brand-matrix"></div>
    </div>
    <div class="filter-bar" style="margin-bottom:12px">
      <label>RDC：</label>
      <select id="filter-bc-rdc" onchange="filters.brandChannelRDC=this.value;renderBrandChannel()">
        <option value="all" ${rdcFilter==='all'?'selected':''}>全部RDC</option>
        ${RDC_LIST.map(r => '<option value="'+r+'"'+(rdcFilter===r?' selected':'')+'>'+r+'</option>').join('')}
      </select>
    </div>
    <div class="row-2">
      <div class="card">
        <div class="card-header"><span class="card-title">渠道订单占比</span></div>
        <div class="chart-container-sm" id="chart-channel-pie"></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">品牌日订单满足率趋势</span></div>
        ${renderBrandCheckboxes()}
        <div class="chart-container-sm" id="chart-brand-trend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">渠道订单满足率对比</span></div>
      <div class="table-wrap" id="table-channel-summary"></div>
    </div>
  `;

  // Brand x RDC matrix with RDC on top and SKU hover
  if (brandFl.length > 0) {
    const chart1 = initChart('chart-brand-matrix');
    const brands = brandFl.map(d => d.brand);
    const rdck = ['huanan','huabei','dongbei','xibei','huazhong','xinan'];
    const heatData = [];
    brands.forEach((b, bi) => rdck.forEach((rk, ri) => heatData.push([ri, bi, brandFl[bi][rk] || 0])));
    chart1.setOption({
      tooltip: {
        formatter: function(p) {
          const brand = brands[p.value[1]];
          const rdc = RDC_LIST[p.value[0]];
          const rate = (p.value[2] * 100).toFixed(1) + '%';
          const skus = getTopShortageSKUs(brand, rdc, filters.overviewDate, 5);
          let html = '<strong>' + brand + ' · ' + rdc + '</strong><br/>月满足率：' + rate;
          if (skus.length > 0) {
            html += '<br/>—— TOP5 缺货SKU ——';
            skus.forEach((s, i) => {
              html += '<br/>' + (i+1) + '. ' + s.name + '<br/>   缺口：' + s.gap + '箱';
            });
          } else {
            html += '<br/>该品牌在该RDC下无缺货';
          }
          return html;
        }
      },
      grid: { left: 80, right: 20, top: 40, bottom: 30 },
      xAxis: { type: 'category', data: RDC_LIST, position: 'top', axisLabel: { fontSize: 11 } },
      yAxis: { type: 'category', data: brands, inverse: true },
      visualMap: { min: 0.7, max: 1, calculable: true, orient: 'horizontal', left: 'center', bottom: 0, inRange: { color: ['#FEE2E2','#FEF3C7','#D1FAE5','#A7F3D0','#6EE7B7'] } },
      series: [{ type: 'heatmap', data: heatData, label: { show: true, formatter: p => (p.value[2]*100).toFixed(1)+'%', fontSize: 12 }, emphasis: { itemStyle: { shadowBlur: 10 } } }]
    });
  }

  // Channel pie - filtered by RDC and month
  const channelMap = {};
  monthOrderData.forEach(d => {
    if (rdcFilter !== 'all' && d.warehouse !== rdcFilter) return;
    channelMap[d.channel] = (channelMap[d.channel] || 0) + d.orderQty;
  });
  const pieData = Object.entries(channelMap).map(([k, v]) => ({ name: k, value: v }));
  const chart2 = initChart('chart-channel-pie');
  chart2.setOption({
    tooltip: { trigger: 'item', formatter: p => p.name + '<br/>订单支数：' + formatNum(p.value) + '<br/>占比：' + p.percent + '%' },
    legend: { bottom: 0 },
    series: [{ type: 'pie', radius: ['40%','70%'], center: ['50%','45%'], data: pieData, label: { formatter: '{b}\n{d}%' }, emphasis: { itemStyle: { shadowBlur: 10 } } }]
  });

  // Brand daily trend - filtered by RDC and month, skip weekends/holidays, brand checkboxes
  const brands = BRAND_LIST.slice(0, 8);
  const dateSet = new Set();
  monthOrderData.forEach(d => {
    if (rdcFilter !== 'all' && d.warehouse !== rdcFilter) return;
    if (!isWorkday(d.dateStr)) return;
    dateSet.add(d.dateStr);
  });
  const sortedDates = [...dateSet].sort();
  const brandTrend = {};
  brands.forEach(b => { brandTrend[b] = {}; sortedDates.forEach(d => brandTrend[b][d] = { total: 0, fulfill: 0 }); });
  monthOrderData.forEach(d => {
    if (rdcFilter !== 'all' && d.warehouse !== rdcFilter) return;
    if (!isWorkday(d.dateStr)) return;
    if (brandTrend[d.brand]) {
      brandTrend[d.brand][d.dateStr].total += d.orderQty;
      brandTrend[d.brand][d.dateStr].fulfill += d.totalFulfillQty;
    }
  });
  const chart3 = initChart('chart-brand-trend');
  const brandColors = ['#2563EB','#10B981','#F59E0B','#EF4444','#8B5CF6','#14B8A6','#EC4899','#6B7280'];
  chart3.setOption({
    tooltip: { trigger: 'axis', confine: true, textStyle: { fontSize: 11 } },
    legend: { data: activeBrands, top: 0, textStyle: { fontSize: 10 }, type: 'scroll' },
    grid: { left: 50, right: 20, top: 40, bottom: 60 },
    xAxis: { type: 'category', data: sortedDates, axisLabel: { rotate: 45, fontSize: 9 }, boundaryGap: false },
    yAxis: { type: 'value', min: 0, max: 1, axisLabel: { formatter: v => (v*100).toFixed(0)+'%' } },
    series: activeBrands.map((b, idx) => ({ name: b, type: 'line', data: sortedDates.map(d => brandTrend[b][d].total > 0 ? brandTrend[b][d].fulfill / brandTrend[b][d].total : null), smooth: true, symbol: 'none', color: brandColors[idx % brandColors.length] }))
  });

  // Channel summary table - filtered by RDC and month
  const chTableData = [];
  ['经销商','KA'].forEach(ch => {
    const chOrders = monthOrderData.filter(d => d.channel === ch && (rdcFilter === 'all' || d.warehouse === rdcFilter));
    const totalQty = chOrders.reduce((s,d) => s + d.orderQty, 0);
    const fulfillQty = chOrders.reduce((s,d) => s + d.totalFulfillQty, 0);
    const firstQty = chOrders.reduce((s,d) => s + d.firstDayQty, 0);
    chTableData.push({ channel: ch, orderQty: totalQty, fulfillQty, firstQty, monthRate: totalQty>0?fulfillQty/totalQty:0, dayRate: totalQty>0?firstQty/totalQty:0 });
  });
  const chTableHtml = '<table class="data-table"><thead><tr><th>渠道</th><th>订单支数</th><th>总履约支数</th><th>首日排单支数</th><th>月满足率</th><th>日满足率</th></tr></thead><tbody>' +
    chTableData.map(d => `<tr><td>${d.channel}</td><td class="num">${formatNum(d.orderQty)}</td><td class="num">${formatNum(d.fulfillQty)}</td><td class="num">${formatNum(d.firstQty)}</td><td class="num"><span class="${d.monthRate>=0.95?'rate-good':d.monthRate>=0.9?'rate-warn':'rate-bad'}">${formatPct(d.monthRate)}</span></td><td class="num"><span class="${d.dayRate>=0.95?'rate-good':d.dayRate>=0.9?'rate-warn':'rate-bad'}">${formatPct(d.dayRate)}</span></td></tr>`).join('') +
    '</tbody></table>';
  document.getElementById('table-channel-summary').innerHTML = chTableHtml;
}

function renderCustomer() {
  setTitle('客户维度分析');
  const page = document.getElementById('page-customer');
  if (!page) return;

  if (!window.customerSortMode) window.customerSortMode = 'rate';
  if (!window.drillCustomer) window.drillCustomer = null;

  let cData = getFilteredCustomers();
  const cgMap = {};
  cData.forEach(d => {
    if (!cgMap[d.customerGroup]) cgMap[d.customerGroup] = { orderQty: 0, fulfillQty: 0, firstQty: 0, rejectQty: 0 };
    cgMap[d.customerGroup].orderQty += d.orderQty;
    cgMap[d.customerGroup].fulfillQty += d.totalFulfillQty;
    cgMap[d.customerGroup].firstQty += d.firstDayQty;
    if (d.rejectReason && d.rejectReason.trim()) cgMap[d.customerGroup].rejectQty += d.orderQty;
  });

  let cgSorted = Object.entries(cgMap).map(([name, v]) => ({
    name,
    orderQty: v.orderQty,
    fulfillQty: v.fulfillQty,
    firstQty: v.firstQty,
    rejectQty: v.rejectQty || 0,
    monthRate: v.orderQty > 0 ? v.fulfillQty / v.orderQty : 0,
    dayRate: v.orderQty > 0 ? v.firstQty / v.orderQty : 0
  }));

  if (window.customerSortMode === 'qty') {
    cgSorted.sort((a, b) => b.orderQty - a.orderQty);
  } else {
    cgSorted.sort((a, b) => b.monthRate - a.monthRate);

// 渲染客户下钻详情 - 显示该客户的主要缺货SKU
// ===== 箱规 / 在途(箱) / 大仓供应 辅助（缺货报告增强）=====
const RDC_TRANSIT_KEY = {'华南RDC':'huananTransit','华北RDC':'huabeiTransit','东北RDC':'dongbeiTransit','西北RDC':'xibeiTransit','华中RDC':'huazhongTransit','西南RDC':'xinanTransit'};
function buildSupplyMaps() {
  // 每次重建，避免 dataStore.shortage 更新后索引仍停留在旧数据
  window._shortageByCode = {};
  dataStore.shortage.forEach(function(s) {
    const c = String(s.materialCode == null ? '' : s.materialCode).replace(/^0+/, '').trim();
    if (!c) return;
    (window._shortageByCode[c] = window._shortageByCode[c] || []).push(s);
  });
}
// 取某 SKU 的供应信息：在途(箱)=缺货报告原始在途箱数；大仓供应=缺货汇总文本
// rdc: 指定RDC时报该RDC在途，否则报合计在途；dateStr: 优先匹配该日期的缺货记录
function getSkuSupplyInfo(code, rdc, dateStr) {
  buildSupplyMaps();
  const bs = (window._boxSpec && window._boxSpec[String(code)] != null) ? window._boxSpec[String(code)] : null;
  const entries = window._shortageByCode ? window._shortageByCode[String(code)] : null;
  let entry = null;
  if (entries && entries.length) {
    if (dateStr) entry = entries.filter(function(e){ return e.dateStr === dateStr; })[0] || entries[0];
    else entry = entries.slice().sort(function(a,b){ return (a.date && b.date) ? (a.date < b.date ? 1 : -1) : 0; })[0];
  }
  let dcSupply = entry ? (entry.dcSupply || '') : '';
  let transitBoxes = 0;
  let shortageBoxes = 0;
  if (entry) {
    if (rdc && RDC_TRANSIT_KEY[rdc]) transitBoxes = entry[RDC_TRANSIT_KEY[rdc]] || 0;
    else transitBoxes = entry.rdcTransitTotal || 0;
    const rdcShortKeyMap = {'华南RDC':'huananShort','华北RDC':'huabeiShort','东北RDC':'dongbeiShort','西北RDC':'xibeiShort','华中RDC':'huazhongShort','西南RDC':'xinanShort'};
    if (rdc && rdcShortKeyMap[rdc]) shortageBoxes = entry[rdcShortKeyMap[rdc]] || 0;
    else shortageBoxes = entry.rdcShortBoxes || 0;
  }
  const transitUnits = (bs && transitBoxes) ? Math.round(transitBoxes * bs) : null;
  return { boxSpec: bs, dcSupply: dcSupply, transitBoxes: transitBoxes, transitUnits: transitUnits, shortageBoxes: shortageBoxes };
}

// 统一的 TOP缺货SKU 悬浮表：含 RDC在途(箱) + 大仓供应，数字右对齐，避免挤在一起
// skus: [{code,name,...}]；metricLabel: 指标列名；metricFn(s, info): 返回指标单元格HTML；rdc: 指定RDC(用于取在途，否则取合计)
function buildTopShortTipTable(skus, metricLabel, metricFn, rdc) {
  if (!skus || !skus.length) return '<div style="color:#9ca3af;margin-top:4px">无缺货SKU记录</div>';
  let html = '<table class="tip-sku-table"><thead><tr><th class="c">#</th><th>SKU代码</th><th>品名</th><th class="num">' + metricLabel + '</th><th class="num">RDC在途(箱)</th><th>大仓供应</th></tr></thead><tbody>';
  skus.forEach(function(s, i) {
    const info = getSkuSupplyInfo(s.code, rdc);
    const transit = info.transitBoxes ? formatNum(info.transitBoxes) : '—';
    const supply = info.dcSupply || '—';
    html += '<tr><td class="c">' + (i+1) + '</td>' +
      '<td>' + s.code + '</td>' +
      '<td class="nm">' + (s.name || '-') + '</td>' +
      '<td class="num">' + metricFn(s, info) + '</td>' +
      '<td class="num">' + transit + '</td>' +
      '<td class="sup">' + supply + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

  const skuGapMap = {};
  custOrders.filter(d => (d.totalGap||0) > 0 || (d.rejectReason && d.rejectReason.trim())).forEach(d => {
    const key = d.skuCode || d.skuName || '未知';

function exportCustomerCSV() {
  const data = getFilteredCustomers();
  const agg = {};
  data.forEach(d => {
    if (!agg[d.customerGroup]) agg[d.customerGroup] = { orderQty: 0, fulfillQty: 0, firstQty: 0, rejectQty: 0 };
    agg[d.customerGroup].orderQty += d.orderQty;
    agg[d.customerGroup].fulfillQty += d.totalFulfillQty;
    agg[d.customerGroup].firstQty += d.firstDayQty;
    if (d.rejectReason && d.rejectReason.trim()) agg[d.customerGroup].rejectQty += d.orderQty;
  });
  let csv = '\uFEFF客户组,订单支数,首日排单支数,总履约支数,拒绝量,日满足率,月满足率\n';
  Object.entries(agg).forEach(([k,v]) => {
    csv += `"${k}",${v.orderQty},${v.firstQty},${v.fulfillQty},${v.rejectQty||0},${(v.orderQty>0?v.firstQty/v.orderQty:0).toFixed(4)},${(v.orderQty>0?v.fulfillQty/v.orderQty:0).toFixed(4)}\n`;
  });
  downloadFile('客户满足率_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

// ============ WEEKEND SIMULATION ============
function runWeekendSimulation(monthStr) {
  if (!dataStore.orderDetail || dataStore.orderDetail.length === 0) return null;

  // Filter by month if provided
  let filteredOrders = dataStore.orderDetail;
  if (monthStr && monthStr !== 'all') {
    filteredOrders = dataStore.orderDetail.filter(d => d.dateStr && d.dateStr.startsWith(monthStr));
  }
  if (filteredOrders.length === 0) return null;

  // 1. 按日期、RDC、SKU分组汇总订单明细
  const groupMap = new Map();
  for (const order of filteredOrders) {
    const key = `${order.dateStr}|${order.warehouse}|${order.skuCode}`;
    if (!groupMap.has(key)) {
      groupMap.set(key, {
        dateStr: order.dateStr, warehouse: order.warehouse,
        skuCode: order.skuCode, skuName: order.skuName,
        orderQty: 0, firstDayQty: 0, firstDayShort: 0,
        totalFulfillQty: 0, totalGap: 0
      });
    }
    const g = groupMap.get(key);
    g.orderQty += order.orderQty;
    g.firstDayQty += order.firstDayQty;
    g.firstDayShort += order.firstDayShort;
    g.totalFulfillQty += order.totalFulfillQty;
    g.totalGap += order.totalGap;
  }

  const allGroups = Array.from(groupMap.values());

  // 2. 按日期分组
  const byDate = new Map();
  for (const g of allGroups) {
    if (!byDate.has(g.dateStr)) byDate.set(g.dateStr, []);
    byDate.get(g.dateStr).push(g);
  }

  // 3. 计算全月各RDC原始数据
  const rdcMonthData = new Map();
  for (const g of allGroups) {
    const rdc = g.warehouse;
    if (!rdcMonthData.has(rdc)) {
      rdcMonthData.set(rdc, { orderQty: 0, firstDayQty: 0, totalFulfillQty: 0 });
    }
    const r = rdcMonthData.get(rdc);
    r.orderQty += g.orderQty;
    r.firstDayQty += g.firstDayQty;
    r.totalFulfillQty += g.totalFulfillQty;
  }

  // 4. 识别周末并计算模拟
  const weekendResults = [];
  const rdcWeekendIncrement = new Map();

  for (const [dateStr, groups] of byDate) {
    const d = new Date(dateStr);
    const dayOfWeek = d.getDay(); // 0=周日, 6=周六
    if (dayOfWeek !== 0 && dayOfWeek !== 6) continue;

    const mondayD = new Date(d);
    mondayD.setDate(mondayD.getDate() + (dayOfWeek === 6 ? 2 : 1));
    const mondayStr = fmtDate(mondayD);

    const mondayGroups = byDate.get(mondayStr) || [];
    const mondayMap = new Map();
    for (const mg of mondayGroups) {
      mondayMap.set(`${mg.warehouse}|${mg.skuCode}`, mg);
    }

    let originalFirstDay = 0;
    let simulatedFirstDay = 0;
    let totalOrderQty = 0;

    for (const wg of groups) {
      originalFirstDay += wg.firstDayQty;
      totalOrderQty += wg.orderQty;

      const rdc = wg.warehouse;
      const mondayKey = `${wg.warehouse}|${wg.skuCode}`;
      const mondayGroup = mondayMap.get(mondayKey);

      if (mondayGroup && mondayGroup.firstDayShort === 0) {
        // 周一无缺失（firstDayShort=0），模拟该周末SKU订单100%满足
        simulatedFirstDay += wg.orderQty;
        rdcWeekendIncrement.set(rdc, (rdcWeekendIncrement.get(rdc) || 0) + (wg.orderQty - wg.firstDayQty));
      } else {
        // 周一有缺失或没有对应订单，维持原状
        simulatedFirstDay += wg.firstDayQty;
      }
    }

    weekendResults.push({
      weekendDate: dateStr, mondayDate: mondayStr,
      orderQty: totalOrderQty,
      originalRate: totalOrderQty > 0 ? originalFirstDay / totalOrderQty : 0,
      simulatedRate: totalOrderQty > 0 ? simulatedFirstDay / totalOrderQty : 0,
      improvement: totalOrderQty > 0 ? (simulatedFirstDay - originalFirstDay) / totalOrderQty : 0,
      originalFirstDayQty: originalFirstDay,
      simulatedFirstDayQty: simulatedFirstDay,
      increment: simulatedFirstDay - originalFirstDay
    });
  }

  // 5. 全月汇总
  let totalMonthOrder = 0;
  let totalMonthOriginalFirstDay = 0;
  let totalMonthTotalFulfill = 0;

  for (const g of allGroups) {
    totalMonthOrder += g.orderQty;
    totalMonthOriginalFirstDay += g.firstDayQty;
    totalMonthTotalFulfill += g.totalFulfillQty;
  }

  const totalIncrement = weekendResults.reduce((s, r) => s + r.increment, 0);
  const totalMonthSimulatedFirstDay = totalMonthOriginalFirstDay + totalIncrement;

  // 6. RDC维度计算
  const rdcNames = ['华南RDC','华北RDC','东北RDC','西北RDC','华中RDC','西南RDC'];
  const rdcResults = rdcNames.map(rdc => {
    const monthData = rdcMonthData.get(rdc) || { orderQty: 0, firstDayQty: 0, totalFulfillQty: 0 };
    const increment = rdcWeekendIncrement.get(rdc) || 0;
    const simulatedFirstDay = monthData.firstDayQty + increment;
    const originalRate = monthData.orderQty > 0 ? monthData.firstDayQty / monthData.orderQty : 0;
    const simulatedRate = monthData.orderQty > 0 ? simulatedFirstDay / monthData.orderQty : 0;

    return {
      rdc, orderQty: monthData.orderQty,
      originalRate, simulatedRate,
      improvement: simulatedRate - originalRate,
      originalFirstDay: monthData.firstDayQty,
      simulatedFirstDay: simulatedFirstDay
    };
  });

  return {
    originalDayRate: totalMonthOrder > 0 ? totalMonthOriginalFirstDay / totalMonthOrder : 0,
    simulatedDayRate: totalMonthOrder > 0 ? totalMonthSimulatedFirstDay / totalMonthOrder : 0,
    originalMonthRate: totalMonthOrder > 0 ? totalMonthTotalFulfill / totalMonthOrder : 0,
    simulatedMonthRate: totalMonthOrder > 0 ? totalMonthTotalFulfill / totalMonthOrder : 0,
    totalWeekendOrderQty: weekendResults.reduce((s, r) => s + r.orderQty, 0),
    totalIncrement: totalIncrement,
    weekendResults, rdcResults
  };
}

// RDC名称映射
const RDC_NAMES = ['东北RDC','华北RDC','华中RDC','华南RDC','西南RDC','西北RDC','未知'];

function rdcFromLocation(loc) {
  if (loc.startsWith('20')) return '东北RDC';
  if (loc.startsWith('40')) return '华南RDC';
  if (loc.startsWith('60')) return '西北RDC';
  if (loc.startsWith('70')) return '华中RDC';
  if (loc.startsWith('80')) return '西南RDC';
  if (loc.startsWith('90')) return '华北RDC';
  return '未知';
}

function transTypeFromLocation(loc) {
  if (loc.endsWith('23') || loc.endsWith('06')) return '免费单转储';
  if (loc.endsWith('03')) return 'KA常规转储';
  return '常规转储';
}

function renderTransship() {
  setTitle('转储数据');
  const page = document.getElementById('page-transship');
  if (!page) return;

  if (!dataStore.loaded || dataStore.transship.length === 0) {
    page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)"><div style="font-size:48px;margin-bottom:16px">📦</div><div style="font-size:var(--font-size-lg)">暂无转储数据</div><div style="font-size:12px;margin-top:8px">请导入包含「转储数据」Sheet的Excel文件</div></div>';
    return;
  }

  const data = dataStore.transship;

  // Month filter
  const allMonths = [...new Set(data.map(d => d.dateStr.slice(0,7)))].sort();
  window._transMonth = window._transMonth || 'all';
  const selMonth = window._transMonth;

  let filtered = data;
  if (selMonth !== 'all') filtered = filtered.filter(d => d.dateStr.startsWith(selMonth));

  // Per-RDC aggregation for filtered data
  const rdcAgg = {};
  RDC_NAMES.forEach(r => { rdcAgg[r] = { invoiceQty: 0, boxQty: 0, nonBoxQty: 0, regularQty: 0, freeQty: 0, kaQty: 0 }; });
  filtered.forEach(d => {
    if (!rdcAgg[d.rdc]) return;
    const a = rdcAgg[d.rdc];
    a.invoiceQty += d.invoiceQty;
    if (d.isBox) a.boxQty += d.invoiceQty;
    else a.nonBoxQty += d.invoiceQty;
    if (d.transType === '常规转储') a.regularQty += d.invoiceQty;
    else if (d.transType === '免费单转储') a.freeQty += d.invoiceQty;
    else if (d.transType === 'KA常规转储') a.kaQty += d.invoiceQty;

  // Monthly totals by RDC (for monthly trend chart)
  const monthRdcMap = {};
  allMonths.forEach(m => { monthRdcMap[m] = {}; RDC_NAMES.forEach(r => { monthRdcMap[m][r] = 0; }); });

  const activeRdcs = RDC_NAMES.filter(r => {
    return allMonths.some(m => monthRdcMap[m][r] > 0);

function renderTransTable() {
  const search = (document.getElementById('trans-search')?.value || '').toLowerCase();
  const rdcFilter = document.getElementById('trans-rdc-filter')?.value || 'all';
  const monthFilter = document.getElementById('trans-month-filter')?.value || 'all';
  const container = document.getElementById('trans-table-container');
  if (!container) return;

  let filtered = dataStore.transship;
  if (search) filtered = filtered.filter(d =>
    d.material.toLowerCase().includes(search) ||
    d.materialName.toLowerCase().includes(search)
  );
  if (rdcFilter !== 'all') filtered = filtered.filter(d => d.rdc === rdcFilter);
  if (monthFilter !== 'all') filtered = filtered.filter(d => d.dateStr.startsWith(monthFilter));

  // Pagination
  const perPage = 20;
  window._transPage = window._transPage || 1;
  const totalPages = Math.ceil(filtered.length / perPage) || 1;
  if (window._transPage > totalPages) window._transPage = totalPages;
  const startIdx = (window._transPage - 1) * perPage;
  const pageData = filtered.slice(startIdx, startIdx + perPage);

  container.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;color:var(--text-secondary)">
      <span>共 ${filtered.length} 条记录${filtered.length !== dataStore.transship.length ? '（已筛选）' : ''}</span>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="btn-export" style="padding:2px 8px;font-size:11px" onclick="window._transPage=Math.max(1,${window._transPage-1});renderTransTable()" ${window._transPage<=1?'disabled':''}>上一页</button>
        <span>第 ${window._transPage}/${totalPages} 页</span>
        <button class="btn-export" style="padding:2px 8px;font-size:11px" onclick="window._transPage=Math.min(${totalPages},${window._transPage+1});renderTransTable()" ${window._transPage>=totalPages?'disabled':''}>下一页</button>
      </div>
    </div>
    <table class="data-table">
      <thead><tr><th>日期</th><th>RDC</th><th>库位</th><th>转储类型</th><th>物料号</th><th>物料名称</th><th>发货单数量</th><th>单位</th><th>入库数量</th><th>发货过账</th></tr></thead>
      <tbody>
        ${pageData.map(d => `<tr>
          <td>${d.dateStr}</td>
          <td><span class="badge" style="background:${getRDCColor(d.rdc)}20;color:${getRDCColor(d.rdc)}">${d.rdc}</span></td>
          <td>${d.location}</td>
          <td>${d.transType}</td>
          <td>${d.material}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.materialName}">${d.materialName}</td>
          <td class="num">${formatNum(d.invoiceQty)}</td>
          <td>${d.unit}</td>
          <td class="num">${formatNum(d.inboundQty)}</td>
          <td class="num">${formatNum(d.deliveryQty)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function exportTransshipCSV() {
  const data = dataStore.transship;
  let csv = '\uFEFF日期,RDC,库位,转储类型,物料号,物料名称,发货单数量,单位,入库数量,发货过账数量\n';
  data.forEach(d => {
    csv += `${d.dateStr},${d.rdc},${d.location},${d.transType},${d.material},"${d.materialName}",${d.invoiceQty},${d.unit},${d.inboundQty},${d.deliveryQty}\n`;
  });
  downloadFile('转储数据_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

function buildShortageCompareData() {
  // Helper: check if dateStr is weekend (Saturday or Sunday)
  function isWeekend(dateStr) {
    const d = new Date(dateStr);
    const day = d.getDay();
    return day === 0 || day === 6;
  }

  // Build shortage index: date + materialCode -> Set of RDCs (细化到RDC维度)
  const shortageIdx = {};
  // Also build date list for reporting
  const shortageDates = {};
  const monthFilter = filters.dataMonth && filters.dataMonth !== 'all';
  dataStore.shortage.forEach(d => {
    if (!d.dateStr) return;
    if (monthFilter && !d.dateStr.startsWith(filters.dataMonth)) return;
    if (isWeekend(d.dateStr)) return; // 跳过周末
    const dateKey = d.dateStr;
    if (!shortageIdx[dateKey]) shortageIdx[dateKey] = {};
    // 记录该物料号在各RDC的缺货情况（只要有一个RDC有缺货就算有记录）
    const rdcFields = ['huananShort','huabeiShort','dongbeiShort','xibeiShort','huazhongShort','xinanShort'];
    const hasAnyShort = rdcFields.some(k => d[k] && d[k] > 0);
    if (hasAnyShort) {
      if (!shortageIdx[dateKey][d.materialCode]) shortageIdx[dateKey][d.materialCode] = new Set();
      rdcFields.forEach(k => {
        const rdcIdx = rdcFields.indexOf(k);
        if (d[k] && d[k] > 0 && rdcIdx >= 0) {
          shortageIdx[dateKey][d.materialCode].add(RDC_LIST[rdcIdx]);
        }
      });
    }
    shortageDates[dateKey] = true;
  });

  // Find mismatches: orderDetail has shortage but NOT in shortage report (按日期+物料号+RDC比较)
  const mismatchMap = {};
  dataStore.orderDetail.forEach(d => {
    if (monthFilter && !d.dateStr.startsWith(filters.dataMonth)) return;
    if (isWeekend(d.dateStr)) return; // 跳过周末
    // 判断是否有缺货：首日缺货>0 或 总缺货缺口>0 或 订单量>首日履行量
    const hasShortage = d.firstDayShort > 0 || d.totalGap > 0 || (d.orderQty > 0 && d.firstDayQty < d.orderQty);
    if (!hasShortage) return;

    const dayShortage = shortageIdx[d.dateStr];
    let rdc = d.warehouse;
    if (rdc === '未知' || !rdc) rdc = '未知RDC';

    // 按RDC维度检查：该SKU在该RDC是否有缺货记录
    if (dayShortage && dayShortage[d.skuCode]) {
      if (dayShortage[d.skuCode].has(rdc)) return; // 该SKU在该RDC的缺货报告中已有记录，数据一致
      // 该SKU在缺货报告中存在，但不在该RDC — 仍有差异
    }

    const gapReason = (dayShortage && dayShortage[d.skuCode]) ? '缺货报告未收录该RDC' : '无当日缺货报告';
    const key = `${d.dateStr}|${d.skuCode}|${rdc}`;
    if (!mismatchMap[key]) {
      mismatchMap[key] = {
        dateStr: d.dateStr, skuCode: d.skuCode, skuName: d.skuName,
        brand: d.brand, rdc: rdc, firstShort: 0, gapReason: gapReason
      };
    }
    mismatchMap[key].firstShort += (d.firstDayShort > 0 ? d.firstDayShort : (d.totalGap > 0 ? d.totalGap : d.orderQty - d.firstDayQty));
    // 统一gapReason（以更严重为准）
    if (gapReason === '无当日缺货报告') mismatchMap[key].gapReason = '无当日缺货报告';
  });

  return Object.values(mismatchMap).sort((a, b) => a.dateStr.localeCompare(b.dateStr) || b.firstShort - a.firstShort);
}

function saveShortageReasonAt(i) {
  const keys = window._shortageRowKeys || [];
  const key = keys[i];
  if (!key) { showToast('数据异常，请刷新页面', true); return; }
  const sel = document.getElementById('reason-' + i);
  if (!sel || !sel.value) { showToast('请先选择缺货原因', true); return; }
  const isModify = !!window._shortageReasons[key];
  window._shortageReasons = window._shortageReasons || {};
  window._shortageReasons[key] = sel.value;
  // 写入IndexedDB + localStorage双备份
  saveToIDB().catch(() => {});
  try { localStorage.setItem('rdc_shortage_reasons', JSON.stringify(window._shortageReasons)); } catch(e) {}
  renderShortageCompare();
  showToast(isModify ? '缺货原因已更新' : '缺货原因已保存');
}

function importShortageReasons() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,.csv';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const imported = JSON.parse(ev.target.result);
        window._shortageReasons = window._shortageReasons || {};
        let count = 0;
        Object.keys(imported).forEach(k => {
          if (typeof imported[k] === 'string' && imported[k].trim()) {
            window._shortageReasons[k] = imported[k].trim();
            count++;
          }
        });
        saveToIDB().catch(() => {});
        try { localStorage.setItem('rdc_shortage_reasons', JSON.stringify(window._shortageReasons)); } catch(e) {}
        renderShortageCompare();
        showToast('成功导入 ' + count + ' 条缺货原因');
      } catch(err) {
        showToast('导入失败：文件格式不正确，请使用JSON格式', true);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportShortageReasons() {
  const reasons = window._shortageReasons || {};
  const blob = new Blob([JSON.stringify(reasons, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '缺货原因_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function exportShortageCompareCSV() {
  const allData = buildShortageCompareData();
  let csv = '\uFEFF日期,RDC,物料号,物料名称,品牌,首日缺货(支),差异原因,缺货原因\n';
  allData.forEach(d => {
    const key = d.dateStr + '|' + d.skuCode + '|' + d.rdc;
    const reason = (window._shortageReasons || {})[key] || '';
    csv += `${d.dateStr},${d.rdc},${d.skuCode},"${d.skuName}",${d.brand},${d.firstShort},"${d.gapReason || ''}","${reason}"\n`;
  });
  downloadFile('缺货差异维护_' + new Date().toISOString().slice(0,10) + '.csv', csv);
}

// ============ REPLENISHMENT SUGGESTIONS ============
function renderReplenishment() {
  setTitle('补货建议');
  var page = document.getElementById('page-replenishment');
  if (!page || !dataStore.loaded) {
    if (page) page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)">请先导入数据</div>';
    return;
  }

  var shortageData = dataStore.shortage;
  var orderData = dataStore.orderDetail;
  var shortageReasons = window._shortageReasons || {};

  // Get latest date
  var allDates = shortageData.map(function(d) { return d.dateStr; }).filter(Boolean).sort();
  var latestDate = allDates[allDates.length - 1];
  if (!latestDate) { page.innerHTML = '<div style="text-align:center;padding:80px;color:var(--text-secondary)">暂无缺货数据</div>'; return; }

  // Month filter
  var monthFilter = filters.dataMonth && filters.dataMonth !== 'all';
  var latestShortage = shortageData.filter(function(d) { return d.dateStr === latestDate; });
  if (monthFilter) {
    latestShortage = latestShortage.filter(function(d) { return d.dateStr && d.dateStr.indexOf(filters.dataMonth) === 0; });
    var monthDates = shortageData.filter(function(d) { return d.dateStr && d.dateStr.indexOf(filters.dataMonth) === 0; }).map(function(d) { return d.dateStr; }).sort();
    latestDate = monthDates[monthDates.length - 1];
    latestShortage = shortageData.filter(function(d) { return d.dateStr === latestDate; });
  }

  // RDC filter
  var rdcFilter = window._replRdc || 'all';
  window._replRdc = rdcFilter;

  // ==== DAILY SUGGESTIONS ====
  // Step 1: Candidate SKU x RDC combos from latest shortage
  var rdcKeyMap = { '华南RDC':'huananShort','华北RDC':'huabeiShort','东北RDC':'dongbeiShort','西北RDC':'xibeiShort','华中RDC':'huazhongShort','西南RDC':'xinanShort' };
  var rdcKeys = Object.keys(rdcKeyMap);
  var rdcNames = Object.values(rdcKeyMap);

  var candidates = [];
  latestShortage.forEach(function(d) {
    if (d.dcSupply && d.dcSupply.indexOf('整体缺货') >= 0 && d.rdcTransitTotal <= 0) return; // 总仓缺货且无在途，跳过
    rdcKeys.forEach(function(rdcName, idx) {
      var rdcKey = rdcNames[idx];
      var shortVal = d[rdcKey] || 0;
      if (shortVal <= 0) return;
      var key = d.materialCode + '|' + rdcName;
      // Dedup by SKU+RDC (use latest entry if multiple)
      if (candidates.some(function(c) { return c.key === key; })) return;

      // Get shortage reason
      var reasonKey = d.dateStr + '|' + d.materialCode + '|' + rdcName;
      var reason = shortageReasons[reasonKey] || '';

      candidates.push({
        key: key,
        materialCode: d.materialCode,
        materialName: d.materialName,
        brand: d.brand,
        abcClass: d.abcClass || 'C',
        rdc: rdcName,
        dcStock: d.dcStock || 0,
        rdcTransitTotal: d.rdcTransitTotal || 0,
        rdcShortBoxes: shortVal,
        rdcShortAmount: d.rdcShortAmount || 0,
        dcSupply: d.dcSupply || '',
        reason: reason,
        dateStr: d.dateStr
      });
    });
  });

  // Step 2: Calculate daily demand and fulfillment rate (60 days, covering current + previous month)
  var sixtyDaysAgo = new Date(latestDate);
  sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);
  var sixtyDaysAgoStr = sixtyDaysAgo.toISOString().slice(0, 10);
  var analysisDays = Math.min(60, Math.ceil((new Date(latestDate) - sixtyDaysAgo) / 86400000));

  // Build SKU x RDC demand map from orderDetail
  var demandMap = {}; // key: skuCode|rdc -> { total, fulfill, days, dailyVals }
  orderData.forEach(function(d) {
    if (d.dateStr < sixtyDaysAgoStr || d.dateStr > latestDate) return;
    var dmKey = d.skuCode + '|' + d.warehouse;
    if (!demandMap[dmKey]) demandMap[dmKey] = { total: 0, fulfill: 0, days: 0, dailyVals: {} };
    demandMap[dmKey].total += d.orderQty;
    demandMap[dmKey].fulfill += d.totalFulfillQty;
    if (!demandMap[dmKey].dailyVals[d.dateStr]) demandMap[dmKey].dailyVals[d.dateStr] = 0;
    demandMap[dmKey].dailyVals[d.dateStr] += d.orderQty;
  });

  // Calculate 7-day vs previous 7-day shortage trend
  var sevenDaysAgo = new Date(latestDate);
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  var fourteenDaysAgo = new Date(latestDate);
  fourteenDaysAgo.setDate(fourteenDaysAgo.getDate() - 14);
  var sevenDaysAgoStr = sevenDaysAgo.toISOString().slice(0, 10);
  var fourteenDaysAgoStr = fourteenDaysAgo.toISOString().slice(0, 10);

  // Build shortage trend per SKU x RDC
  var shortTrendMap = {}; // key -> recent7, prev7
  shortageData.forEach(function(d) {
    if (!d.dateStr || d.dateStr > latestDate) return;
    rdcKeys.forEach(function(rdcName, idx) {
      var rdcKey = rdcNames[idx];
      var sv = d[rdcKey] || 0;
      if (sv <= 0) return;
      var stKey = d.materialCode + '|' + rdcName;
      if (!shortTrendMap[stKey]) shortTrendMap[stKey] = { recent7: 0, prev7: 0 };
      if (d.dateStr >= sevenDaysAgoStr) shortTrendMap[stKey].recent7 += sv;
      else if (d.dateStr >= fourteenDaysAgoStr) shortTrendMap[stKey].prev7 += sv;
    });
  });

  // Step 3: Score each candidate
  var maxShortBoxes = 0;
  candidates.forEach(function(c) { if (c.rdcShortBoxes > maxShortBoxes) maxShortBoxes = c.rdcShortBoxes; });

  var scoredCandidates = candidates.map(function(c) {
    var dmKey = c.materialCode + '|' + c.rdc;
    var dm = demandMap[dmKey] || { total: 0, fulfill: 0, days: 0, dailyVals: {} };
    var st = shortTrendMap[dmKey] || { recent7: 0, prev7: 0 };

    // Daily avg demand
    var dailyAvg = dm.total > 0 ? dm.total / analysisDays : 0;

    // Fulfillment rate (30-day)
    var fulfillRate = dm.total > 0 ? dm.fulfill / dm.total : 0;

    // Shortage trend (7-day vs previous 7-day)
    var trendUp = st.recent7 > st.prev7 * 1.1 ? 1 : 0;

    // ABC coefficient
    var abcCoeff = c.abcClass === 'A' ? 1.0 : c.abcClass === 'B' ? 0.6 : 0.3;

    // RDC count (how many RDCs this SKU affects)
    var skuRdcCount = 1;
    candidates.forEach(function(c2) {
      if (c2.materialCode === c.materialCode && c2.rdc !== c.rdc) skuRdcCount++;
    });
    var rdcNorm = skuRdcCount / 6;

    // Shortage normalization
    var shortNorm = maxShortBoxes > 0 ? c.rdcShortBoxes / maxShortBoxes : 0;

    // Composite score (0-1 → 0-100)
    var score = (1 - fulfillRate) * 0.25 + trendUp * 0.15 + abcCoeff * 0.15 + rdcNorm * 0.10 + shortNorm * 0.35;
    var score100 = Math.round(score * 100);

    // Suggested replenishment quantity
    var suggestQty = Math.max(0, Math.round(dailyAvg * 4 - c.dcStock - c.rdcTransitTotal));

    // Urgency level
    var urgency = score100 >= 70 ? 'emergency' : score100 >= 40 ? 'important' : 'attention';
    var urgencyLabel = score100 >= 70 ? '紧急' : score100 >= 40 ? '重要' : '关注';
    var urgencyColor = score100 >= 70 ? '#EF4444' : score100 >= 40 ? '#F59E0B' : '#2563EB';
    var urgencyBg = score100 >= 70 ? '#FEE2E2' : score100 >= 40 ? '#FFFBEB' : '#DBEAFE';

    // Shortage reason advice
    var reasonAdvice = '';
    if (c.reason) {
      if (c.reason.indexOf('总仓缺货') >= 0) reasonAdvice = '需总仓协调补充';
      else if (c.reason.indexOf('在途缺货') >= 0) reasonAdvice = '紧急调拨补货';
      else if (c.reason.indexOf('KA库') >= 0) reasonAdvice = '协调KA库释放';
      else if (c.reason.indexOf('效期') >= 0) reasonAdvice = '调拨替代批次';
      else if (c.reason.indexOf('效期发货') >= 0) reasonAdvice = '客户沟通效期';
      else if (c.reason.indexOf('入库时间差') >= 0) reasonAdvice = '持续监控入库';
      else reasonAdvice = '待确认原因';
    } else {
      reasonAdvice = '待确认原因';
    }

    return {
      key: c.key,
      materialCode: c.materialCode,
      materialName: c.materialName,
      brand: c.brand,
      abcClass: c.abcClass,
      rdc: c.rdc,
      dcStock: c.dcStock,
      rdcTransitTotal: c.rdcTransitTotal,
      rdcShortBoxes: c.rdcShortBoxes,
      dcSupply: c.dcSupply,
      dailyAvg: dailyAvg,
      fulfillRate: fulfillRate,
      trendUp: trendUp,
      score: score100,
      suggestQty: suggestQty,
      urgency: urgency,
      urgencyLabel: urgencyLabel,
      urgencyColor: urgencyColor,
      urgencyBg: urgencyBg,
      reason: c.reason,
      reasonAdvice: reasonAdvice,
      skuRdcCount: skuRdcCount
    };
  });

  // Sort by score desc
  scoredCandidates.sort(function(a, b) { return b.score - a.score; });

  // Per-RDC quota: each RDC shows at most 5 SKUs
  // Process in score order, collect per-RDC, then fill remaining slots
  var perRdcCount = {};
  var perRdcDisplay = [];
  var overflowCandidates = [];
  scoredCandidates.forEach(function(c) {
    perRdcCount[c.rdc] = perRdcCount[c.rdc] || 0;
    if (perRdcCount[c.rdc] < 5) {
      perRdcCount[c.rdc]++;
      perRdcDisplay.push(c);
    } else {
      overflowCandidates.push(c);
    }
  });
  // Fill remaining slots up to 20 with highest-score overflow candidates
  // Fill remaining slots up to 20 with highest-score overflow candidates
  var remainingSlots = Math.max(0, 20 - perRdcDisplay.length);
  var filledRemaining = overflowCandidates.slice(0, remainingSlots);
  var top20 = perRdcDisplay.concat(filledRemaining).slice(0, 20);
  // Re-sort by score to maintain descending order
  top20.sort(function(a, b) { return b.score - a.score; });

  // RDC filter
  var displayList = top20;
  if (rdcFilter !== 'all') {
    displayList = top20.filter(function(d) { return d.rdc === rdcFilter; });
  }

  // ==== MID-TERM STRATEGY ====
  // 3.1 SKU distribution adjustment (60-day range)
  var distAdjustments = [];
  var skuRdcDemand = {};
  orderData.forEach(function(d) {
    if (!d.dateStr || d.dateStr < sixtyDaysAgoStr || d.dateStr > latestDate) return;
    var distKey = d.skuCode + '|' + d.warehouse;
    if (!skuRdcDemand[distKey]) skuRdcDemand[distKey] = 0;
    skuRdcDemand[distKey] += d.orderQty;
  });

  var skuTotalDemand = {};
  Object.keys(skuRdcDemand).forEach(function(key) {
    var sku = key.split('|')[0];
    skuTotalDemand[sku] = (skuTotalDemand[sku] || 0) + skuRdcDemand[key];
  });

  Object.keys(skuRdcDemand).forEach(function(key) {
    var parts = key.split('|');
    var sku = parts[0];
    var rdc = parts[1];
    var demand = skuRdcDemand[key];
    var totalDemand = skuTotalDemand[sku];
    var ratio = totalDemand > 0 ? demand / totalDemand : 0;
    var monthShort = shortageData.filter(function(d) {
      return d.materialCode === sku && d[rdcNames[rdcKeys.indexOf(rdc)]] > 0;
    }).reduce(function(s, d) { return s + (d[rdcNames[rdcKeys.indexOf(rdc)]] || 0); }, 0);

    if (ratio > 0.4 && monthShort > 50) {
      distAdjustments.push({
        skuCode: sku,
        rdc: rdc,
        ratio: (ratio * 100).toFixed(0),
        monthShort: Math.round(monthShort),
        suggestion: '上调分仓分配比例'
      });
    }
  });
  distAdjustments.sort(function(a, b) { return b.monthShort - a.monthShort; });
  distAdjustments = distAdjustments.slice(0, 10);

  // 3.2 Safety stock analysis
  var ssAdjustments = [];
  var skippedSS = {};
  Object.keys(demandMap).forEach(function(dmKey) {
    var dm = demandMap[dmKey];
    var parts = dmKey.split('|');
    var sku = parts[0];
    var rdc = parts[1];
    if (dm.total < 200) return; // Not enough data for meaningful analysis (60-day window)

    var dailyMean = dm.total / analysisDays;
    var vals = Object.values(dm.dailyVals).filter(function(v) { return v > 0; });
    if (vals.length < 5) return;

    var mean = vals.reduce(function(s, v) { return s + v; }, 0) / vals.length;
    var variance = vals.reduce(function(s, v) { return s + (v - mean) * (v - mean); }, 0) / vals.length;
    var stdDev = Math.sqrt(variance);
    var cv = stdDev / (dailyMean || 1);
    var ss = Math.round(1.65 * stdDev * 2); // sqrt(4) = 2

    // Find this SKU's current stock from shortage data
    var stockInfo = shortageData.filter(function(d) {
      return d.materialCode === sku;
    }).sort(function(a, b) { return b.dateStr.localeCompare(a.dateStr); })[0];
    var currentStock = stockInfo ? (stockInfo.dcStock || 0) : 0;

    if (currentStock < ss * 0.8 || currentStock > ss * 1.5 || cv > 0.3) {
      var suggest = currentStock < ss * 0.8 ? '上调安全库存' : currentStock > ss * 1.5 ? '下调安全库存' : '正常';
      if (cv > 0.3 && suggest === '正常') suggest = '高波动,重点监控';
      var ssKey = sku + '|' + rdc;
      if (!skippedSS[ssKey]) {
        skippedSS[ssKey] = true;
        ssAdjustments.push({
          skuCode: sku,
          rdc: rdc,
          dailyMean: Math.round(dailyMean),
          stdDev: Math.round(stdDev),
          cv: cv.toFixed(2),
          ss: ss,
          currentStock: currentStock,
          suggestion: suggest
        });
      }
    }
  });
  ssAdjustments.sort(function(a, b) { return b.cv - a.cv; });
  ssAdjustments = ssAdjustments.slice(0, 10);

  // 3.3 Anomaly detection
  var anomalies = [];
  // Pattern 1: multi-RDC shortage
  var skuAnomalyMap = {};
  shortageData.filter(function(d) { return d.dateStr === latestDate; }).forEach(function(d) {
    var rdcCnt = rdcNames.reduce(function(c, k) { return c + (d[k] > 0 ? 1 : 0); }, 0);
    if (rdcCnt >= 4) {
      skuAnomalyMap[d.materialCode] = {
        materialCode: d.materialCode,
        materialName: d.materialName,
        brand: d.brand,
        rdcCount: rdcCnt,
        type: '多仓同时缺货',

        advice: '总仓库存可能不足，建议紧急调拨或调整生产计划'

  // Pattern 2: consecutive low fulfillment
  var recentDates = shortageData.map(function(d) { return d.dateStr; }).filter(Boolean).sort().reverse().slice(0, 5);
  var fulfillLowMap = {};
  orderData.forEach(function(d) {
    if (!d.dateStr || recentDates.indexOf(d.dateStr) < 0) return;
    var flKey = d.skuCode + '|' + d.warehouse;
    if (!fulfillLowMap[flKey]) fulfillLowMap[flKey] = { total: 0, fulfill: 0, days: new Set(), brand: d.brand, skuName: d.skuName };
    fulfillLowMap[flKey].total += d.orderQty;
    fulfillLowMap[flKey].fulfill += d.totalFulfillQty;
    fulfillLowMap[flKey].days.add(d.dateStr);
  });

  Object.keys(fulfillLowMap).forEach(function(key) {
    var fm = fulfillLowMap[key];
    if (fm.days.size >= 5 && fm.total > 0) {
      var rate = fm.fulfill / fm.total;
      if (rate < 0.6) {
        var parts = key.split('|');
        anomalies.push({
          materialCode: parts[0],

          rdc: parts[1],

        });
      }
    }
  });

  // Merge anomaly patterns (remove duplicates)
  var seenAnomalies = {};
  anomalies = anomalies.filter(function(a) {
    var ak = a.materialCode + '|' + a.type;
    if (seenAnomalies[ak]) return false;
    seenAnomalies[ak] = true;
    return true;
  }).slice(0, 5);

  // Add multi-RDC shortages
  Object.values(skuAnomalyMap).forEach(function(a) {
    var ak = a.materialCode + '|' + a.type;
    if (!seenAnomalies[ak]) {
      seenAnomalies[ak] = true;
      anomalies.push(a);
    }
  });
  anomalies = anomalies.slice(0, 8);

  // Apply RDC filter to mid-term tables
  if (rdcFilter !== 'all') {
    distAdjustments = distAdjustments.filter(function(d) { return d.rdc === rdcFilter; });
    ssAdjustments = ssAdjustments.filter(function(d) { return d.rdc === rdcFilter; });
    // For anomalies: keep multi-RDC alerts, filter single-RDC ones
    anomalies = anomalies.filter(function(a) {
      return a.type === '多仓同时缺货' || a.rdc === rdcFilter;
    });
  }

  // ====== RENDER ======
  var monthLabel = monthFilter ? filters.dataMonth : '全部月份';

  window._replStatus = window._replStatus || {};
  function statusIcon(key) {
    return window._replStatus[key] ? '✅' : '⬜';

    window._replStatus[key] = !window._replStatus[key];
    saveToIDB();
    renderReplenishment();

    if (db) {

      var store = tx.objectStore(STORE_NAME);
      var req = store.get('current_data');
